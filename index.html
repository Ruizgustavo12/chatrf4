<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RF4 Latam</title>

  <meta name="theme-color" content="#1877f2">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RF4 Latam">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="manifest" href="/chatrf4/manifest.json">
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load', ()=>{
        navigator.serviceWorker.register('/chatrf4/sw.js',{scope:'/chatrf4/'})
          .then(reg => {
            reg.addEventListener('updatefound', () => {
              const nw = reg.installing;
              if(!nw) return;
              nw.addEventListener('statechange', () => {
                if(nw.state === 'installed' && navigator.serviceWorker.controller) {
                  const toast = document.getElementById('swUpdateToast');
                  if(toast) toast.style.display = 'flex';
                  window._pendingSW = nw;
                }
              });
            });
          }).catch(err=>console.log('SW error:', err));
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          window.location.replace('https://ruizgustavo12.github.io/chatrf4/');
        });
      });
    }
    let _deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      _deferredPrompt = e;
      const btn = document.getElementById('installPwaBtn');
      if(btn) btn.style.display = 'flex';
    });
    window.addEventListener('appinstalled', () => {
      const btn = document.getElementById('installPwaBtn');
      if(btn) btn.style.display = 'none';
      _deferredPrompt = null;
    });
    function installPwa(){
      if(_deferredPrompt){
        _deferredPrompt.prompt();
        _deferredPrompt.userChoice.then(()=>{ _deferredPrompt=null; });
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--bg2:#111111;--bg3:#141414;--bg4:#1a1a1a;
  --accent:#2ec4b6;--accent2:#25a99d;--gold:#e8c46a;
  --text:#d4e8f0;--muted:#7aa8c0;--border:#1e3a4a;
  --green:#42b72a;--red:#fa3e3e;--warn:#e8c46a;
  --r:8px;--rs:6px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
background-image:
  radial-gradient(ellipse at 20% 0%, rgba(46,196,182,0.06) 0%, transparent 60%),
  radial-gradient(ellipse at 80% 100%, rgba(0,0,0,0.8) 0%, transparent 60%),
  repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(255,255,255,0.008) 60px,rgba(255,255,255,0.008) 61px);
}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#2ec4b6;border-radius:3px;}
a{text-decoration:none;color:inherit;}
button{font-family:'Exo 2',sans-serif;cursor:pointer;}

/* ===== TOPBAR ===== */
.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:#0f0f0f;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:1000;box-shadow:0 2px 4px rgba(0,0,0,.1);}
.tb-logo{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:900;color:var(--accent);cursor:pointer;}
.tb-logo span{color:var(--gold);}
.tb-search{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:100px;
  padding:6px 14px;width:220px;}
.tb-search input{background:none;border:none;outline:none;color:var(--text);font-family:'Exo 2',sans-serif;font-size:.85rem;width:100%;}
.tb-search input::placeholder{color:var(--muted);}
.tb-nav{display:flex;gap:4px;}
.tb-nav-btn{background:none;border:none;color:var(--text);padding:8px 18px;border-radius:var(--rs);font-size:1.1rem;
  transition:all .2s;position:relative;font-weight:700;}
.tb-nav-btn:hover,.tb-nav-btn.on{color:var(--accent);background:rgba(24,119,242,.07);border-bottom:2px solid var(--accent);}
.tb-right{display:flex;align-items:center;gap:6px;}
.tb-icon-btn{width:40px;height:40px;border-radius:50%;background:#1a2a3a;border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .18s;position:relative;}
.tb-icon-btn:hover{background:#243a4a;}
.tb-icon-btn svg{width:20px;height:20px;fill:#050505;display:block;}
.tb-avatar{width:40px;height:40px;border-radius:50%;border:2px solid var(--border);overflow:hidden;cursor:pointer;
  display:flex;align-items:center;justify-content:center;background:var(--bg4);font-size:.9rem;font-weight:700;color:var(--accent);}
.tb-avatar img{width:100%;height:100%;object-fit:cover;} .tb-icon-btn svg{fill:#d4e8f0;}
.notif-dot{position:absolute;top:2px;right:2px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid #fff;}

/* ===== LAYOUT ===== */
.layout{display:grid;grid-template-columns:280px 1fr 300px;gap:0;padding-top:56px;min-height:100vh;}
@media(max-width:1100px){.layout{grid-template-columns:240px 1fr;}}
/* Elementos mobile ocultos */
.tb-mobile-logo{display:none;}
.bottom-nav{display:none;}
.mobile-hamburger{display:none;}
.mobile-only-btn{display:none !important;}



/* ===== LEFT SIDEBAR ===== */
.sidebar-left{padding:12px 8px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;}
.sl-profile{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);cursor:pointer;transition:background .2s;margin-bottom:4px;}
.sl-profile:hover{background:#1a2a3a;}
.sl-av{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;color:var(--accent);background:var(--bg4);flex-shrink:0;}
.sl-av img{width:100%;height:100%;object-fit:cover;}
.sl-name{font-size:.9rem;font-weight:700;}
.sl-divider{height:1px;background:var(--border);margin:8px 4px;}
.sl-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);cursor:pointer;transition:background .2s;font-size:.88rem;color:var(--text);}
.sl-item:hover{background:#1a2a3a;color:var(--text);}
.sl-item-icon{font-size:1.1rem;width:24px;text-align:center;}
.sl-section-title{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:8px 10px 4px;}

/* ===== FEED ===== */
.feed{padding:16px;max-width:680px;margin:0 auto;}

/* ===== STORIES ===== */
.stories-row{display:flex;gap:10px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;}
.stories-row::-webkit-scrollbar{height:3px;}
.story-card{flex-shrink:0;width:80px;height:140px;border-radius:var(--r);overflow:hidden;cursor:pointer;position:relative;
  background:#e4e6eb;border:1px solid var(--border);transition:transform .2s;}
.story-card:hover{transform:scale(1.03);}
.story-card img{width:100%;height:100%;object-fit:cover;}
.story-card-bg{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#e4e6eb,#d8dadf);}
.story-av{width:32px;height:32px;border-radius:50%;border:2px solid var(--accent);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:var(--accent);background:#fff;flex-shrink:0;}
.story-av img{width:100%;height:100%;object-fit:cover;}
.story-name{font-size:.58rem;font-weight:700;margin-top:4px;text-align:center;padding:0 3px;}
.story-user-av{position:absolute;top:6px;left:6px;width:26px;height:26px;border-radius:50%;border:2px solid var(--accent);overflow:hidden;}
.story-user-av img{width:100%;height:100%;object-fit:cover;}
.story-gradient{position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,rgba(0,0,0,.8));}
.story-bottom-name{position:absolute;bottom:8px;left:8px;font-size:.65rem;font-weight:700;}
.story-add{background:#e4e6eb;border:2px dashed #bcc0c4;}
.story-add-icon{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:#000;font-weight:900;}

/* ===== VERIFICADO ===== */
.verified-ring{border:3px solid gold !important;box-shadow:0 0 10px rgba(255,215,0,.5);}
.verified-badge-inline{font-size:.75rem;display:inline-flex;align-items:center;}

/* Badge de verificación — imagen real */
img[title="Verificado"]{
  filter: drop-shadow(0 0 3px rgba(29,155,240,.6));
  transition: filter .2s, transform .2s;
}
img[title="Verificado"]:hover{
  filter: drop-shadow(0 0 6px rgba(29,155,240,.9));
  transform: scale(1.15);
}
/* En posts verificados el badge brilla más */
.post-verified img[title="Verificado"]{
  filter: drop-shadow(0 0 5px rgba(29,155,240,.8));
  animation: badgePulse 3s ease-in-out infinite;
}
@keyframes badgePulse{
  0%,100%{ filter: drop-shadow(0 0 3px rgba(29,155,240,.5)); }
  50%{ filter: drop-shadow(0 0 8px rgba(29,155,240,1)) drop-shadow(0 0 14px rgba(100,200,255,.5)); }
}

/* Perfil verificado — cover especial */
@keyframes goldShimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes particleFloat{0%{transform:translateY(0) translateX(0) scale(1);opacity:.7}50%{opacity:1}100%{transform:translateY(-120px) translateX(var(--dx)) scale(0);opacity:0}}
@keyframes avatarPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,.5),0 0 20px rgba(255,215,0,.3)}50%{box-shadow:0 0 0 8px rgba(255,215,0,.0),0 0 40px rgba(255,215,0,.6)}}
@keyframes ringRotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes nameGlow{0%,100%{text-shadow:0 0 10px rgba(255,215,0,.5),0 0 20px rgba(255,215,0,.3)}50%{text-shadow:0 0 20px rgba(255,215,0,.9),0 0 40px rgba(255,215,0,.5),0 0 60px rgba(255,165,0,.3)}}
@keyframes sealFadeIn{from{opacity:0;transform:rotate(-5deg) scale(.8)}to{opacity:1;transform:rotate(-5deg) scale(1)}}

.verif-cover-active{background:linear-gradient(135deg,#0a1628,#1a0a2e,#0d1f3c,#1a2a0a) !important;background-size:400% 400% !important;animation:goldShimmer 8s ease infinite !important;}
.verif-cover-active::before{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(255,215,0,.08),transparent 40%,transparent 60%,rgba(255,215,0,.05));pointer-events:none;z-index:1;}
.verif-cover-active .profile-cover-edit{z-index:10;}

/* Avatar ring animado */
.verif-av-ring{position:relative;}
.verif-av-ring::before{content:'';position:absolute;inset:-5px;border-radius:50%;border:3px solid transparent;border-top-color:gold;border-right-color:#ffd700;animation:ringRotate 3s linear infinite;z-index:2;pointer-events:none;}
.verif-av-ring::after{content:'';position:absolute;inset:-9px;border-radius:50%;border:2px solid transparent;border-bottom-color:rgba(255,215,0,.4);border-left-color:rgba(255,165,0,.3);animation:ringRotate 6s linear infinite reverse;z-index:2;pointer-events:none;}
.verif-av-ring .profile-av-big{border:3px solid gold !important;animation:avatarPulse 3s ease-in-out infinite;box-shadow:0 0 30px rgba(255,215,0,.4);}

/* Nombre dorado */
.verif-name-gold{background:linear-gradient(90deg,#ffd700,#ffec6e,#ffa500,#ffd700);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:goldShimmer 4s ease infinite;animation-play-state:running;}

/* Sello verificado diagonal */
.verif-seal{position:absolute;top:22px;right:-32px;background:linear-gradient(135deg,#b8860b,#ffd700,#b8860b);color:#000;font-size:.62rem;font-weight:900;padding:5px 40px;transform:rotate(35deg);letter-spacing:.08em;box-shadow:0 2px 12px rgba(255,215,0,.5);z-index:5;animation:sealFadeIn .5s ease forwards;font-family:'Exo 2',sans-serif;}

/* Banner premium bajo el nombre */
.verif-banner{display:flex;align-items:center;gap:8px;background:linear-gradient(90deg,rgba(255,215,0,.12),rgba(255,165,0,.08),rgba(255,215,0,.12));border:1px solid rgba(255,215,0,.25);border-radius:100px;padding:5px 14px;margin-top:6px;width:fit-content;}

/* Partículas canvas */
#verifParticles{position:absolute;inset:0;pointer-events:none;z-index:1;}

/* Stats card verificado */
.verif-stat-card{background:linear-gradient(135deg,rgba(255,215,0,.08),rgba(255,165,0,.04));border:1px solid rgba(255,215,0,.2);border-radius:14px;padding:14px;text-align:center;transition:transform .2s,box-shadow .2s;}
.verif-stat-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(255,215,0,.15);}

/* ===== POST VERIFICADO ===== */
@keyframes verifPostGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,.0),0 1px 3px rgba(0,0,0,.1)}50%{box-shadow:0 0 18px 3px rgba(255,215,0,.18),0 1px 3px rgba(0,0,0,.1)}}
@keyframes verifBorderFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes verifAvatarSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes verifBadgeBounce{0%,100%{transform:scale(1)}40%{transform:scale(1.3)}60%{transform:scale(.9)}}
@keyframes verifShine{0%{left:-100%}100%{left:200%}}
@keyframes verifStarPop{0%{opacity:0;transform:scale(0) rotate(-30deg)}60%{opacity:1;transform:scale(1.2) rotate(5deg)}100%{opacity:1;transform:scale(1) rotate(0deg)}}

.post-verified{
  position:relative;
  border:1.5px solid rgba(255,215,0,.45) !important;
  background:linear-gradient(180deg,rgba(255,215,0,.04) 0%,#fff 60%) !important;
  animation:verifPostGlow 4s ease-in-out infinite;
  overflow:hidden;
}
.post-verified::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#ffd700,#ffec6e,#ffa500,#ff6f00,#ffd700);
  background-size:300% 100%;
  animation:verifBorderFlow 3s linear infinite;
  z-index:2;
}
.post-verified .post-header{
  background:linear-gradient(90deg,rgba(255,215,0,.07),transparent 70%);
}

/* Avatar animado en post verificado */
.post-verified .post-av{
  border:2px solid gold !important;
  box-shadow:0 0 10px rgba(255,215,0,.5) !important;
  position:relative;
}
.post-verified .post-av-wrap{
  position:relative;
  flex-shrink:0;
}
.post-verified .post-av-wrap::before{
  content:'';
  position:absolute;
  inset:-4px;
  border-radius:50%;
  background:conic-gradient(gold 0deg, transparent 120deg, gold 240deg, transparent 360deg);
  animation:verifAvatarSpin 3s linear infinite;
  z-index:0;
}
.post-verified .post-av-wrap::after{
  content:'';
  position:absolute;
  inset:-2px;
  border-radius:50%;
  background:#fff;
  z-index:1;
}
.post-verified .post-av{
  position:relative;
  z-index:2;
}

/* Nombre dorado en post */
.post-verified .post-author{
  background:linear-gradient(90deg,#b8860b,#ffd700,#ffec6e,#ffa500,#b8860b);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:verifBorderFlow 4s ease infinite;
}

/* Etiqueta "Verificado" en la esquina */
.verif-post-tag{
  position:absolute;
  top:10px;right:10px;
  background:linear-gradient(135deg,#b8860b,#ffd700);
  color:#000;
  font-size:.6rem;
  font-weight:900;
  padding:3px 8px;
  border-radius:100px;
  letter-spacing:.06em;
  z-index:3;
  animation:verifStarPop .5s cubic-bezier(.34,1.56,.64,1) both;
  box-shadow:0 2px 8px rgba(255,215,0,.5);
  display:flex;align-items:center;gap:3px;
}

/* Barra inferior dorada */
.post-verified .post-actions{
  border-top:1px solid rgba(255,215,0,.2) !important;
  background:rgba(255,215,0,.03);
}
.post-verified .post-stats{
  border-top:1px solid rgba(255,215,0,.15) !important;
}

/* Shine sweep */
.post-verified .post-header::after{
  content:'';
  position:absolute;
  top:0;bottom:0;
  width:60px;
  background:linear-gradient(90deg,transparent,rgba(255,215,0,.12),transparent);
  animation:verifShine 4s ease-in-out infinite;
  pointer-events:none;
}


@keyframes voicePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.3)}}
/* ===== GIF PICKER ===== */
.gif-picker{position:absolute;bottom:calc(100% + 8px);left:0;width:320px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.3);z-index:9999;overflow:hidden;display:none;flex-direction:column;}
.gif-picker.open{display:flex;}
.gif-search{padding:8px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center;}
.gif-search input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:100px;padding:6px 12px;font-size:.82rem;color:var(--text);outline:none;font-family:'Exo 2',sans-serif;}
.gif-search input:focus{border-color:var(--accent);}
.gif-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;padding:6px;max-height:240px;overflow-y:auto;}
.gif-grid::-webkit-scrollbar{width:4px;}
.gif-grid::-webkit-scrollbar-thumb{background:#bcc0c4;border-radius:2px;}
.gif-item{aspect-ratio:1;overflow:hidden;cursor:pointer;border-radius:4px;background:var(--bg4);}
.gif-item img{width:100%;height:100%;object-fit:cover;transition:transform .15s;}
.gif-item:hover img{transform:scale(1.05);}
.gif-powered{text-align:center;padding:4px;font-size:.62rem;color:var(--muted);border-top:1px solid var(--border);}

/* ===== CARRETES ===== */
.cfbtn{background:var(--bg3);border:1px solid var(--border);border-radius:100px;color:var(--muted);padding:4px 10px;font-size:.73rem;font-weight:700;cursor:pointer;font-family:'Exo 2',sans-serif;transition:all .15s;}
.cfbtn:hover{border-color:var(--accent);color:var(--accent);}
.cfbtn.active{background:rgba(0,198,255,.15);border-color:var(--accent);color:var(--accent);}

/* ===== POST BOX ===== */
.post-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:16px;box-shadow:0 1px 2px rgba(0,0,0,.1);}
.post-box-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.post-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:100px;padding:10px 18px;
  color:var(--muted);font-family:'Exo 2',sans-serif;font-size:.9rem;cursor:pointer;transition:all .2s;}
.post-input:hover{background:#e4e6eb;color:var(--text);}
.post-box-actions{display:flex;gap:4px;border-top:1px solid #dddfe2;padding-top:10px;}
.pba{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:7px;border-radius:var(--rs);
  cursor:pointer;font-size:.82rem;font-weight:600;color:var(--muted);background:none;border:none;transition:all .2s;}
.pba:hover{background:var(--bg3);color:var(--text);}

/* ===== POST CARD ===== */
.post{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:16px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.1);}
/* ── TEMAS DE PUBLICACIÓN (tienda) ── */
.post-theme-ocean    { background:linear-gradient(160deg,#0a1628,#0d2347) !important; border-color:rgba(0,150,255,.3) !important; box-shadow:0 0 20px rgba(0,100,255,.15) !important; }
.post-theme-fuego    { background:linear-gradient(160deg,#1a0800,#2d0f00) !important; border-color:rgba(255,80,0,.35) !important; box-shadow:0 0 20px rgba(255,60,0,.2) !important; }
.post-theme-galaxia  { background:linear-gradient(160deg,#0c0820,#150d30) !important; border-color:rgba(140,80,255,.35) !important; box-shadow:0 0 20px rgba(120,60,255,.2) !important; }
.post-theme-bosque   { background:linear-gradient(160deg,#071510,#0d2318) !important; border-color:rgba(0,200,80,.3) !important; box-shadow:0 0 16px rgba(0,180,60,.15) !important; }
.post-theme-oro      { background:linear-gradient(160deg,#1a1400,#261e00) !important; border-color:rgba(255,200,0,.4) !important; box-shadow:0 0 20px rgba(255,190,0,.2) !important; }
.post-theme-neon     { background:linear-gradient(160deg,#0d001a,#180030) !important; border-color:rgba(200,0,255,.4) !important; box-shadow:0 0 20px rgba(180,0,255,.25) !important; }
.post-theme-hielo    { background:linear-gradient(160deg,#071828,#0d2535) !important; border-color:rgba(0,220,255,.35) !important; box-shadow:0 0 18px rgba(0,200,255,.2) !important; }
.post-theme-rosa     { background:linear-gradient(160deg,#1a0615,#280a20) !important; border-color:rgba(255,80,180,.35) !important; box-shadow:0 0 18px rgba(255,60,160,.2) !important; }
.post-theme-carbon   { background:linear-gradient(160deg,#111,#1a1a1a) !important; border-color:rgba(255,255,255,.15) !important; box-shadow:0 0 12px rgba(0,0,0,.6) !important; }
.post-theme-sunset   { background:linear-gradient(160deg,#1a0a00,#2a1200) !important; border-color:rgba(255,140,0,.4) !important; box-shadow:0 0 20px rgba(255,120,0,.2) !important; }
/* texto adaptado al tema */
.post-theme-ocean .post-text,.post-theme-fuego .post-text,.post-theme-galaxia .post-text,
.post-theme-bosque .post-text,.post-theme-oro .post-text,.post-theme-neon .post-text,
.post-theme-hielo .post-text,.post-theme-rosa .post-text,.post-theme-carbon .post-text,
.post-theme-sunset .post-text { color:#e8eaf0; }
.post-theme-ocean .post-author,.post-theme-fuego .post-author,.post-theme-galaxia .post-author,
.post-theme-bosque .post-author,.post-theme-oro .post-author,.post-theme-neon .post-author,
.post-theme-hielo .post-author,.post-theme-rosa .post-author,.post-theme-carbon .post-author,
.post-theme-sunset .post-author { color:#fff; }
.post-header{display:flex;align-items:center;gap:10px;padding:12px 14px;}
.post-av{width:42px;height:42px;border-radius:50%;border:2px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent);background:var(--bg4);flex-shrink:0;font-size:1rem;}
.post-av img{width:100%;height:100%;object-fit:cover;}
.post-meta{flex:1;}
.post-author{font-weight:700;font-size:.9rem;cursor:pointer;}
.post-author:hover{color:var(--accent);}
.post-time{font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:4px;}
.post-menu{background:none;border:none;color:var(--muted);font-size:1.1rem;padding:4px 8px;border-radius:var(--rs);transition:background .2s;}
.post-menu:hover{background:#e4e6eb;color:var(--text);}
.post-text{padding:0 14px 12px;font-size:.9rem;line-height:1.6;}
.post-img{width:100%;max-height:160px;object-fit:cover;display:block;cursor:pointer;}
.post-img-grid{display:grid;gap:2px;}
.post-img-grid.g2{grid-template-columns:1fr 1fr;}
.post-img-grid.g3{grid-template-columns:1fr 1fr;grid-template-rows:auto auto;}
.post-img-grid.g3 .img-main{grid-column:1/-1;}
.post-img-grid img{width:100%;height:100px;object-fit:cover;cursor:pointer;transition:opacity .2s;}
.post-img-grid img:hover{opacity:.9;}
.post-stats{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-top:1px solid var(--border);}
.post-rxn-summary{display:flex;align-items:center;gap:5px;font-size:.8rem;color:var(--muted);cursor:pointer;}
.post-rxn-summary:hover{color:var(--text);}
.post-actions{display:flex;border-top:1px solid var(--border);}
.post-action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;
  background:none;border:none;color:var(--muted);font-size:.85rem;font-weight:600;transition:all .2s;border-radius:0;}
.post-action-btn:hover{background:var(--bg3);color:var(--text);}
.post-action-btn.active{color:var(--accent);}

/* REACTION POPUP */
.rxn-wrap{position:relative;}
.rxn-popup{display:none;position:absolute;bottom:calc(100% + 6px);left:0;
  background:#fff;border:1px solid var(--border);border-radius:100px;
  padding:6px 10px;gap:4px;align-items:center;z-index:600;box-shadow:0 2px 12px rgba(0,0,0,.2);white-space:nowrap;}
.rxn-popup.show{display:flex;animation:rxnPop .16s ease;}
@keyframes rxnPop{from{opacity:0;transform:scale(.6) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.rxn-btn{background:none;border:none;font-size:1.4rem;cursor:pointer;padding:2px 4px;border-radius:50%;transition:transform .13s;line-height:1;position:relative;}
.rxn-btn:hover{transform:scale(1.6) translateY(-6px);}
.rxn-btn:hover .rxn-tooltip{opacity:1!important;}

/* COMMENTS */
.comments-section{padding:8px 14px;display:none;}

/* Reply button in comments */
.cmt-reply-btn{background:none;border:none;font-size:.75rem;font-weight:700;color:var(--muted);cursor:pointer;padding:2px 6px;border-radius:100px;transition:color .15s;}
.cmt-reply-btn:hover{color:var(--accent);}
/* Comment that is a reply (@mention) gets a subtle left border */
.comment-item.is-reply .comment-bubble{border-left:2px solid rgba(0,198,255,.25);padding-left:8px;}

/* Comment menu hover (CSS-only, no JS needed) */
.cmt-menu-wrap{position:relative;flex-shrink:0;}
.cmt-menu-wrap .cmt-menu-dropdown{display:none;position:absolute;right:0;top:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);min-width:150px;z-index:9999;box-shadow:0 2px 12px rgba(0,0,0,.15);overflow:hidden;}
.cmt-menu-wrap:hover .cmt-menu-dropdown{display:block;}
.cmt-menu-wrap .cmt-dots-btn{background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.cmt-menu-wrap:hover .cmt-dots-btn{background:var(--bg4);}

/* Comment reaction popup hover (CSS-only) */
.cmt-rxn-wrap{position:relative;}
.cmt-rxn-wrap .cmt-rxn-popup{display:none;position:absolute;bottom:100%;left:0;background:var(--bg2);border:1px solid var(--border);border-radius:100px;padding:8px 10px 16px;align-items:center;box-shadow:0 2px 12px rgba(0,0,0,.2);white-space:nowrap;z-index:9998;flex-direction:row;}
.cmt-rxn-wrap:hover .cmt-rxn-popup{display:flex;}

.comments-section.open{display:block;}
.comment-input-row{display:flex;gap:8px;margin-bottom:10px;}
.comment-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:100px;
  padding:8px 14px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:.83rem;outline:none;}
.comment-input:focus{border-color:var(--accent);background:var(--bg3);}
.comment-send{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#000;
  width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;}
.comment-item{display:flex;gap:8px;margin-bottom:8px;}
.comment-bubble{background:var(--bg3);border-radius:var(--r);border-bottom-left-radius:4px;padding:8px 12px;flex:1;}
.comment-author{font-size:.78rem;font-weight:700;color:var(--accent);margin-bottom:2px;}
.comment-text{font-size:.83rem;line-height:1.4;}


/* ===== XP / LEVEL / STREAK ===== */
.xp-bar-wrap{background:#e4e6eb;border-radius:100px;height:8px;overflow:hidden;margin-top:4px;}
.xp-bar-fill{height:100%;border-radius:100px;transition:width .6s ease;background:linear-gradient(90deg,var(--accent),var(--accent2));}
.level-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:.72rem;font-weight:700;border:1px solid;}
.streak-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:.72rem;font-weight:700;background:rgba(255,100,0,.12);border:1px solid rgba(255,100,0,.35);color:#ff8c42;}

/* ===== RIGHT SIDEBAR ===== */
.sidebar-right{padding:12px 8px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;}
@media(max-width:1100px){.sidebar-right{display:none;}}
.sr-title{font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding:0 4px;}
.contact-item{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:var(--r);cursor:pointer;transition:background .2s;}
.contact-item:hover{background:var(--bg3);}
.contact-av{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent);background:var(--bg3);flex-shrink:0;position:relative;}
.contact-av img{width:100%;height:100%;object-fit:cover;}
.online-dot{position:absolute;bottom:0px;right:0px;width:10px;height:10px;background:var(--green);border-radius:50%;border:2px solid #fff;animation:pulse-green 2s infinite;}
.contact-name{font-size:.83rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.contact-status{font-size:.68rem;color:var(--green);font-weight:500;}
@keyframes pulse-green{0%,100%{box-shadow:0 0 0 0 rgba(66,183,42,.5);}50%{box-shadow:0 0 0 4px rgba(66,183,42,0);}}
/* Suggested post preview card */
.sug-post-card{display:flex;gap:10px;align-items:center;padding:8px;border-radius:var(--rs);cursor:pointer;transition:background .18s;border:1px solid transparent;margin-bottom:6px;}
.sug-post-card:hover{background:var(--bg3);border-color:var(--border);}
.sug-post-thumb{width:56px;height:56px;border-radius:var(--rs);object-fit:cover;flex-shrink:0;background:var(--bg4);}
.sug-post-thumb-empty{width:56px;height:56px;border-radius:var(--rs);flex-shrink:0;background:linear-gradient(135deg,#e4e6eb,#d8dadf);display:flex;align-items:center;justify-content:center;font-size:1.5rem;}
.sug-post-info{flex:1;min-width:0;}
.sug-post-author{font-size:.72rem;color:var(--muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sug-post-text{font-size:.78rem;font-weight:500;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.sug-post-meta{font-size:.65rem;color:var(--muted);margin-top:3px;}

/* ===== MODALS ===== */
.mo{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;padding:16px;}
.mo.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);width:100%;
  max-height:90vh;overflow-y:auto;position:relative;animation:mIn .22s ease;}
@keyframes mIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-sm{max-width:480px;padding:24px;}
.modal-md{max-width:600px;padding:24px;}
.modal-lg{max-width:900px;}
.mcx{position:absolute;top:12px;right:12px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);
  width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .2s;}
.mcx:hover{color:var(--red);border-color:var(--red);}
.mt{font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:18px;text-align:center;padding-bottom:14px;border-bottom:1px solid var(--border);}

/* FORM */
.fg{margin-bottom:14px;}
.fl{display:block;font-size:.72rem;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'Exo 2',sans-serif;
  font-size:.87rem;padding:9px 13px;border-radius:var(--rs);outline:none;transition:all .2s;}
.fi:focus{border-color:var(--accent);}
.fi::placeholder{color:var(--muted);}
textarea.fi{resize:vertical;min-height:80px;}
select.fi option{background:var(--bg3);color:var(--text);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{padding:10px 22px;border-radius:var(--rs);font-family:'Exo 2',sans-serif;font-size:.87rem;font-weight:700;cursor:pointer;border:none;transition:all .2s;letter-spacing:.4px;}
.btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;}
.btn-p:hover{opacity:.9;}
.btn-s{background:#e4e6eb;color:var(--text);border:1px solid var(--border);}
.active-map{background:rgba(0,198,255,.12)!important;border-color:var(--accent)!important;color:var(--accent)!important;}
.adm-tab{background:#e4e6eb;border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:var(--rs);font-size:.78rem;cursor:pointer;font-family:'Exo 2',sans-serif;font-weight:600;transition:all .15s;}
.adm-tab:hover{color:var(--text);border-color:var(--accent);}
.adm-on{background:rgba(0,198,255,.1)!important;border-color:var(--accent)!important;color:var(--accent)!important;}
.btn-s:hover{border-color:var(--accent);color:var(--accent);}
.btn-full{width:100%;}

/* ===== PROFILE PAGE ===== */
.profile-cover{height:300px;background:linear-gradient(135deg,#e7f3ff,#1877f222);background-size:cover;background-position:center;position:relative;overflow:hidden;}

/* ── GALERÍA INSTAGRAM ── */
@keyframes _igFadeIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}

/* ── BANNERS ANIMADOS DE TIENDA ── */
/* Capa de partículas que se pone DENTRO del cover */
#profileBannerCanvas { position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2; }

/* Banner Fuego */
.banner-fuego .profile-cover {
  background: linear-gradient(180deg,#0a0000 0%,#1a0500 40%,#3d0f00 100%) !important;
}
/* Banner Flores */
.banner-flores .profile-cover {
  background: linear-gradient(180deg,#0d0018 0%,#1a0035 40%,#2a0050 100%) !important;
}
/* Banner Océano */
.banner-ocean .profile-cover {
  background: linear-gradient(180deg,#000d1a 0%,#001f3f 50%,#003366 100%) !important;
}
/* Banner Aurora */
.banner-aurora .profile-cover {
  background: linear-gradient(180deg,#000d0a 0%,#001a10 50%,#002a1a 100%) !important;
}
/* Banner Galaxia */
.banner-galaxy .profile-cover {
  background: linear-gradient(180deg,#050010 0%,#0d0030 50%,#1a0050 100%) !important;
}
/* Banner Tormenta */
.banner-storm .profile-cover {
  background: linear-gradient(180deg,#060608 0%,#0d0d14 50%,#12121e 100%) !important;
}

/* partícula genérica */
.shop-banner-particle {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  animation: bannerFloat linear infinite;
}
@keyframes bannerFloat {
  0%   { transform: translateY(100%) translateX(0) scale(1); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: .8; }
  100% { transform: translateY(-120%) translateX(var(--dx,20px)) scale(.4); opacity: 0; }
}
@keyframes bannerFlicker {
  0%,100%{ transform: scaleY(1) scaleX(1); }
  50%    { transform: scaleY(1.08) scaleX(.96); }
}
@keyframes petalSpin {
  0%   { transform: translateY(0) rotate(0deg) translateX(0); opacity:0; }
  5%   { opacity:.9; }
  95%  { opacity:.7; }
  100% { transform: translateY(-130%) rotate(var(--rot,360deg)) translateX(var(--dx,30px)); opacity:0; }
}
@keyframes starTwinkle {
  0%,100%{ opacity:.3; transform:scale(.8); }
  50%    { opacity:1;  transform:scale(1.2); }
}
@keyframes lightningFlash {
  0%,90%,100%{ opacity:0; }
  92%,98%    { opacity:.6; }
}
@keyframes waveMove {
  0%  { transform:translateX(0) translateY(0); }
  50% { transform:translateX(-30px) translateY(8px); }
  100%{ transform:translateX(0) translateY(0); }
}
.profile-cover-img{width:100%;height:100%;object-fit:cover;}
.profile-cover-edit{position:absolute;bottom:14px;right:14px;background:rgba(0,0,0,.7);border:1px solid var(--border);color:var(--text);
  padding:7px 14px;border-radius:var(--rs);font-size:.8rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;}
.profile-info-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px 0;}
.profile-av-wrap{position:relative;margin-top:-52px;margin-bottom:10px;width:fit-content;}
.profile-av-big{width:168px;height:168px;border-radius:50%;border:4px solid var(--bg2);overflow:hidden;
  display:flex;align-items:center;justify-content:center;font-size:3.5rem;font-weight:800;color:var(--accent);background:var(--bg3);}
.profile-av-big img{width:100%;height:100%;object-fit:cover;}
.profile-av-edit{position:absolute;bottom:8px;right:8px;background:var(--bg3);border:2px solid var(--bg2);
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;}
.profile-name-row{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px;padding-bottom:14px;}
.profile-name{font-family:'Orbitron',monospace;font-size:1.6rem;font-weight:900;}
.profile-bio{font-size:.85rem;color:var(--muted);margin-top:3px;}
.profile-tabs{display:flex;border-top:1px solid var(--border);gap:2px;}
.ptab{padding:12px 18px;font-size:.85rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;}
.ptab:hover{background:var(--bg3);color:var(--text);}
.ptab.on{color:var(--accent);border-bottom-color:var(--accent);}
/* TIENDA */
.shop-cat-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:100px;padding:5px 12px;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Exo 2',sans-serif;}
.shop-cat-btn.active,.shop-cat-btn:hover{background:rgba(255,200,0,.15);border-color:rgba(255,200,0,.4);color:gold;}
.shop-item{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:all .25s;position:relative;}
.shop-item:hover{border-color:rgba(255,200,0,.4);transform:translateY(-2px);box-shadow:0 4px 16px rgba(255,200,0,.1);}
.shop-item.equipped{border-color:gold;background:rgba(255,200,0,.08);box-shadow:0 0 12px rgba(255,200,0,.2);}
.shop-item-preview{font-size:2.2rem;margin-bottom:6px;display:block;}
.shop-item-name{font-size:.72rem;font-weight:700;color:var(--text);margin-bottom:3px;}
.shop-item-type{font-size:.6rem;color:var(--muted);margin-bottom:8px;}
.shop-item-price{font-size:.7rem;font-weight:800;color:gold;}
.shop-item-equipped-badge{position:absolute;top:6px;right:6px;background:gold;color:#000;font-size:.55rem;font-weight:900;border-radius:100px;padding:2px 6px;}
.shop-item-btn{width:100%;margin-top:8px;padding:5px;font-size:.68rem;font-weight:700;border-radius:8px;border:none;cursor:pointer;font-family:'Exo 2',sans-serif;transition:all .2s;}
.shop-item-btn.equip{background:linear-gradient(135deg,gold,#ff8c00);color:#000;}
.shop-item-btn.unequip{background:rgba(255,200,0,.15);border:1px solid rgba(255,200,0,.3);color:gold;}
.shop-preview-modal{}
/* MARCOS DE TIENDA */
/* ===== MARCOS — aplica a perfil propio, ajeno Y posts ===== */
.ring-gold  #profAvBig, .ring-gold  .profile-av-big, .ring-gold  .post-av, .ring-gold  #upAv  { box-shadow:0 0 0 3px gold,0 0 16px rgba(255,200,0,.5) !important; }
.ring-fire  #profAvBig, .ring-fire  .profile-av-big, .ring-fire  .post-av, .ring-fire  #upAv  { box-shadow:0 0 0 3px #ff4500,0 0 20px rgba(255,69,0,.6) !important; animation:ringFire 1.5s ease-in-out infinite alternate; }
.ring-ice   #profAvBig, .ring-ice   .profile-av-big, .ring-ice   .post-av, .ring-ice   #upAv  { box-shadow:0 0 0 3px #00cfff,0 0 20px rgba(0,207,255,.5) !important; animation:ringIce 2s ease-in-out infinite alternate; }
.ring-fish  #profAvBig, .ring-fish  .profile-av-big, .ring-fish  .post-av, .ring-fish  #upAv  { box-shadow:0 0 0 3px #00ff88,0 0 16px rgba(0,255,136,.4) !important; }
.ring-legend #profAvBig,.ring-legend .profile-av-big,.ring-legend .post-av, .ring-legend #upAv { box-shadow:0 0 0 4px gold,0 0 0 7px rgba(255,200,0,.3),0 0 30px rgba(255,200,0,.6) !important; animation:ringLegend 2s linear infinite; }
.ring-neon  #profAvBig, .ring-neon  .profile-av-big, .ring-neon  .post-av, .ring-neon  #upAv  { box-shadow:0 0 0 3px #b400ff,0 0 20px rgba(180,0,255,.6) !important; animation:ringNeon 1.5s ease-in-out infinite alternate; }
.ring-galaxy #profAvBig,.ring-galaxy .profile-av-big,.ring-galaxy .post-av, .ring-galaxy #upAv { box-shadow:0 0 0 3px #7b2fff,0 0 0 6px rgba(123,47,255,.3),0 0 28px rgba(123,47,255,.5) !important; animation:ringGalaxy 3s linear infinite; }
.ring-red   #profAvBig, .ring-red   .profile-av-big, .ring-red   .post-av, .ring-red   #upAv  { box-shadow:0 0 0 3px #e00,0 0 18px rgba(220,0,0,.6) !important; }
.ring-rainbow #profAvBig,.ring-rainbow .profile-av-big,.ring-rainbow .post-av,.ring-rainbow #upAv { animation:ringRainbow 2s linear infinite !important; }
.ring-platinum #profAvBig,.ring-platinum .profile-av-big,.ring-platinum .post-av,.ring-platinum #upAv { box-shadow:0 0 0 4px #c0c0c0,0 0 0 7px rgba(192,192,192,.25),0 0 22px rgba(192,192,192,.5) !important; }
@keyframes ringFire   { from{box-shadow:0 0 0 3px #ff4500,0 0 16px rgba(255,69,0,.5);} to{box-shadow:0 0 0 3px #ff8c00,0 0 28px rgba(255,140,0,.8);} }
@keyframes ringIce    { from{box-shadow:0 0 0 3px #00cfff,0 0 12px rgba(0,207,255,.4);} to{box-shadow:0 0 0 4px #80eaff,0 0 24px rgba(128,234,255,.7);} }

const IMGBB_KEY = '75c60bcb472ab597b1dee463438b18ba';
async function uploadImage(fileOrBase64, folder) {
  let base64;
  if (typeof fileOrBase64 === 'string' && fileOrBase64.startsWith('data:')) {
    base64 = fileOrBase64.split(',')[1];
  } else if (typeof fileOrBase64 === 'string') {
    const res = await fetch(fileOrBase64);
    const blob = await res.blob();
    base64 = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.readAsDataURL(blob);
    });
  } else {
    base64 = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.readAsDataURL(fileOrBase64);
    });
  }
  const formData = new FormData();
  formData.append('image', base64);
  formData.append('key', IMGBB_KEY);
  const res = await fetch('https://api.imgbb.com/1/upload', {
    method: 'POST', body: formData
  });
  const data = await res.json();
  if (!data.data || !data.data.url) throw new Error('Error subiendo imagen a ImgBB');
  return data.data.url;
}

      const ttl = d.data().userVerified ? 172800000 : 86400000;
      if(t && (now - t) > ttl){ expiredIds.push(d.id); return false; }
      return true;
    }).map(d => ({ id: d.id, ...d.data(), time: d.data().time?.toMillis?.() || Date.now() }));
    expiredIds.forEach(id => deleteDoc(doc(db, 'stories', id)).catch(()=>{}));
    renderStories();
  });
}

function toast(msg, type='inf'){
  const ct = document.getElementById('toastCt');
  if(!ct) return;
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icon = type==='ok'?'✅':type==='err'?'❌':'ℹ️';
  t.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  ct.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(20px)'; t.style.transition='all .3s'; setTimeout(()=>t.remove(),300); }, 3000);
}

function fmtT(ts){
  if(!ts) return '';
  const d = new Date(ts), now = Date.now(), diff = now - d.getTime();
  if(diff < 60000) return 'Ahora';
  if(diff < 3600000) return Math.floor(diff/60000)+'m';
  if(diff < 86400000) return Math.floor(diff/3600000)+'h';
  return Math.floor(diff/86400000)+'d';
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderCommentText(text){
  if(!text) return '';
  const escaped = esc(text);
  return escaped.replace(/@(\w{2,30})/g, (match, nick)=>{
    return '<span style="color:var(--accent);font-weight:700;cursor:pointer;" onclick="searchMentionedUser(\'' + nick + '\')">' + '@' + nick + '</span>';
  });
}

async function searchMentionedUser(nick){
  if(!nick) return;
  try {
    const snap = await getDocs(collection(db,'users'));
    const user = snap.docs.map(d=>({id:d.id,...d.data()}))
      .find(u=>(u.nick||'').toLowerCase()===nick.toLowerCase());
    if(user) openUserProfile(user.id, user.nick);
    else toast('@'+nick+' no encontrado','err');
  } catch(e){ toast('Error buscando usuario','err'); }
}

async function doLogin(){
  let input = document.getElementById('lEmail').value.trim();
  const pw = document.getElementById('lPass').value;
  const errEl = document.getElementById('lErr');
  const btn = document.getElementById('loginBtn');
  errEl.textContent = ''; errEl.style.display='none';
  if(!input||!pw){ errEl.textContent='Completa todos los campos'; errEl.style.display='block'; return; }

  if(btn){ btn.disabled=true; btn.textContent='Iniciando...'; }

  // If input doesn't look like an email, treat it as a nick — look up the email
  if(!input.includes('@')){
    try {
      const nickLower = input.toLowerCase();
      let found = null;
      try {
        const q = await getDocs(query(collection(db,'users'), where('nick','==',input)));
        found = q.docs[0];
      } catch(e2){}
      if(!found){
        try {
          const q2 = await getDocs(query(collection(db,'users'), where('nickLower','==',nickLower)));
          found = q2.docs[0];
        } catch(e3){}
      }
      if(!found){
        errEl.textContent = 'Nick no encontrado. Verificá el nombre.';
        if(btn){ btn.disabled=false; btn.textContent='Iniciar sesión'; }
        return;
      }
      input = found.data().email;
      if(!input){
        errEl.textContent = 'No se pudo obtener el email de este nick';
        if(btn){ btn.disabled=false; btn.textContent='Iniciar sesión'; }
        return;
      }
    } catch(e){
      errEl.textContent = 'Error de conexión. Reintentá.';
      if(btn){ btn.disabled=false; btn.textContent='Iniciar sesión'; }
      return;
    }
  }

  try {
    // Apply persistence based on checkbox
    const remember = document.getElementById('rememberMe')?.checked !== false;
    await setPersistence(auth, browserLocalPersistence);
    const cred = await signInWithEmailAndPassword(auth, input, pw);
    const snap = await getDoc(doc(db, 'users', cred.user.uid));
    if(!snap.exists()){
      errEl.textContent = 'Cuenta no encontrada en la base de datos.';
      if(btn){ btn.disabled=false; btn.textContent='Iniciar sesión'; }
      return;
    }
    window.CU = {id: cred.user.uid, ...snap.data()};
    saveAccountLocally(input, window.CU.nick);
    document.getElementById('mAuth').style.display='none';
    onLogin();
    toast('¡Bienvenido '+window.CU.nick+'! 🎣','ok');
  } catch(e) {
    let msg = 'Contraseña incorrecta o usuario no encontrado';
    if(e.code === 'auth/invalid-email') msg = 'Email inválido';
    else if(e.code === 'auth/user-not-found') msg = 'Usuario no encontrado';
    else if(e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') msg = 'Contraseña incorrecta';
    else if(e.code === 'auth/too-many-requests') msg = 'Demasiados intentos. Esperá unos minutos.';
    else if(e.code === 'auth/network-request-failed') msg = 'Error de red. Verificá tu conexión.';
    errEl.textContent = msg;
    if(btn){ btn.disabled=false; btn.textContent='Iniciar sesión'; }
  }
}

let _trofChip = '';
function _mapImg(f){
  if(!f.maps||!f.maps.length) return '';
  return f.maps.map(function(m){
    return '<img src="'+m.i+'" title="'+m.n+'" style="width:32px;height:22px;object-fit:cover;border-radius:3px;opacity:.85;margin-left:2px;" onerror="this.style.display=\'none\'">';
  }).join('');
}
function renderTrofeos(data) {
  const list = document.getElementById('trofeoList');
  const noRes = document.getElementById('trofeoNoResults');
  const cnt = document.getElementById('fishCount');
  if(!list) return;
  if(cnt) cnt.textContent = data.length;
  if(!data.length) { list.innerHTML=''; if(noRes) noRes.style.display='block'; return; }
  if(noRes) noRes.style.display='none';
  const base = 'https://en.rf4-stat.ru/images/rf4game/';
  const proxy = 'https://wsrv.nl/?url=';
  const troff = 'https://en.rf4-stat.ru/images/troff.png';
  const troffs = 'https://en.rf4-stat.ru/images/troff_super.png';
  list.innerHTML = data.map((f,i) => {
    const bg = i%2===0 ? 'background:var(--bg2);' : 'background:var(--card);';
    const isNA = v => v==='—';
    const rawImg = f.img.startsWith('http') ? f.img : base+f.img+'.png';
    const imgSrc = proxy + encodeURIComponent(rawImg);
    return `<div class="trof-row" style="${bg}">
      <img class="trof-fish-img" src="${imgSrc}" onerror="this.style.display='none'" alt="${f.n}" loading="lazy">
      <div class="trof-name" style="display:flex;align-items:center;gap:8px;">${f.n}${_mapImg(f)}</div>
      <img class="trof-icon" src="${troff}" alt="trofeo">
      <div class="trof-weight${isNA(f.t)?' na':''}">${f.t}</div>
      <div class="trof-weight rare${isNA(f.r)?' na':''}" style="display:flex;align-items:center;justify-content:center;gap:5px;">
        ${!isNA(f.r)?`<img src="${troffs}" style="width:18px;height:18px;object-fit:contain;" alt="raro">`:''}
        ${f.r}
      </div>
    </div>`;
  }).join('');
}
function _norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function filterTrofeos(q) {
  const kw = _norm(q).trim();
  let data = FISH_DB;
  if(_trofChip) data = data.filter(f => _norm(f.n).includes(_trofChip));
  if(kw) data = data.filter(f => _norm(f.n).includes(kw));
  renderTrofeos(data);
}
function setTrofChip(el, kw) {
  document.querySelectorAll('.trof-chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  _trofChip = kw;
  filterTrofeos(document.getElementById('trofeoSearch')?.value||'');
}
window.filterTrofeos = filterTrofeos;
window.setTrofChip = setTrofChip;

// Registra vista y escucha contador en tiempo real
async function _svRegisterView(){
  const s = _stories[_svIdx];
  if(!s || !window.CU || !db) return;
  const isOwner = s.userId === window.CU.id;

  // Cancela listener anterior ANTES de arrancar uno nuevo
  if(window._svViewsUnsub){ window._svViewsUnsub(); window._svViewsUnsub = null; }

  // Oculta panel lista si cambia historia
  const listPanel = document.getElementById('svViewersList');
  if(listPanel) listPanel.style.display='none';

  // Muestra el ojito solo si la historia tiene ID real de Firestore
  const wrap = document.getElementById('svViewsWrap');
  if(!s.id){ if(wrap) wrap.style.display='none'; return; }
  if(wrap) wrap.style.display='flex';

  try {
    // Registra la vista dentro del doc de la historia (solo si no es el dueño)
    if(!isOwner){
      const viewData = {};
      viewData[`views.${window.CU.id}`] = { nick: window.CU.nick, av: window.CU.av||'', time: Date.now() };
      await updateDoc(doc(db,'stories', s.id), viewData);
    }

    // Escucha el doc en tiempo real para el contador
    window._svViewsUnsub = onSnapshot(doc(db,'stories', s.id), snap=>{
      if(!snap.exists()) return;
      const views = snap.data().views || {};
      // Excluye al dueño por si acaso
      const viewers = Object.entries(views).filter(([uid]) => uid !== s.userId);
      const total = viewers.length;
      const el = document.getElementById('svViewsCount');
      if(el) el.textContent = total;
      const tot = document.getElementById('svViewersTotal');
      if(tot) tot.textContent = total;
      // Actualiza lista si está abierta
      const listEl = document.getElementById('svViewersList');
      const items = document.getElementById('svViewersItems');
      if(items && listEl && listEl.style.display !== 'none'){
        _renderViewersList(viewers.map(([uid,v])=>({...v, viewerId:uid, viewerNick:v.nick, viewerAv:v.av})));
      }
    });
  } catch(e){ console.error('_svRegisterView error',e); }
}

function svToggleViewersList(){
  const s = _stories[_svIdx];
  if(!s || !window.CU) return;
  const isOwner = s.userId === window.CU.id;
  const isVerified = window.CU.verified;
  const panel = document.getElementById('svViewersList');
  if(!panel) return;

  // No-dueño: mensaje explicativo
  if(!isOwner){
    toast('Solo los dueños verificados pueden ver quién vio sus historias ✅','inf');
    return;
  }
  // Dueño pero NO verificado
  if(!isVerified){
    toast('Solo cuentas verificadas pueden ver quién vio sus historias ✅','inf');
    return;
  }
  // Dueño Y verificado: toggle panel
  const open = panel.style.display !== 'none';
  panel.style.display = open ? 'none' : 'block';
  if(!open && s.id){
    getDoc(doc(db,'stories', s.id)).then(snap=>{
      if(!snap.exists()) return;
      const views = snap.data().views || {};
      const viewers = Object.entries(views)
        .filter(([uid]) => uid !== s.userId)
        .map(([uid,v])=>({...v, viewerId:uid, viewerNick:v.nick, viewerAv:v.av}));
      document.getElementById('svViewersTotal').textContent = viewers.length;
      _renderViewersList(viewers);
    }).catch(()=>{});
  }
}

function _renderViewersList(docs){
  const el = document.getElementById('svViewersItems');
  if(!el) return;
  if(!docs || !docs.length){ el.innerHTML='<div style="text-align:center;padding:10px;color:rgba(255,255,255,.4);font-size:.75rem;">Nadie lo vio todavía</div>'; return; }
  const sorted = [...docs].sort((a,b)=>{
    const ta = (typeof a.data === 'function' ? a.data().time : a.time) || 0;
    const tb = (typeof b.data === 'function' ? b.data().time : b.time) || 0;
    return tb - ta;
  });
  el.innerHTML = sorted.map(d=>{
    const v = typeof d.data === 'function' ? d.data() : d;
    const av = v.viewerAv ? `<img src="${v.viewerAv}" style="width:100%;height:100%;object-fit:cover;">` : (v.viewerNick||'?')[0].toUpperCase();
    const t = v.time ? new Date(v.time).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}) : '';
    return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.06);">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--accent);flex-shrink:0;">${av}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:.75rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(v.viewerNick||'?')}</div>
        <div style="font-size:.62rem;color:rgba(255,255,255,.4);">${t}</div>
      </div>
    </div>`;
  }).join('');
}

function renderFeed(){
  const el = document.getElementById('feedPosts');
  if(!el) return;
  const scrollY = window.scrollY;
  const newHTML = _posts.map(p=>postHTML(p)).join('');
  // First render - just set innerHTML
  if(!el.children.length){
    el.innerHTML = newHTML;
    return;
  }
  // Smart patch: only replace posts that changed, preserve open comments
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = newHTML;
  const newPosts = Array.from(tempDiv.children);
  const existingPosts = Array.from(el.children);
  // If post count changed, do full rebuild
  if(existingPosts.length !== newPosts.length){
    el.innerHTML = newHTML;
    window.scrollTo(0, scrollY);
    return;
  }
  newPosts.forEach((newPost, i) => {
    const existing = existingPosts[i];
    if(!existing || existing.id !== newPost.id){
      el.innerHTML = newHTML;
      window.scrollTo(0, scrollY);
      return;
    }
    if(existing.outerHTML === newPost.outerHTML) return; // no change
    // Patch only changed sub-sections, preserve open state
    const wasOpen = existing.querySelector('.comments-section.open') !== null;
    // 1. Update post-stats (reaction counts)
    const oldStats = existing.querySelector('.post-stats');
    const newStats = newPost.querySelector('.post-stats');
    if(oldStats && newStats && oldStats.outerHTML !== newStats.outerHTML){
      oldStats.replaceWith(newStats);
    }
    // 2. Update post-actions (reaction button active state)
    const oldAct = existing.querySelector('.post-actions');
    const newAct = newPost.querySelector('.post-actions');
    if(oldAct && newAct && oldAct.outerHTML !== newAct.outerHTML){
      oldAct.replaceWith(newAct);
    }
    // 3. Update comments section content BUT preserve open/closed state
    const oldCmts = existing.querySelector('.comments-section');
    const newCmts = newPost.querySelector('.comments-section');
    if(oldCmts && newCmts && oldCmts.innerHTML !== newCmts.innerHTML){
      newCmts.classList.toggle('open', wasOpen); // preserve open state
      oldCmts.replaceWith(newCmts);
    }
    // 4. Update rxn popup (reaction button state)
    const oldRxnPop = existing.querySelector('.rxn-popup');
    const newRxnPop = newPost.querySelector('.rxn-popup');
    if(oldRxnPop && newRxnPop && oldRxnPop.outerHTML !== newRxnPop.outerHTML){
      oldRxnPop.replaceWith(newRxnPop);
    }
  });
}

function renderProfileFeed(){
  const el = document.getElementById('profileFeed');
  if(!el||!window.CU) return;
  const mine = _posts.filter(p=>p.userId===window.CU.id);
  if(!mine.length){
    // Fallback: load from Firestore
    getDocs(query(collection(db,'posts'), where('userId','==',window.CU.id), orderBy('time','desc'))).then(snap=>{
      const fetched = snap.docs.map(d=>({id:d.id,...d.data()}));
      // Merge into _posts so reactions/comments work
      fetched.forEach(p=>{ if(!_posts.find(x=>x.id===p.id)) _posts.push(p); });
      _renderProfileFeedHTML(el, fetched);
    }).catch(()=>{ el.innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)">Sin publicaciones aún. ¡Comparte tu primera pesca!</div>`; });
    return;

function _renderProfileFeedHTML(el, mine){
  const scrollY = window.scrollY;
  let pinnedH='';
  if(window.CU?.verified&&window.CU.pinnedPostId){
    const pp=mine.find(p=>p.id===window.CU.pinnedPostId);
    if(pp) pinnedH=`<div style='margin-bottom:6px;'><span class='pinned-label'>📌 Post fijado</span>${postHTML(pp)}</div>`;
  }
  const rest=mine.filter(p=>p.id!==window.CU?.pinnedPostId);
  const newHTML = pinnedH+(rest.length?rest.map(p=>postHTML(p)).join(''):(!pinnedH?`<div style="text-align:center;padding:40px;color:var(--muted)">Sin publicaciones aún. ¡Comparte tu primera pesca!</div>`:''));
  if(el.innerHTML === newHTML) return;
  if(!el.children.length){ el.innerHTML = newHTML; return; }
  // Smart patch
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = newHTML;
  const newPosts = Array.from(tempDiv.children);
  const existingPosts = Array.from(el.children);
  if(existingPosts.length !== newPosts.length){ el.innerHTML = newHTML; window.scrollTo(0,scrollY); return; }
  newPosts.forEach((newPost,i)=>{
    const existing = existingPosts[i];
    if(!existing || existing.id !== newPost.id){ el.innerHTML = newHTML; window.scrollTo(0,scrollY); return; }
    if(existing.outerHTML === newPost.outerHTML) return;
    const wasOpen = existing.querySelector('.comments-section.open') !== null;
    const oldStats = existing.querySelector('.post-stats');
    const newStats = newPost.querySelector('.post-stats');
    if(oldStats && newStats && oldStats.outerHTML !== newStats.outerHTML) oldStats.replaceWith(newStats);
    const oldAct = existing.querySelector('.post-actions');
    const newAct = newPost.querySelector('.post-actions');
    if(oldAct && newAct && oldAct.outerHTML !== newAct.outerHTML) oldAct.replaceWith(newAct);
    const oldCmts = existing.querySelector('.comments-section');
    const newCmts = newPost.querySelector('.comments-section');
    if(oldCmts && newCmts && oldCmts.innerHTML !== newCmts.innerHTML){
      newCmts.classList.toggle('open', wasOpen);
      oldCmts.replaceWith(newCmts);
    }
  });
}

// ── Link preview helpers ──
let _linkDebounceTimer = null;
function toggleLinkInput(){
  const row = document.getElementById('linkInputRow');
  if(!row) return;
  row.style.display = row.style.display === 'none' ? 'block' : 'none';
  if(row.style.display === 'block') document.getElementById('postLinkInput').focus();
}
function clearPostLink(){
  const inp = document.getElementById('postLinkInput');
  const box = document.getElementById('linkPreviewBox');
  if(inp) inp.value = '';
  if(box){ box.style.display='none'; box.innerHTML=''; }
  window._pendingLinkData = null;
}
function debounceLinkPreview(val){
  clearTimeout(_linkDebounceTimer);
  if(!val.trim()){ clearPostLink(); return; }
  _linkDebounceTimer = setTimeout(()=>fetchLinkPreview(val.trim()), 700);
}

let _autoLinkUrl='', _autoLinkTmr=null;
function _autoLinkDetect(txt){
  const m=(txt.match(/https?:\/\/[^\s]+/)||[])[0]||'';
  if(m && m!==_autoLinkUrl){ _autoLinkUrl=m; clearTimeout(_autoLinkTmr); _autoLinkTmr=setTimeout(function(){ fetchLinkPreview(m); },900); }
  else if(!m && _autoLinkUrl){ _autoLinkUrl=''; clearPostLink(); }
}
async function fetchLinkPreview(url){
  if(!url) return;
  if(!url.startsWith('http')) url = 'https://' + url;
  const box = document.getElementById('linkPreviewBox');
  if(!box) return;
  box.style.display = 'block';
  box.innerHTML = '<div style="color:var(--muted);font-size:.8rem;padding:10px;text-align:center;">⏳ Cargando...</div>';
  try {
    const resp = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url));
    const json = await resp.json();
    const tmp = document.createElement('div');
    tmp.innerHTML = json.contents || '';
    function gm(k){ return (tmp.querySelector('meta[property="'+k+'"]') || tmp.querySelector('meta[name="'+k+'"]') || {getAttribute:function(){return '';}}).getAttribute('content') || ''; }
    const title = gm('og:title') || (tmp.querySelector('title')||{}).textContent || url;
    const desc = gm('og:description') || gm('description') || '';
    const img = gm('og:image') || '';
    let site = gm('og:site_name'); try{ if(!site) site=new URL(url).hostname; }catch(e2){site='';}
    window._pendingLinkData = {url,title,desc,img,site};
    let disp=url; try{disp=new URL(url).hostname+(new URL(url).pathname.length>1?new URL(url).pathname:'');}catch(e3){}
    if(disp.length>60) disp=disp.slice(0,60)+'...';
    box.innerHTML='';
    const wrap = document.createElement('div');
    wrap.style.cssText='border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;background:var(--bg3);';
    if(img){ const im=document.createElement('img'); im.src=img; im.style.cssText='width:100%;max-height:220px;object-fit:cover;display:block;'; im.onerror=function(){this.remove();}; wrap.appendChild(im); }
    const info=document.createElement('div'); info.style.cssText='padding:10px 12px;';
    const sSite=document.createElement('div'); sSite.style.cssText='font-size:.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;'; sSite.textContent=site.toUpperCase(); info.appendChild(sSite);
    const sTitle=document.createElement('div'); sTitle.style.cssText='font-size:.88rem;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:3px;'; sTitle.textContent=title; info.appendChild(sTitle);
    if(desc){ const sDesc=document.createElement('div'); sDesc.style.cssText='font-size:.78rem;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;'; sDesc.textContent=desc; info.appendChild(sDesc); }
    const link=document.createElement('a'); link.href=url; link.target='_blank'; link.rel='noopener'; link.style.cssText='display:block;text-decoration:none;color:var(--accent);font-size:.78rem;padding:4px 12px 8px;';link.textContent=disp;
    wrap.appendChild(info); wrap.appendChild(link); box.appendChild(wrap);
  } catch(e){
    box.innerHTML='<div style="color:var(--muted);font-size:.78rem;padding:10px;text-align:center;">No se pudo cargar la vista previa.</div>';
    window._pendingLinkData={url,title:url,desc:'',img:'',site:''};
  }
}

async function submitPost(){
  if(!window.CU){ toast('Inicia sesión primero','err'); return; }
  const text = document.getElementById('postText').value.trim();
  const fish = document.getElementById('tagFish').value.trim();
  const weight = parseFloat(document.getElementById('tagWeight').value)||0;
  const map = document.getElementById('tagMap').value;
  const tech = document.getElementById('tagTech').value;
  const linkUrl = document.getElementById('postLinkInput')?.value.trim()||'';
  const videoUrl0 = document.getElementById('ytUrlInput')?.value.trim() || '';
  if(!text && !fish && !_postMediaFiles.length && !linkUrl && !videoUrl0){ toast('Escribe algo o agrega un video para publicar','err'); return; }

  toast('Publicando...','inf');
  if(window.CU?.verified) launchGoldConfetti();
  const mediaUrls = [];
  for(const m of _postMediaFiles){
    if(m.type==='image') mediaUrls.push(await uploadImage(m.file,'posts'));
  }
  const videoUrl = videoUrl0;

  const postMentionEl = document.getElementById('mention_postText');
  if(postMentionEl) postMentionEl.style.display='none';

  const linkData = (linkUrl && window._pendingLinkData) ? window._pendingLinkData : (linkUrl ? { url:linkUrl, title:linkUrl, desc:'', img:'', site:'' } : null);
  const newPostRef = await addDoc(collection(db,'posts'),{
    userId:window.CU.id, userNick:window.CU.nick, userAv:window.CU.av||'', userXp:window.CU.xp||0, userVerified:window.CU.verified||false,
    text, fish, weight, map, tech,
    images: mediaUrls,
    video: videoUrl,
    link: linkData,
    time: serverTimestamp(),
    likes:0, comments:[], reactions:{}, reactionCounts:{}
  });

  // Notificar a usuarios etiquetados con @
  const postMentions = text.match(/@([\w\d_]+)/g);
  if(postMentions){
    try {
      const usersSnap = await getDocs(collection(db,'users'));
      const allUsers = usersSnap.docs.map(d=>({id:d.id,...d.data()}));
      const notified = new Set();
      for(const m of postMentions){
        const nick = m.slice(1).toLowerCase();
        const user = allUsers.find(u=>(u.nick||'').toLowerCase()===nick);
        if(user && user.id !== window.CU.id && !notified.has(user.id)){
          notified.add(user.id);
          sendNotifToUserWithPost(user.id, `🏷️ ${window.CU.nick} te etiquetó en una publicación: "${text.slice(0,50)}"`, newPostRef.id);
        }
      }
    } catch(e){}
  }

  _postMediaFiles = [];
  document.getElementById('postText').value='';
  document.getElementById('tagFish').value='';
  document.getElementById('tagWeight').value='';
  document.getElementById('tagMap').value='';
  document.getElementById('tagTech').value='';
  document.getElementById('fishTagRow').style.display='none';
  clearYtInput();
  clearPostLink();
  document.getElementById('postMediaPreview').style.display='none';
  document.getElementById('linkInputRow').style.display='none';
  cm('mCreatePost');
  addNotif('📝 Publicaste una nueva captura'+(fish?`: ${fish} ${weight?weight+'kg':''}`:''));
  addXP(10,'publicación');
  toast('¡Publicado! 🎣 +10 XP','ok');
}

let _emojiTarget = null;
let _emojiPickerOpen = false;

function openEmojiPicker(e, targetId){
  if(e) e.stopPropagation();
  const wrap = document.getElementById('emojiPickerWrap');
  if(!wrap) return;
  
  if(_emojiPickerOpen && _emojiTarget===targetId){
    wrap.style.display='none'; _emojiPickerOpen=false; return;
  }
  _emojiTarget = targetId;
  _emojiPickerOpen = true;
  
  // Build grid if empty
  const grid = document.getElementById('emojiPickerGrid');
  if(grid && !grid.children.length){
    grid.innerHTML = EMOJI_LIST.map(em=>'<button onmousedown="insertEmojiChar(\''+em+'\')" style="background:none;border:none;font-size:1.3rem;cursor:pointer;padding:4px;border-radius:6px;transition:background .1s;line-height:1;" onmouseover="this.style.background=\'var(--bg3)\'" onmouseout="this.style.background=\'none\'">'+em+'</button>').join('');
  }
  
  // Position near button
  const btn = e ? e.currentTarget || e.target : null;
  if(btn){
    const rect = btn.getBoundingClientRect();
    const pickerH = 220;
    const top = rect.top - pickerH - 8 < 0 ? rect.bottom + 4 : rect.top - pickerH - 4;
    wrap.style.left = Math.min(rect.left, window.innerWidth - 290) + 'px';
    wrap.style.top = top + 'px';
  }
  wrap.style.display='block';
  
  const closeP = function(ev){
    if(!wrap.contains(ev.target) && ev.target!==btn){
      wrap.style.display='none'; _emojiPickerOpen=false;
      document.removeEventListener('mousedown',closeP);
    }
  };
  setTimeout(()=>document.addEventListener('mousedown',closeP), 50);
}

function insertEmojiChar(em){
  const el = document.getElementById(_emojiTarget);
  if(!el) return;
  const start = el.selectionStart||0;
  const end = el.selectionEnd||0;
  el.value = el.value.slice(0,start) + em + el.value.slice(end);
  el.focus();
  el.selectionStart = el.selectionEnd = start + em.length;
  // Trigger oninput handlers
  el.dispatchEvent(new Event('input', {bubbles:true}));
  // Don't close picker — user may want multiple emojis
}

async function handlePostMentionInput(inp){
  const val = inp.value;
  const atIdx = val.lastIndexOf('@');
  const mentionEl = document.getElementById('mention_postText');
  if(!mentionEl) return;
  if(atIdx === -1 || val.slice(atIdx+1).includes(' ')){

  }
  const query_str = val.slice(atIdx+1).toLowerCase();
  if(!query_str){ mentionEl.style.display='none'; return; }
  clearTimeout(_postMentionTimer);
  _postMentionTimer = setTimeout(async ()=>{
    try {
      const snap = await getDocs(collection(db,'users'));
      const users = snap.docs.map(d=>({id:d.id,...d.data()}))
        .filter(u=>u.id!==window.CU?.id && (u.nick||'').toLowerCase().startsWith(query_str))
        .slice(0,6);

async function doReact(pid, emoji){
  if(!window.CU){ toast('Inicia sesión para reaccionar','err'); return; }
  let p = _posts.find(p=>p.id===pid);
  if(!p){
    // Post not in local cache (e.g. viewing another user's profile) — fetch from Firestore
    try {
      const snap = await getDoc(doc(db,'posts',pid));
      if(!snap.exists()){ toast('Publicación no encontrada','err'); return; }
      p = {id:snap.id,...snap.data()};
    } catch(e){ toast('Error al cargar post','err'); return; }
  }
  const prev = p.reactions?.[window.CU.id] || null;
  const updates = {};
  if(prev){ updates[`reactionCounts.${prev}`] = increment(-1); }
  if(prev === emoji){ updates[`reactions.${window.CU.id}`] = ''; }
  else {
    updates[`reactions.${window.CU.id}`] = emoji;
    updates[`reactionCounts.${emoji}`] = increment(1);
    if(emoji && !prev) addXP(1,'reacción');
    if(p.userId && p.userId !== window.CU.id && !prev){
      const preview = (p.text||'').slice(0,60) + ((p.text||'').length>60?'...':'');
      const msg = preview
        ? `${emoji} ${window.CU.nick} reaccionó a tu publicación: "${preview}"`
        : `${emoji} ${window.CU.nick} reaccionó a tu publicación`;
      sendNotifToUserWithPost(p.userId, msg, p.id);
    }
  }
  document.getElementById('rxnp_'+pid)?.classList.remove('show');
  // Optimistic UI: update local _posts so the feed patch is instant
  if(!p.reactions) p.reactions = {};
  if(!p.reactionCounts) p.reactionCounts = {};
  if(prev){ p.reactionCounts[prev] = Math.max(0,(p.reactionCounts[prev]||1)-1); }
  if(prev === emoji){ delete p.reactions[window.CU.id]; }
  else { p.reactions[window.CU.id] = emoji; p.reactionCounts[emoji] = (p.reactionCounts[emoji]||0)+1; }
  await updateDoc(doc(db, 'posts', pid), updates);
}
function quickReact(pid){ if(!window.CU){toast('Inicia sesión','err');return;} doReact(pid,'👍'); }

async function reactCmt(e, pid, ci, em){
  if(e) e.stopPropagation();
  if(!window.CU){ toast('Iniciá sesión','err'); return; }
  const p = _posts.find(p=>p.id===pid); if(!p) return;
  const newCmts = [...(p.comments||[])];
  const c = {...(newCmts[ci]||{})};
  const uRxns = {...(c.userReactions||{})};
  const rCounts = {...(c.reactions||{})};
  const prev = uRxns[window.CU.id];
  if(prev){ rCounts[prev]=Math.max(0,(rCounts[prev]||1)-1); }
  if(prev===em){ delete uRxns[window.CU.id]; }
  else { uRxns[window.CU.id]=em; rCounts[em]=(rCounts[em]||0)+1; }
  c.userReactions=uRxns; c.reactions=rCounts;
  newCmts[ci]=c;
  // Optimistic UI: update _posts locally so renderFeed doesn't jump
  p.comments = newCmts;
  await updateDoc(doc(db,'posts',pid),{comments:newCmts});
}

async function submitComment(pid){
  if(!window.CU){ toast('Inicia sesión para comentar','err'); return; }
  const inp = document.getElementById('cinp_'+pid);
  const txt = inp.value.trim(); if(!txt) return;
  // Close mention dropdown
  const mentionEl = document.getElementById('mention_'+pid);
  if(mentionEl) mentionEl.style.display='none';
  let p = _posts.find(p=>p.id===pid);
  if(!p){
    // Not in local cache — fetch from Firestore
    try {
      const snap = await getDoc(doc(db,'posts',pid));
      if(!snap.exists()){ toast('Post no encontrado','err'); return; }
      p = {id:snap.id,...snap.data()};
    } catch(e){ toast('Error al cargar post','err'); return; }
  }
  if(p){
    const replyToNick = txt.startsWith('@') ? (txt.match(/^@(\S+)/)||[])[1]||'' : '';
    const newComments = [...(p.comments||[]), {userId:window.CU.id,nick:window.CU.nick,av:window.CU.av||'',text:txt,time:Date.now(),replyTo:replyToNick}];
    await updateDoc(doc(db, 'posts', pid), {comments: newComments});
    // Notify post owner
    if(p.userId && p.userId !== window.CU.id){
      sendNotifToUserWithPost(p.userId, `💬 ${window.CU.nick} comentó: "${txt.slice(0,40)}"`, p.id);
    }
    // Detect @mentions and notify tagged users
    const mentions = txt.match(/@([\w\d_]+)/g);
    if(mentions){
      // Get all users to match by nick
      try {
        const usersSnap = await getDocs(collection(db,'users'));
        const allUsers = usersSnap.docs.map(d=>({id:d.id,...d.data()}));
        const notified = new Set();
        for(const m of mentions){
          const nick = m.slice(1).toLowerCase();
          const user = allUsers.find(u=>(u.nick||'').toLowerCase()===nick);
          if(user && user.id !== window.CU.id && !notified.has(user.id)){
            notified.add(user.id);
            const isReply = txt.startsWith('@'+nick);
            const notifTxt = isReply
              ? `↩️ ${window.CU.nick} respondió tu comentario: "${txt.slice(0,50)}"`
              : `🏷️ ${window.CU.nick} te mencionó en un comentario: "${txt.slice(0,50)}"`;
            sendNotifToUserWithPost(user.id, notifTxt, p.id);
          }
        }
      } catch(e){}
    }
  }
  addXP(3,'comentario');
  inp.value='';
  // Keep comments open - don't jump, just add class if not already open
  const cmtsEl = document.getElementById('cmts_'+pid);
  if(cmtsEl && !cmtsEl.classList.contains('open')) cmtsEl.classList.add('open');
}

async function saveProfile(){
  if(!window.CU) return;

  // --- Nick change: 90-day cooldown ---
  const newNick = document.getElementById('epNick').value.trim() || window.CU.nick;
  const oldNick = window.CU.nick || '';
  const nickChanged = newNick && newNick !== oldNick;
  if(nickChanged){
    const last = window.CU.nickLastChanged ? new Date(window.CU.nickLastChanged) : null;
    const daysSince = last ? (Date.now() - last.getTime()) / (1000*60*60*24) : 999;
    if(daysSince < 90){
      const daysLeft = Math.ceil(90 - daysSince);
      toast(`No podés cambiar el nick por ${daysLeft} días más. Contactá a ruizgustavo12 para cambios urgentes.`,'err');
      document.getElementById('epNick').value = oldNick;
      return;
    }
    window.CU.nick = newNick;
    window.CU.nickLastChanged = new Date().toISOString();
  }

  window.CU.bio = document.getElementById('epBio').value.trim();
  window.CU.favFish = document.getElementById('epFish').value.trim();
  window.CU.favMap = document.getElementById('epMap').value;
  window.CU.country = document.getElementById('epCountry').value;
  window.CU.emailPublic = document.getElementById('epEmailPublic').value.trim();
  window.CU.city = document.getElementById('epCity').value.trim();
  window.CU.birthdate = document.getElementById('epBirthdate').value || '';
  if(window.CU.birthdate){
    const bd=new Date(window.CU.birthdate);
    window.CU.birthdayMMDD = (bd.getMonth()+1).toString().padStart(2,'0')+'-'+bd.getDate().toString().padStart(2,'0');
    window.CU.age = Math.floor((Date.now()-bd.getTime())/(365.25*24*3600*1000)).toString();
  }
  window.CU.gender = document.getElementById('epGender').value;
  window.CU.favTech = document.getElementById('epTech').value;
  window.CU.experience = document.getElementById('epExp').value;
  window.CU.social_yt = document.getElementById('epYT').value.trim();
  window.CU.social_dc = document.getElementById('epDC').value.trim();
  window.CU.social_tw = document.getElementById('epTW').value.trim();
  window.CU.social_web = document.getElementById('epWeb').value.trim();
  await updateDoc(doc(db, 'users', window.CU.id), window.CU);
  cm('mEditProfile'); updateNavUI(); renderProfile();
  toast('Perfil actualizado ✅','ok');
}

function openEditProfile(){
  if(!window.CU) return;
  // Nick field: check 90-day cooldown
  const nickEl = document.getElementById('epNick');
  const nickMsgEl = document.getElementById('epNickMsg');
  nickEl.value = window.CU.nick||'';
  const last = window.CU.nickLastChanged ? new Date(window.CU.nickLastChanged) : null;
  const daysSince = last ? (Date.now()-last.getTime())/(1000*60*60*24) : 999;
  if(daysSince < 90){
    const daysLeft = Math.ceil(90-daysSince);
    nickEl.readOnly = true;
    nickEl.style.opacity = '.6';
    nickEl.style.cursor = 'default';
    nickMsgEl.innerHTML = `🔒 Podés cambiar tu nick en <strong>${daysLeft} días</strong>. Para cambios urgentes, contactá a <strong>ruizgustavo12</strong>.`;
    nickMsgEl.style.color = 'var(--muted)';
    nickMsgEl.style.display = 'block';
  } else {
    nickEl.readOnly = false;
    nickEl.style.opacity = '';
    nickEl.style.cursor = '';
    if(last){
      nickMsgEl.innerHTML = '✅ Podés cambiar tu nick (último cambio hace más de 90 días).';
      nickMsgEl.style.color = 'var(--green)';
      nickMsgEl.style.display = 'block';
    } else {
      nickMsgEl.style.display = 'none';
    }
  }

  document.getElementById('epBio').value = window.CU.bio||'';
  document.getElementById('epFish').value = window.CU.favFish||'';
  document.getElementById('epMap').value = window.CU.favMap||'';
  document.getElementById('epCountry').value = window.CU.country||'';
  document.getElementById('epEmailPublic').value = window.CU.emailPublic||'';
  document.getElementById('epCity').value = window.CU.city||'';
  document.getElementById('epBirthdate').value = window.CU.birthdate||'';
  // Auto-calc age from birthdate
  if(window.CU.birthdate){
    const bd=new Date(window.CU.birthdate);
    document.getElementById('epAge').value = Math.floor((Date.now()-bd.getTime())/(365.25*24*3600*1000));
  } else {
    document.getElementById('epAge').value = window.CU.age||'';
  }
  document.getElementById('epGender').value = window.CU.gender||'';
  document.getElementById('epTech').value = window.CU.favTech||'';
  document.getElementById('epExp').value = window.CU.experience||'';
  document.getElementById('epYT').value = window.CU.social_yt||'';
  document.getElementById('epDC').value = window.CU.social_dc||'';
  document.getElementById('epTW').value = window.CU.social_tw||'';
  document.getElementById('epWeb').value = window.CU.social_web||'';
  om('mEditProfile');
  setTimeout(setupBioLimit,50);
}

function calcAgeFromBirthdate(){
  const bd = document.getElementById('epBirthdate').value;
  const ageEl = document.getElementById('epAge');
  if(bd){
    const age = Math.floor((Date.now()-new Date(bd).getTime())/(365.25*24*3600*1000));
    ageEl.value = age > 0 && age < 120 ? age : '';
  } else {
    ageEl.value = '';
  }
}

async function changeCover(input){
  const f = input.files[0]; if(!f) return;

  await updateDoc(doc(db, 'users', window.CU.id), {cover: url});
