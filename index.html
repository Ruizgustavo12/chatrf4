<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trendlify</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#000"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Trendlify"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>

<style>
/* ================================================================
   DESIGN TOKENS — Trendlify
================================================================ */
:root {
  --bg:       #050506;
  --bg2:      #0a0a0d;
  --surface:  #121214;
  --accent:   #ff0055; 
  --cyan:     #00f2ea;
  --text:     #ffffff;
  --text-sec: #9ca3af;
  --border:   #202023;
  --font-h:   'Syne', sans-serif;
  --font-b:   'DM Sans', sans-serif;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0; padding: 0;
  background-color: var(--bg);
  color: var(--text);
  font-family: var(--font-b);
  overflow-x: hidden;
}

/* Header */
.header {
  position: sticky; top: 0; z-index: 1000;
  background: rgba(5,5,6,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 60px;
}
.header h1 {
  font-family: var(--font-h); font-weight: 800; font-size: 22px;
  letter-spacing: -1px; margin: 0;
  background: linear-gradient(90deg, var(--accent), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

/* Feed & Posts */
.feed { max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
.post { border-bottom: 1px solid var(--border); padding: 12px 0; }
.post-hd { display: flex; align-items: center; padding: 0 12px 10px; }
.post-av { width: 38px; height: 38px; border-radius: 50%; background: #222; margin-right: 10px; object-fit: cover; }
.post-user { font-weight: 600; font-size: 14px; }
.post-media { width: 100%; position: relative; background: #000; display: block; }
.post-media img, .post-media video { width: 100%; display: block; }

/* Grid Explorar - CORREGIDO */
.media-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
  padding: 2px;
}
.grid-item {
  aspect-ratio: 9/16;
  background: #111;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}
.grid-item video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  background: #000;
}

/* Nav */
.nav-bottom {
  position: fixed; bottom: 0; width: 100%; height: 65px;
  background: rgba(5,5,6,0.95);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-around;
  z-index: 2000;
}
.nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-sec); font-size: 10px; text-decoration: none; cursor: pointer; }
.nav-item.active { color: var(--accent); }
.nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; }

/* Modal */
.modal { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:3000; display:none; flex-direction:column; }
.modal-close { position:absolute; top:20px; right:20px; color:#fff; font-size:30px; cursor:pointer; z-index:3010; }
</style>
</head>
<body>

<header class="header">
  <h1>Trendlify</h1>
</header>

<div id="main-content"></div>

<nav class="nav-bottom">
  <a class="nav-item active" onclick="changeSection('inicio', this)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>Inicio</span>
  </a>
  <a class="nav-item" onclick="changeSection('explorar', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span>Explorar</span>
  </a>
  <a class="nav-item" onclick="changeSection('perfil', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Perfil</span>
  </a>
</nav>

<div id="postModal" class="modal">
  <span class="modal-close" onclick="closeModal()">&times;</span>
  <div id="modal-body" style="height:100%; display:flex; align-items:center; justify-content:center;"></div>
</div>

<script>
const posts = [
  { id: 1, user: 'pablo_art', type: 'video', src: 'https://www.w3schools.com/html/mov_bbb.mp4' },
  { id: 2, user: 'lucia_travel', type: 'video', src: 'https://www.w3schools.com/html/movie.mp4' },
  { id: 3, user: 'nico_fitness', type: 'video', src: 'https://vjs.zencdn.net/v/oceans.mp4' },
  { id: 4, user: 'dance_studio', type: 'video', src: 'https://www.w3schools.com/html/mov_bbb.mp4' }
];

function changeSection(section, el) {
  document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
  el.classList.add('active');
  const container = document.getElementById('main-content');
  container.innerHTML = '';

  if (section === 'inicio') {
    renderInicio(container);
  } else if (section === 'explorar') {
    renderExplorar(container);
  } else if (section === 'perfil') {
    container.innerHTML = '<div style="padding:40px; text-align:center;"><h2>Tu Perfil</h2><p>@usuario_pro</p></div>';
  }
}

function renderInicio(container) {
  const feed = document.createElement('div');
  feed.className = 'feed';
  posts.forEach(post => {
    const postEl = document.createElement('div');
    postEl.className = 'post';
    postEl.innerHTML = `
      <div class="post-hd">
        <div class="post-av"></div>
        <span class="post-user">${post.user}</span>
      </div>
      <div class="post-media">
        <video src="${post.src}" loop muted autoplay playsinline></video>
      </div>
    `;
    feed.appendChild(postEl);
  });
  container.appendChild(feed);
}

function renderExplorar(container) {
  const grid = document.createElement('div');
  grid.className = 'media-grid';

  posts.forEach(post => {
    const item = document.createElement('div');
    item.className = 'grid-item';
    item.onclick = () => openModal(post);
    
    // CORRECCIÓN APLICADA: #t=0.1 y preload="auto" para evitar cuadros negros
    item.innerHTML = `
      <video src="${post.src}#t=0.1" 
             muted 
             playsinline 
             preload="auto"
             onmouseover="this.play()" 
             onmouseout="this.pause(); this.currentTime=0.1;">
      </video>
    `;
    grid.appendChild(item);
  });
  container.appendChild(grid);
}

function openModal(post) {
  const modal = document.getElementById('postModal');
  const body = document.getElementById('modal-body');
  modal.style.display = 'flex';
  body.innerHTML = `<video src="${post.src}" controls autoplay style="max-width:100%; max-height:90vh;"></video>`;
}

function closeModal() {
  const modal = document.getElementById('postModal');
  document.getElementById('modal-body').innerHTML = '';
  modal.style.display = 'none';
}

// Iniciar en Inicio
renderInicio(document.getElementById('main-content'));

// Desbloqueo de video para móviles
document.addEventListener('touchstart', function() {
    document.querySelectorAll('video').forEach(v => {
        v.play().then(() => v.pause());
    });
}, {once: true});
</script>

</body>
</html>
