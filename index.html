  // Listen to the chat user's presence
  if(uid){
    _presenceUnsub = onSnapshot(doc(db,'presence',uid), snap=>{
      const statusEl = document.getElementById('chatOnlineStatus');
      if(!statusEl) return;
      const typingEl = document.getElementById('chatTypingStatus');
      if(snap.exists()){
        const d = snap.data();
        const now = Date.now();
        const isOnline = d.last?.toMillis ? (now - d.last.toMillis() < 120000) : false;
        const isTyping = d.typingTo === window.CU?.id && (now - (d.typingAt?.toMillis?.() || 0) < 5000);
        if(isTyping){
          statusEl.style.color='var(--accent)';
          statusEl.textContent='✍️ escribiendo...';
        } else if(isOnline){
          statusEl.style.color='var(--green)';
          statusEl.textContent='● En línea';
        } else {
          statusEl.style.color='var(--muted)';
          statusEl.textContent='○ Desconectado';
        }
      } else {
        statusEl.style.color='var(--muted)';
        statusEl.textContent='○ Desconectado';
      }
    });
  }

  const chatId = [window.CU.id, uid].sort().join('_');
  _unsubChat = onSnapshot(
    query(collection(db,'chats',chatId,'messages'), orderBy('time','asc')),
    snap=>{
      const el = document.getElementById('chatMessages');
      if(!el) return;
      const msgs = snap.docs.map(d=>({id:d.id,...d.data()}));
      // Mark incoming messages as read with timestamp
      msgs.forEach(m=>{
        if(m.uid !== window.CU.id && !m.read){
          const msgRef = doc(db,'chats',chatId,'messages',m.id);
          updateDoc(msgRef,{read:true, readAt: Date.now()}).catch(()=>{});
        }
      });
      const CHAT_RXNS = window.CU?.verified ? ['👍','❤️','😂','😮','😢','🔥','🎣','🏅','🎖️','👑'] : ['👍','❤️','😂','😮','😢','🔥','🎣'];
      el.innerHTML = msgs.length
        ? msgs.map(m=>{
            const mine = m.uid === window.CU.id;
            const time = m.time?.toMillis ? fmtT(m.time.toMillis()) : '';
            // Exact time HH:MM
            const exactTime = (()=>{
              const ms = m.time?.toMillis ? m.time.toMillis() : (typeof m.time === 'number' ? m.time : 0);
              if(!ms) return '';
              const d = new Date(ms);
              return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
            })();
            // Read status for my messages
            const readLabel = (()=>{
              if(!mine) return '';
              if(m.read && m.readAt){
                const d = new Date(m.readAt);
                const h = d.getHours().toString().padStart(2,'0');
                const min = d.getMinutes().toString().padStart(2,'0');
                return `<span style="color:var(--accent);font-size:.62rem;">✓✓ Leído ${h}:${min}</span>`;
              }
              if(m.read) return `<span style="color:var(--accent);font-size:.62rem;">✓✓ Leído</span>`;
              return `<span style="color:var(--muted);font-size:.62rem;">✓ Enviado</span>`;
            })();
            const isStoryComment = m.storyComment;
            const storyImg = m.storyImg || '';
            const msgRxns = m.reactions || {};
            const rxnEntries = Object.entries(msgRxns).filter(([,v])=>v);
            const msgRxnTotal = rxnEntries.length;
            const msgTopRxns = rxnEntries.slice(0,3).map(([,v])=>v).join('');
            const myMsgRxn = window.CU ? (msgRxns[window.CU.id]||'') : '';
            const rxnBtns = CHAT_RXNS.map(em=>`<button onclick="reactChatMsg('${chatId}','${m.id}','${em}')" style="background:${myMsgRxn===em?'rgba(0,198,255,.2)':'none'};border:none;font-size:1.25rem;cursor:pointer;padding:3px 5px;border-radius:50%;transition:transform .12s;" onmouseover="this.style.transform='scale(1.5) translateY(-4px)'" onmouseout="this.style.transform='scale(1)'">${em}</button>`).join('');
            // Story messages get a special card layout
            const storyCard = isStoryComment ? `
              <div style="max-width:82%;border-radius:14px;overflow:hidden;border:1px solid rgba(0,198,255,.35);background:rgba(0,198,255,.07);margin-bottom:2px;">
                ${storyImg ? `<img src="${storyImg}" style="width:100%;max-height:160px;object-fit:cover;display:block;border-bottom:1px solid rgba(0,198,255,.2);">` : ''}
                <div style="padding:10px 12px;">
                  <div style="font-size:.68rem;color:var(--accent);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;">📖 Historia</div>
                  ${m.storyText ? `<div style="font-size:.75rem;color:var(--muted);font-style:italic;margin-bottom:6px;padding:4px 8px;background:rgba(0,0,0,.2);border-radius:6px;border-left:2px solid var(--accent);">"${esc(m.storyText)}"</div>` : ''}
                  <div style="font-size:.84rem;color:var(--text);line-height:1.5;word-break:break-word;">${esc(m.text)}</div>
                </div>
              </div>` : '';
            const msgContent = m.gif
              ? `<img src="${m.gif}" style="max-width:200px;border-radius:10px;display:block;" loading="lazy">`
              : m.audioUrl
              ? `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:${mine?'16px 16px 4px 16px':'16px 16px 16px 4px'};background:${mine?'var(--accent)':'var(--bg3)'};max-width:220px;">
                  <button onclick="toggleVoicePlay(this,'${m.audioUrl}')" style="background:rgba(255,255,255,.25);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:1rem;">▶</button>
                  <div style="flex:1;">
                    <div style="height:3px;background:rgba(255,255,255,.3);border-radius:2px;margin-bottom:4px;position:relative;">
                      <div class="voice-progress" style="height:100%;width:0%;background:${mine?'#fff':'var(--accent)'};border-radius:2px;transition:width .2s;"></div>
                    </div>
                    <span style="font-size:.65rem;color:${mine?'rgba(255,255,255,.8)':'var(--muted)'};">🎤 ${m.audioDuration ? Math.floor(m.audioDuration/60)+':'+(m.audioDuration%60).toString().padStart(2,'0') : 'Audio'}</span>
                  </div>
                </div>`
              : `<div style="max-width:220px;min-width:0;padding:8px 12px;border-radius:${mine?'16px 16px 4px 16px':'16px 16px 16px 4px'};background:${mine?'var(--accent)':'var(--bg3)'};color:${mine?'#fff':'var(--text)'};font-size:.84rem;line-height:1.5;word-break:break-word;display:inline-block;">${esc(m.text)}</div>`;
            const normalBubble = !isStoryComment ? `
              <div style="position:relative;" onmouseenter="showMsgRxnBar('${m.id}')" onmouseleave="hideMsgRxnBar('${m.id}')">
                <div id="mrxnbar_${m.id}" style="display:none;position:absolute;${mine?'right:0':'left:0'};bottom:calc(100% + 4px);background:rgba(12,22,34,.98);border:1px solid rgba(255,255,255,.13);border-radius:100px;padding:4px 8px;align-items:center;gap:2px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.8);white-space:nowrap;" onmouseenter="keepMsgRxnBar('${m.id}')" onmouseleave="hideMsgRxnBar('${m.id}')">${rxnBtns}</div>
                ${msgContent}
                ${msgRxnTotal>0?`<div onclick="reactChatMsg('${chatId}','${m.id}','')" style="position:absolute;${mine?'left:-8px':'right:-8px'};bottom:-12px;background:var(--bg3);border:1px solid var(--border);border-radius:100px;padding:1px 7px;font-size:.75rem;cursor:pointer;white-space:nowrap;">${msgTopRxns} ${msgRxnTotal}</div>`:''}
              </div>` : '';
            return `<div style="display:flex;flex-direction:column;align-items:${mine?'flex-end':'flex-start'};gap:2px;margin-bottom:${msgRxnTotal>0?'12px':'4px'};" onclick="toggleMsgTime('msgtime_${m.id}')">
              ${storyCard}
              ${normalBubble}
              <div id="msgtime_${m.id}" style="display:none;flex-direction:column;align-items:${mine?'flex-end':'flex-start'};gap:1px;padding:0 4px;">
                <span style="font-size:.65rem;color:var(--muted);">${exactTime}</span>
                ${readLabel}
              </div>
            </div>`;
          }).join('')
        : '<div style="text-align:center;padding:20px;color:var(--muted);font-size:.8rem;">Empezá la conversación 👋</div>';
      el.scrollTop = el.scrollHeight;
    }
  );
}

function openPhotoModal(type){
  if(!window.CU){ toast('Iniciá sesión primero','err'); return; }

      if(match) imgSrc = match[1];
    }

    _openSimpleLightbox(imgSrc, '🖼️ Tu foto de portada');
    return;
  }

function getPhotoDocId(type, userId){ return `photo_${type}_${userId}`; }

function loadPhotoModalData(type, userId){
  if(_photoModalUnsub){ _photoModalUnsub(); _photoModalUnsub=null; }
  const ref = doc(db,'photoReactions', getPhotoDocId(type, userId));
  _photoModalUnsub = onSnapshot(ref, snap=>{
    const data = snap.exists() ? snap.data() : {};
    renderPhotoReactions(data.reactions||{});
    renderPhotoComments(data.comments||[]);
  });
}

function renderPhotoReactions(reactions){
  const bar = document.getElementById('photoModalRxnBar');
  const countEl = document.getElementById('photoModalRxnCount');
  if(!bar) return;
  const myRxn = window.CU ? (reactions[window.CU.id]||'') : '';
  const total = Object.values(reactions).filter(Boolean).length;
  const counts = {};
  Object.values(reactions).forEach(e=>{ if(e) counts[e]=(counts[e]||0)+1; });
  bar.innerHTML = PHOTO_REACTIONS.map(em=>{
    const cnt = counts[em]||0;
    const active = myRxn===em;
    return `<button onclick="photoDoReact('${em}')" title="${em}"
      style="background:${active?'rgba(24,119,242,.18)':'none'};border:${active?'1px solid var(--accent)':'1px solid transparent'};
      border-radius:100px;padding:5px 10px;cursor:pointer;font-size:.95rem;display:flex;align-items:center;gap:4px;transition:all .15s;"
      onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='${active?'rgba(24,119,242,.18)':'none'}'">
      ${em}${cnt>0?`<span style="font-size:.7rem;color:var(--muted);font-weight:600;">${cnt}</span>`:''}
    </button>`;
  }).join('');
  countEl.textContent = total>0 ? total+' '+(total===1?'reacción':'reacciones') : '';
}

function renderPhotoComments(comments){

        <div style="background:var(--bg3);border-radius:12px;padding:8px 12px;display:inline-block;max-width:95%;">

async function photoDoReact(emoji){
  if(!window.CU){ toast('Iniciá sesión','err'); return; }
  const ref = doc(db,'photoReactions',getPhotoDocId(_photoModalType, _photoModalUserId));
  try {
    const snap = await getDoc(ref);
    const data = snap.exists() ? snap.data() : {};
    const reactions = {...(data.reactions||{})};
    if(reactions[window.CU.id]===emoji) delete reactions[window.CU.id];
    else reactions[window.CU.id]=emoji;
    await setDoc(ref, {...data, reactions}, {merge:true});
  } catch(e){ toast('Error al reaccionar','err'); }
}

async function submitPhotoComment(){
  if(!window.CU){ toast('Iniciá sesión','err'); return; }
  const input = document.getElementById('photoModalInput');
  const text = input?.value?.trim();
  if(!text) return;
  input.value='';
  const ref = doc(db,'photoReactions',getPhotoDocId(_photoModalType, _photoModalUserId));

    const snap = await getDoc(ref);
    const data = snap.exists() ? snap.data() : {};

  } catch(e){ toast('Error al comentar','err'); }
}

async function reactChatMsg(chatId, msgId, emoji){
  if(!window.CU){ toast('Iniciá sesión','err'); return; }
  const msgRef = doc(db,'chats',chatId,'messages',msgId);
  try {
    const snap = await getDoc(msgRef);
    if(!snap.exists()) return;
    const data = snap.data();
    const rxns = Object.assign({}, data.reactions||{});
    const prev = rxns[window.CU.id]||'';
    if(!emoji || prev===emoji){ delete rxns[window.CU.id]; }
    else {
      rxns[window.CU.id] = emoji;
      // ✅ Notificar al autor del mensaje si no soy yo
      if(data.uid && data.uid !== window.CU.id){
        await sendNotifToUser(data.uid, `${emoji} ${window.CU.nick} reaccionó a tu mensaje: "${(data.text||'').slice(0,40)}"`);
      }
    }
    await updateDoc(msgRef, {reactions: rxns});
    const bar = document.getElementById('mrxnbar_'+msgId);
    if(bar) bar.style.display='none';
  } catch(err){ console.error('reactChatMsg error',err); }
}

let _typingTimer = null;

  clearTimeout(_typingTimer);
  try{ setDoc(doc(db,'presence',window.CU.id),{typingTo:_chatUserId,typingAt:serverTimestamp()},{merge:true}); }catch(e){}
  _typingTimer = setTimeout(function(){
    try{ setDoc(doc(db,'presence',window.CU.id),{typingTo:'',typingAt:serverTimestamp()},{merge:true}); }catch(e){}
  }, 4000);
}
// Marcar notifs 💬 de un remitente específico como leídas
function markChatNotifsRead(nick){
  if(!nick || !window.CU) return;
  let changed = false;
  _notifs.forEach(n=>{
    if(!n.read && n.text?.startsWith('💬') && n.text.includes(nick+':')){
      n.read=true; changed=true;
    }
  });
  if(changed){
    updateDoc(doc(db,'users',window.CU.id),{notifs:_notifs.slice(0,30)}).catch(()=>{});
    updateMsgBadge();
  }
}

async function sendChatMsg(gifUrl){
  if(!window.CU){ toast('Iniciá sesión primero','err'); return; }
  const inp = document.getElementById('chatInput');
  if(!inp) return;
  const text = gifUrl || inp.value.trim();
  if(!text || !_chatUserId) return;
  inp.value='';
  try{ setDoc(doc(db,'presence',window.CU.id),{typingTo:'',typingAt:serverTimestamp()},{merge:true}); }catch(e2){}
  const chatId = [window.CU.id, _chatUserId].sort().join('_');
  const msgData = { uid: window.CU.id, nick: window.CU.nick, time: serverTimestamp() };
  if(gifUrl){ msgData.gif = gifUrl; msgData.text = ''; }
  else { msgData.text = text; }
  try {
    await addDoc(collection(db,'chats',chatId,'messages'), msgData);
    // ✅ Enviar notificación al destinatario (solo si no está ya en este chat)
    // Nota: el destinatario marcará como leído si está en el chat, así que la notif llegará pero el badge no sumará
    const previewText = gifUrl ? '🖼️ GIF' : text.slice(0,60);
    await sendNotifToUser(_chatUserId, `💬 ${window.CU.nick}: ${previewText}`);
  } catch(e){ toast('Error al enviar mensaje','err'); inp.value=text; }
}

let _mediaRecorder = null;
let _audioChunks = [];
let _voiceTimerInterval = null;
let _voiceSeconds = 0;
let _voiceAnalyser = null;
let _voiceAudioCtx = null;
let _voiceStream = null;

function toggleVoiceBtn(){
  const inp = document.getElementById('chatInput');
  const sendBtn = document.getElementById('chatSendBtn');
  const micBtn = document.getElementById('voiceMsgBtn');
  if(!inp || !sendBtn || !micBtn) return;

async function toggleVoiceRecord(){
  if(!window.CU?.verified){
    toast('🎤 Mensajes de voz solo para usuarios ✅ Verificados','err');
    return;
  }
  if(_mediaRecorder && _mediaRecorder.state === 'recording'){
    stopAndSendVoice();
  } else {
    await startVoiceRecord();
  }
}

async function startVoiceRecord(){
  if(!window.CU){ toast('Iniciá sesión primero','err'); return; }
  if(!_chatUserId){ toast('Abrí un chat primero','err'); return; }
  try {
    _voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e){
    toast('Permiso de micrófono denegado','err'); return;
  }
  // Setup analyser for wave bar
  _voiceAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = _voiceAudioCtx.createMediaStreamSource(_voiceStream);
  _voiceAnalyser = _voiceAudioCtx.createAnalyser();
  _voiceAnalyser.fftSize = 64;
  source.connect(_voiceAnalyser);

  const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
    ? 'audio/webm;codecs=opus'
    : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';

  _audioChunks = [];
  _mediaRecorder = new MediaRecorder(_voiceStream, { mimeType });
  _mediaRecorder.ondataavailable = e => { if(e.data.size>0) _audioChunks.push(e.data); };
  _mediaRecorder.start(100);

  // Show recording UI
  const inputEl = document.getElementById('chatInput');
  const micBtn = document.getElementById('voiceMsgBtn');
  const sendBtn = document.getElementById('chatSendBtn');
  const bar = document.getElementById('voiceRecordingBar');
  if(inputEl) inputEl.style.display='none';
  if(micBtn) micBtn.style.display='none';
  if(sendBtn) sendBtn.style.display='none';
  if(bar){ bar.style.display='flex'; }

  // Timer
  _voiceSeconds = 0;
  updateVoiceTimer();
  _voiceTimerInterval = setInterval(()=>{
    _voiceSeconds++;
    updateVoiceTimer();
    if(_voiceSeconds >= 60){ stopAndSendVoice(); } // max 60s
  }, 1000);

  // Wave animation
  animateVoiceWave();

  // Mic button glow
  const btn = document.getElementById('voiceMsgBtn');
  if(btn){ btn.style.color='var(--red)'; }
}

function updateVoiceTimer(){
  const el = document.getElementById('voiceTimer');
  if(el){
    const m = Math.floor(_voiceSeconds/60);
    const s = (_voiceSeconds%60).toString().padStart(2,'0');
    el.textContent = m+':'+s;
  }
}

function animateVoiceWave(){
  if(!_voiceAnalyser || !_mediaRecorder || _mediaRecorder.state !== 'recording') return;
  const data = new Uint8Array(_voiceAnalyser.frequencyBinCount);
  _voiceAnalyser.getByteFrequencyData(data);
  const avg = data.reduce((a,b)=>a+b,0)/data.length;
  const pct = Math.min(100, (avg/128)*100);
  const wave = document.getElementById('voiceWave');
  if(wave) wave.style.width = pct+'%';
  requestAnimationFrame(animateVoiceWave);
}

function cancelVoiceRecord(){
  if(_mediaRecorder && _mediaRecorder.state !== 'inactive') _mediaRecorder.stop();
  _voiceStream?.getTracks().forEach(t=>t.stop());
  clearInterval(_voiceTimerInterval);
  if(_voiceAudioCtx) _voiceAudioCtx.close().catch(()=>{});
  _mediaRecorder=null; _audioChunks=[]; _voiceStream=null; _voiceAudioCtx=null;
  resetVoiceUI();
  toast('Grabación cancelada','inf');
}

function resetVoiceUI(){
  const inputEl = document.getElementById('chatInput');
  const micBtn = document.getElementById('voiceMsgBtn');
  const bar = document.getElementById('voiceRecordingBar');
  const sendBtn = document.getElementById('chatSendBtn');
  if(inputEl){ inputEl.style.display=''; }
  if(micBtn){ micBtn.style.display='block'; micBtn.style.color='var(--muted)'; }
  if(bar){ bar.style.display='none'; }
  if(sendBtn){ sendBtn.style.display='none'; }
}

async function stopAndSendVoice(){
  if(!_mediaRecorder || _mediaRecorder.state === 'inactive') return;
  clearInterval(_voiceTimerInterval);

  // Detener grabación y esperar que termine
  await new Promise(resolve=>{
    _mediaRecorder.onstop = resolve;
    if(_mediaRecorder.state !== 'inactive') _mediaRecorder.stop();
    else resolve();
  });
  _voiceStream?.getTracks().forEach(t=>t.stop());
  if(_voiceAudioCtx){ try{ await _voiceAudioCtx.close(); }catch(e){} }

  const mimeType = _mediaRecorder.mimeType || 'audio/webm';
  const chunks = [..._audioChunks]; // copia antes de limpiar
  const duration = _voiceSeconds;
  _mediaRecorder=null; _audioChunks=[]; _voiceStream=null; _voiceAudioCtx=null;

  const blob = new Blob(chunks, { type: mimeType });
  console.log('[Voice] blob size:', blob.size, 'type:', mimeType, 'duration:', duration);

  if(blob.size < 300){ toast('Grabación muy corta','err'); resetVoiceUI(); return; }

  resetVoiceUI();
  toast('Enviando audio...','inf');

  try {
    if(!window.CU || !_chatUserId){
      toast('Error: sesión no válida','err'); return;
    }

    // Subir a Cloudinary (resource_type=video acepta audio también)
    const ext = mimeType.includes('ogg') ? 'ogg' : mimeType.includes('mp4') ? 'mp4' : 'webm';
    const formData = new FormData();
    formData.append('file', blob, 'voice_' + Date.now() + '.' + ext);
    formData.append('upload_preset', 'charlasrf4_audio');

    const res = await fetch('https://api.cloudinary.com/v1_1/da0n5tg3g/video/upload', {
      method: 'POST',
      body: formData
    });
    const data = await res.json();
    console.log('[Voice] Cloudinary:', data);

    if(!data.secure_url) throw new Error(data.error?.message || 'Upload falló');

    const chatId = [window.CU.id, _chatUserId].sort().join('_');
    await addDoc(collection(db,'chats',chatId,'messages'),{
      uid: window.CU.id,
      nick: window.CU.nick,
      audioUrl: data.secure_url,
      audioDuration: duration,
      text: '',
      time: serverTimestamp()
    });
    toast('Audio enviado 🎤','ok');
  } catch(e){
    console.error('[Voice] Error:', e);
    toast('Error al enviar audio: ' + e.message,'err');
  }
}

function toggleVoicePlay(btn, url){
  // Stop any other playing audio
  if(window._playingAudio && window._playingAudio !== btn._audio){
    window._playingAudio.pause();
    window._playingAudio._btn && (window._playingAudio._btn.textContent='▶');
  }
  if(!btn._audio){
    btn._audio = new Audio(url);
    btn._audio._btn = btn;
    btn._audio.ontimeupdate = ()=>{
      const pct = btn._audio.duration ? (btn._audio.currentTime/btn._audio.duration)*100 : 0;
      const bar = btn.closest('div').querySelector('.voice-progress');
      if(bar) bar.style.width = pct+'%';
    };
    btn._audio.onended = ()=>{ btn.textContent='▶'; window._playingAudio=null; };
  }
  if(btn._audio.paused){
    btn._audio.play();
    btn.textContent='⏸';
    window._playingAudio = btn._audio;
  } else {
    btn._audio.pause();
    btn.textContent='▶';
  }
}

function blobToBase64(blob){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(blob);
  });
}

function toggleGifPicker(pickerId, targetId){
  const picker = document.getElementById(pickerId);
  if(!picker) return;
  const isOpen = picker.classList.contains('open');
  // Close all open pickers first
  document.querySelectorAll('.gif-picker.open').forEach(p => p.classList.remove('open'));

    picker.classList.add('open');
    _currentGifPicker = pickerId;
    _currentGifTarget = targetId;

    loadTrendingGifs(pickerId, targetId);

    const inp = picker.querySelector('input');
    if(inp) setTimeout(()=>inp.focus(), 100);
  }
}

function closeGifPicker(pickerId){
  const picker = document.getElementById(pickerId);
  if(picker) picker.classList.remove('open');
}

async function loadTrendingGifs(pickerId, targetId){
  const gridId = pickerId === 'chatGifPicker' ? 'chatGifGrid' : 'gifgrid_' + pickerId.replace('gifpick_','');
  const grid = document.getElementById(gridId) || document.querySelector('#'+pickerId+' .gif-grid');
  if(!grid) return;
  grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--muted);font-size:.8rem;">⏳ Cargando...</div>';
  try {
    const res = await fetch(`https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_KEY}&q=fishing+fish&limit=18&rating=g`);
    const data = await res.json();
    renderGifResults(data.data, grid, pickerId, targetId);
  } catch(e){ grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:12px;color:var(--muted);font-size:.78rem;">Error cargando GIFs</div>'; }
}

async function searchGifs(query, pickerId, targetId){
  clearTimeout(_gifDebounce);
  if(!query.trim()){ loadTrendingGifs(pickerId, targetId); return; }
  _gifDebounce = setTimeout(async()=>{
    const grid = document.querySelector('#'+pickerId+' .gif-grid');
    if(!grid) return;
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--muted);font-size:.8rem;">🔍 Buscando...</div>';
    try {
      const res = await fetch(`https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_KEY}&q=${encodeURIComponent(query)}&limit=18&rating=g`);
      const data = await res.json();
      renderGifResults(data.data, grid, pickerId, targetId);
    } catch(e){ grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:12px;color:var(--muted);font-size:.78rem;">Error buscando GIFs</div>'; }
  }, 400);
}

function renderGifResults(gifs, grid, pickerId, targetId){
  if(!gifs||!gifs.length){ grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:16px;color:var(--muted);font-size:.78rem;">Sin resultados</div>'; return; }
  grid.innerHTML = gifs.map(g=>{
    const url = g.images.fixed_height_small.url;
    const original = g.images.original.url;
    return `<div class="gif-item" onclick="sendGif('${original}','${pickerId}','${targetId}')"><img src="${url}" loading="lazy" alt="gif"></div>`;
  }).join('');
}

function sendGif(gifUrl, pickerId, targetId){
  closeGifPicker(pickerId);
  // Check if it's chat or comment
  if(targetId === 'chatInput'){
    sendChatMsg(gifUrl);
  } else {
    // It's a comment — submit gif as comment
    submitCommentGif(gifUrl, targetId.replace('cinp_',''));
  }
}

async function submitCommentGif(gifUrl, postId){
  if(!window.CU) return;
  const postRef = doc(db,'posts',postId);
  const snap = await getDoc(postRef);
  if(!snap.exists()) return;
  const post = snap.data();
  const newComment = {
    id: Date.now()+'_'+Math.random().toString(36).slice(2,7),
    userId: window.CU.id, userNick: window.CU.nick, userAv: window.CU.av||'',
    text: '', gif: gifUrl, time: Date.now()
  };
  const updatedComments = [...(post.comments||[]), newComment];
  await updateDoc(postRef, { comments: updatedComments });
}

// ===== REACTIONS MODAL =====
function buildRxnLabel(p){
  const reactions = p.reactions || {};
  const myFriends = window.CU?.friendsList || [];
  // Build list: own nick first, then friends who reacted, then others
  const entries = Object.entries(reactions).filter(([,e])=>e);
  if(!entries.length) return '';
  const names = [];
  // My own reaction
  if(window.CU && reactions[window.CU.id]) names.push('Tú');
  // Friends who reacted
  for(const f of myFriends){
    if(reactions[f.id] && f.id !== window.CU?.id) names.push(esc(f.nick||''));
    if(names.length >= 2) break;
  }
  // Others
  const namedIds = new Set([window.CU?.id, ...myFriends.map(f=>f.id)]);
  const otherCount = entries.filter(([uid])=>!namedIds.has(uid)).length;
  let label = names.join(', ');
  if(otherCount > 0) label += (names.length ? ' y ' : '') + otherCount + ' persona' + (otherCount>1?'s':'') + ' más';
  const total = entries.length;
  if(!label) label = total + ' reacción' + (total>1?'es':'');
  return label + ' reaccionaron';
}

async function openReactionsModal(pid){
  const p = _posts.find(x=>x.id===pid); if(!p) return;
  const reactions = p.reactions || {};
  const entries = Object.entries(reactions).filter(([,e])=>e);
  if(!entries.length) return;

  const myFriendsList = window.CU?.friendsList || [];
  const friendIds = new Set(myFriendsList.map(f=>f.id));

  const sorted = [...entries].sort(([a],[b])=>{
    const rank = id => id===window.CU?.id ? 0 : friendIds.has(id) ? 1 : 2;
    return rank(a) - rank(b);
  });

  // Build or reuse modal first (show loading state)
  let modal = document.getElementById('mReactionsDetail');
  if(!modal){
    modal = document.createElement('div');
    modal.className = 'mo';
    modal.id = 'mReactionsDetail';
    modal.addEventListener('click', e => { if(e.target===modal) modal.classList.remove('open'); });
    const box = document.createElement('div');
    box.className = 'modal modal-sm';
    box.style.maxWidth = '420px';
    const closeBtn = document.createElement('button');
    closeBtn.className = 'mcx';
    closeBtn.textContent = '✕';
    closeBtn.onclick = () => modal.classList.remove('open');
    const content = document.createElement('div');
    content.id = 'mReactionsDetailContent';
    content.style.cssText = 'padding:16px 20px 20px;';
    box.appendChild(closeBtn);
    box.appendChild(content);
    modal.appendChild(box);
    document.body.appendChild(modal);
  }
  modal.classList.add('open');
  const content = document.getElementById('mReactionsDetailContent');
  content.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted);">Cargando...</div>';

  // Fetch unknown users from Firestore
  const userCache = {};
  // Pre-fill with known users
  if(window.CU) userCache[window.CU.id] = {nick: window.CU.nick, av: window.CU.av||''};
  for(const f of myFriendsList) userCache[f.id] = {nick: f.nick, av: f.av||''};

  const unknownIds = sorted.map(([uid])=>uid).filter(uid=>!userCache[uid]);
  if(unknownIds.length){
    try {
      const fetches = unknownIds.map(uid => getDoc(doc(db,'users',uid)));
      const snaps = await Promise.all(fetches);
      snaps.forEach(s => { if(s.exists()) userCache[s.id] = {nick: s.data().nick||'Usuario', av: s.data().av||''}; });
    } catch(e){}
  }

  const allEmojis = [...new Set(sorted.map(([,e])=>e))];
  const tabs = ['Todos', ...allEmojis];

  function getInfo(uid){
    const u = userCache[uid] || {nick:'Usuario', av:''};
    const isMe = uid === window.CU?.id;
    const isFriend = friendIds.has(uid);
    return {
      nick: isMe ? (window.CU.nick||u.nick) : u.nick,
      av: isMe ? (window.CU.av||u.av) : u.av,
      badge: isMe ? 'tú' : isFriend ? 'amigo' : '',
      badgeColor: isMe ? 'var(--accent)' : 'var(--green)'
    };
  }

  function renderRow(uid, emoji){
    const info = getInfo(uid);
    const avHTML = info.av
      ? '<img src="'+info.av+'" style="width:100%;height:100%;object-fit:cover;">'
      : '<span>'+(info.nick||'?')[0].toUpperCase()+'</span>';
    const badgeHTML = info.badge
      ? '<span style="font-size:.62rem;color:'+info.badgeColor+';margin-left:5px;background:rgba(0,0,0,.15);padding:1px 5px;border-radius:100px;">'+info.badge+'</span>'
      : '';
    const isMe = uid === window.CU?.id;
    const clickAttr = isMe ? '' : 'style="cursor:pointer;" onclick="document.getElementById(\'mReactionsDetail\').classList.remove(\'open\');openUserProfile(\''+uid+'\',\''+esc(info.nick)+'\')"';
    return '<div '+clickAttr+' style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);">'
      + '<div style="width:38px;height:38px;border-radius:50%;background:var(--bg3);border:2px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.88rem;color:var(--accent);flex-shrink:0;">'+avHTML+'</div>'
      + '<div style="flex:1;font-size:.85rem;font-weight:600;">'+esc(info.nick||'...')+badgeHTML+'</div>'
      + '<span style="font-size:1.4rem;">'+emoji+'</span>'
      + '</div>';
  }

  function renderList(filter){
    const list = filter==='Todos' ? sorted : sorted.filter(([,e])=>e===filter);
    return list.map(([uid,emoji])=>renderRow(uid,emoji)).join('')
      || '<div style="text-align:center;padding:20px;color:var(--muted);font-size:.82rem;">Sin reacciones</div>';
  }

  function renderTabs(activeFilter){
    return tabs.map(t=>{
      const isActive = t===activeFilter;
      const label = t==='Todos' ? 'Todos ('+sorted.length+')' : t;
      const bg = isActive ? 'rgba(0,198,255,.15)' : 'var(--bg3)';
      const border = isActive ? 'var(--accent)' : 'var(--border)';
      const color = isActive ? 'var(--accent)' : 'var(--muted)';
      return '<button data-tab="'+t+'" style="background:'+bg+';border:1px solid '+border+';color:'+color+';padding:4px 12px;border-radius:100px;font-family:\'Exo 2\',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;">'+label+'</button>';
    }).join('');
  }

  content.innerHTML =
    '<div style="font-family:\'Orbitron\',monospace;font-size:.88rem;font-weight:700;color:var(--accent);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);">❤️ Reacciones &middot; '+sorted.length+'</div>'
    + '<div id="rxnTabs" style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;">'+renderTabs('Todos')+'</div>'
    + '<div id="rxnList" style="max-height:360px;overflow-y:auto;">'+renderList('Todos')+'</div>';

  const tabsEl = content.querySelector('#rxnTabs');
  if(tabsEl){
    tabsEl.addEventListener('click', e=>{
      const btn = e.target.closest('[data-tab]');
      if(!btn) return;
      const filter = btn.dataset.tab;
      content.querySelector('#rxnList').innerHTML = renderList(filter);
      tabsEl.querySelectorAll('[data-tab]').forEach(b=>{
        const active = b.dataset.tab === filter;
        b.style.background = active ? 'rgba(0,198,255,.15)' : 'var(--bg3)';
        b.style.borderColor = active ? 'var(--accent)' : 'var(--border)';
        b.style.color = active ? 'var(--accent)' : 'var(--muted)';
      });
    });
  }
}

let _pszImgData = null;

function previewPezSemanaImg(input){
  const f = input.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    _pszImgData = e.target.result;
    document.getElementById('pszImgPrev').innerHTML = `<div style="position:relative;display:inline-block;"><img src="${e.target.result}" style="max-height:140px;border-radius:var(--rs);border:1px solid var(--border);"><button onclick="_pszImgData=null;document.getElementById('pszImgPrev').innerHTML='';document.getElementById('pszImgInput').value='';" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);border:none;color:#fff;border-radius:50%;width:22px;height:22px;font-size:.7rem;cursor:pointer;line-height:22px;">✕</button></div>`;
  };
  reader.readAsDataURL(f);
}

async function submitPezSemana(){
  if(!window.CU || window.CU.nick !== 'ruizgustavo12'){ toast('Solo el admin puede hacer esto','err'); return; }
  const fish = document.getElementById('pszFish').value.trim();
  const queHacer = document.getElementById('pszQueHacer').value.trim();
  const errEl = document.getElementById('pszErr');

  }
  // Render numbered list from multiline text
  function numberedList(text){
    if(!text) return '';
    return text.split('\n').filter(l=>l.trim()).map((l,i)=>`<li style="margin-bottom:6px;color:#444;font-size:.82rem;">${i+1}. ${esc(l.trim())}</li>`).join('');
  }
  // Render bullet list from multiline text
  function bulletList(text){
    if(!text) return '';
    return text.split('\n').filter(l=>l.trim()).map(l=>`<li style="margin-bottom:5px;color:#444;font-size:.82rem;">${esc(l.trim())}</li>`).join('');
  }

  return `
  <div style="background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.25);font-family:'Exo 2',sans-serif;color:#333;">

        <span>Peces objetivo:</span>
        <span>Comenzar:</span>
        <span>Fin:</span>
        <span>Cuerpo de agua:</span>
        <span>Premio:</span>
        <span>Modo: &nbsp; Peso objetivo:</span>
      </div>
      <!-- Datos -->
      <div style="display:grid;grid-template-columns:140px 1fr 1fr 1fr 1fr 1fr;gap:4px;align-items:center;">
        <div>
          ${d.img ? `<img src="${d.img}" style="max-height:90px;max-width:130px;object-fit:contain;display:block;">` : `<div style="font-size:3rem;text-align:center;">🐟</div>`}
          <div style="font-size:.78rem;font-weight:700;color:#333;margin-top:4px;text-align:center;">${esc(d.fish)}</div>
        </div>
        <div style="font-size:.78rem;color:#555;">${fmtDT(d.start)}</div>
        <div style="font-size:.78rem;color:#555;">${fmtDT(d.end)}</div>
        <div style="font-size:.78rem;color:#555;">${esc(d.map||'Sin restricciones')}</div>
        <div style="font-size:.78rem;color:#555;">${esc(d.premio||'—')}</div>
        <div style="font-size:.78rem;color:#555;">${esc(d.modo||'—')}&nbsp;&nbsp; ${d.peso ? d.peso+' gramos' : '—'}</div>
      </div>
    </div>

    <!-- SECCIÓN 2 -->
    <div style="background:linear-gradient(135deg,#b8962e,#d4af5a);padding:12px 18px;">
      <div style="font-size:.95rem;font-weight:800;color:#fff;letter-spacing:.3px;">Programa del evento</div>
    </div>
    <div style="padding:16px 18px;">

      ${d.queHacer ? `
      <div style="font-size:.85rem;font-weight:700;color:#333;margin-bottom:8px;">¿Qué tienes que hacer?</div>
      <ol style="padding-left:18px;margin:0 0 16px;">${numberedList(d.queHacer)}</ol>` : ''}

      ${d.resultados ? `
      <div style="font-size:.85rem;font-weight:700;color:#333;margin-bottom:8px;">Resultados:</div>
      <ol style="padding-left:18px;margin:0 0 16px;">${numberedList(d.resultados)}</ol>` : ''}

function getLevel(xp){
  for(let i=XP_LEVELS.length-1;i>=0;i--){
    if((xp||0)>=XP_LEVELS[i].min) return {index:i, ...XP_LEVELS[i]};
  }
  return {index:0, ...XP_LEVELS[0]};
}

function getXpProgress(xp){
  const lvl = getLevel(xp);
  if(lvl.index===XP_LEVELS.length-1) return {pct:100, current:xp-lvl.min, needed:0};
  const current = (xp||0) - lvl.min;
  const needed = lvl.max - lvl.min + 1;
  return {pct: Math.min(100, Math.round(current/needed*100)), current, needed};
}

    addNotif(`🎉 ¡Subiste al nivel ${newLevel.name}! +${amount} XP por ${reason}`);

}

}

async function checkDailyStreak(){
  if(!window.CU) return;
  const now = Date.now();
  const today = new Date().toDateString();
  const lastLogin = window.CU.lastLoginDate||'';
  const yesterday = new Date(now-86400000).toDateString();

  if(lastLogin===today){
    // Already logged in today — just render
    renderXPUI(); return;
  }

  let newStreak = 1;
  if(lastLogin===yesterday){
    // Consecutive day — extend streak
    newStreak = (window.CU.streak||0)+1;
  }
  // else streak resets to 1

  const xpBonus = newStreak>=7?10:newStreak>=3?5:2;
  window.CU.streak = newStreak;
  window.CU.lastLoginDate = today;
  window.CU.xp = (window.CU.xp||0) + xpBonus;

  try {
    await updateDoc(doc(db,'users',window.CU.id),{
      streak:newStreak, lastLoginDate:today, xp:window.CU.xp
    });
  } catch(e){}

  if(newStreak===1){
    toast('👋 ¡Bienvenido! +'+xpBonus+' XP por iniciar sesión','inf');
  } else if(newStreak>=7){
    toast('🔥 ¡'+newStreak+' días seguidos! +'+xpBonus+' XP de bonus','ok');
  } else {
    toast('🔥 Racha de '+newStreak+' días · +'+xpBonus+' XP','inf');
  }
  renderXPUI();
}

function launchGoldConfetti(){
  const cols=['#ffd700','#ffec6e','#ffa500','#fff8dc','#fffacd','#ff8c00'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.style.cssText='position:fixed;z-index:99999;pointer-events:none;border-radius:2px;'
      +'left:'+Math.random()*100+'vw;top:-12px;'
      +'width:'+(5+Math.random()*7)+'px;height:'+(5+Math.random()*7)+'px;'
      +'background:'+cols[Math.floor(Math.random()*cols.length)]+';'
      +(Math.random()>.5?'border-radius:50%;':'')
      +'animation:goldFall '+(1.1+Math.random()*.9)+'s ease-in '+(Math.random()*.5)+'s forwards;';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2600);
  }
}

async function tryApplyChatGold(uid){
  try{
    const snap=await getDoc(doc(db,'users',uid));
    const theyV=snap.exists()&&snap.data().verified;
    const meV=!!window.CU?.verified;
    let tries=0;
    const go=()=>{
      tries++;
      const win=document.getElementById('chatWindow');
      if(!win){if(tries<10)setTimeout(go,200);return;}
      document.getElementById('chatVerifBanner')?.remove();
      if(theyV&&meV){
        win.classList.add('chat-gold-bg');
        const hdr=win.querySelector('div');

}

async function checkFriendsBirthdays(){
  if(!window.CU||!db) return;
  try {
    const friends = window.CU.friends || [];
    if(!friends.length) return;

    const now = new Date();
    const todayMMDD = (now.getMonth()+1).toString().padStart(2,'0')+'-'+now.getDate().toString().padStart(2,'0');

    // Evitar notificar dos veces el mismo día
    const lastBdayCheck = localStorage.getItem('_bdayCheck_'+window.CU.id);
    if(lastBdayCheck === todayMMDD) return;

    // Traer datos de los amigos
    const snaps = await Promise.all(friends.slice(0,30).map(fid=>getDoc(doc(db,'users',fid))));
    const cumpleaneros = snaps
      .filter(s=>s.exists())
      .map(s=>({id:s.id,...s.data()}))
      .filter(u=>u.birthdayMMDD===todayMMDD);

    if(!cumpleaneros.length) return;

    // Marcar que ya se chequeó hoy
    localStorage.setItem('_bdayCheck_'+window.CU.id, todayMMDD);

    // Mostrar notificación interna para cada cumpleañero
    for(const u of cumpleaneros){
      const notifs = window.CU.notifs || [];
      const yaNotif = notifs.some(n=>n.bdayUid===u.id && n.bdayDate===todayMMDD);
      if(yaNotif) continue;

      // Agregar notif a nuestro propio perfil
      const newNotif = {
        text:`🎂 ¡Hoy es el cumpleaños de ${u.nick}! Mandále un saludo 🎉`,
        time:Date.now(), read:false,
        bdayUid:u.id, bdayNick:u.nick, bdayDate:todayMMDD
      };
      const mySnap = await getDoc(doc(db,'users',window.CU.id));
      const myNotifs = mySnap.exists() ? (mySnap.data().notifs||[]) : [];
      myNotifs.unshift(newNotif);
      await updateDoc(doc(db,'users',window.CU.id),{notifs:myNotifs.slice(0,40)});
    }

    // Mostrar card especial en el feed si hay cumpleañeros
    showBirthdayCard(cumpleaneros);

  } catch(e){ console.error('checkFriendsBirthdays',e); }
}

    }, 400);
  }
  // También notificar al cumpleañero que alguien lo felicitó
  await sendNotifToUser(uid, `🎂 ¡${window.CU.nick} te deseó un feliz cumpleaños! 🎉`);
  toast('¡Mensaje de cumpleaños listo para enviar! 🎉','ok');
}


function filterChatSearch(val){
  const items = document.querySelectorAll('#chatListItems [data-chatuid]');
  const q = val.toLowerCase().trim();
  items.forEach(el=>{
    el.style.display = (!q || (el.dataset.searchname||'').includes(q)) ? '' : 'none';
  });
}

// ── Notif Dropdown (posicionado bajo campana) ──
function openNotifDropdown(){
  const dd = document.getElementById('mNotif');
  if(!dd) return;
  const isMobile = window.innerWidth <= 768;
  // Push URL only when opening (not closing)
  const willOpen = dd.style.display !== 'flex';
  if(willOpen && false) {
    history.pushState({page:'notificaciones'}, '', '/chatrf4/notificaciones');
  } else if(!willOpen && false) {
    history.pushState({page:'home'}, '', '/chatrf4/');
  }
  if(isMobile){
    // Mobile: full screen panel from top
    dd.style.top = '0';
    dd.style.left = '0';
    dd.style.right = '0';
    dd.style.bottom = '0';
    dd.style.width = '100vw';
    dd.style.maxWidth = '100vw';
    dd.style.height = '100vh';
    dd.style.maxHeight = '100vh';
    dd.style.borderRadius = '0';
  } else {
    // Desktop: posicionar bajo el ícono campana
    const bell = document.getElementById('notifBellBtn');
    if(bell){
      const rect = bell.getBoundingClientRect();
      dd.style.top = (rect.bottom + 8) + 'px';
      dd.style.right = Math.max(8, window.innerWidth - rect.right - 10) + 'px';
      dd.style.left = 'auto';
      dd.style.bottom = 'auto';
      dd.style.width = '380px';
      dd.style.maxWidth = 'calc(100vw - 16px)';
      dd.style.height = 'auto';
      dd.style.maxHeight = '80vh';
      dd.style.borderRadius = '14px';
    }
  }
  const isOpen = dd.style.display === 'flex';
  if(isOpen){ dd.style.display='none'; if(isMobile) document.body.style.overflow=''; return; }
  dd.style.display = 'flex';
  if(isMobile) document.body.style.overflow = 'hidden';
  // Marcar leídas al abrir
  if(_notifs.some(n=>!n.read)){
    setTimeout(async ()=>{
      _notifs.forEach(n=>n.read=true);
      if(window.CU) await updateDoc(doc(db,'users',window.CU.id),{notifs:_notifs}).catch(()=>{});
      updateNotifBadge();
    }, 1500);
  }
  renderNotifs();
  // Cerrar al click fuera (solo desktop)
  if(!isMobile){
    setTimeout(()=>{ document.addEventListener('click', _notifOutsideClick); }, 10);
  }
}
function _notifOutsideClick(e){
  const dd = document.getElementById('mNotif');
  const bell = document.getElementById('notifBellBtn');
  if(dd && !dd.contains(e.target) && bell && !bell.contains(e.target)){
    dd.style.display = 'none';
    document.removeEventListener('click', _notifOutsideClick);
  }
}
function closeNotifDropdown(){
  const dd = document.getElementById('mNotif');
  if(dd) dd.style.display = 'none';
  document.body.style.overflow = '';
  document.removeEventListener('click', _notifOutsideClick);
  // no pushState
}
function toggleNotifDropdown(e){
  e.stopPropagation();
  openNotifDropdown();
}

// ── Menú contextual del chat (ruedita) ──
let _chatMenuOpen = null;

function openChatMenu(e, uid, nick, hasUnread, isArchived){
  e.stopPropagation();
  // Cerrar menú anterior si existe
  document.getElementById('chatContextMenu')?.remove();
  document.removeEventListener('click', _closeChatMenu);

  const btn = e.currentTarget;
  const rect = btn.getBoundingClientRect();

  const menu = document.createElement('div');
  menu.id = 'chatContextMenu';
  menu.style.cssText = `position:fixed;z-index:9999;background:var(--bg2);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.5);min-width:180px;overflow:hidden;animation:mIn .15s ease;`;
  menu.style.top  = (rect.bottom + 6) + 'px';
  menu.style.right = (window.innerWidth - rect.right) + 'px';

  const safeNick = nick.replace(/'/g,'&apos;');
  const items = [
    !isArchived
      ? { icon:'📦', label:'Archivar chat',    fn:`archiveChat('${uid}','${safeNick}')` }
      : { icon:'📤', label:'Desarchivar chat', fn:`unarchiveChat('${uid}')` },
    hasUnread
      ? { icon:'✓',  label:'Marcar como leído',    fn:`markChatRead('${uid}')` }
      : { icon:'●',  label:'Marcar como no leído',  fn:`markChatUnread('${uid}','${safeNick}')` },
    { icon:'🗑', label:'Eliminar chat', fn:`deleteChatConfirm('${uid}','${safeNick}')`, danger:true },
  ];

  items.forEach(item=>{
    const btn = document.createElement('button');
    btn.style.cssText = `display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;padding:11px 16px;font-size:.84rem;cursor:pointer;font-family:'Exo 2',sans-serif;color:${item.danger?'var(--red)':'var(--text)'};text-align:left;transition:background .12s;`;
    btn.innerHTML = `<span style="font-size:1rem;">${item.icon}</span>${item.label}`;
    btn.onmouseover = ()=>btn.style.background='var(--bg3)';
    btn.onmouseout  = ()=>btn.style.background='none';
    btn.onclick = (ev)=>{ ev.stopPropagation(); document.getElementById('chatContextMenu')?.remove(); new Function(item.fn)(); };
    menu.appendChild(btn);
  });

  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener('click', _closeChatMenu), 10);
}

function _closeChatMenu(e){
  const m = document.getElementById('chatContextMenu');
  if(m && !m.contains(e.target)){ m.remove(); document.removeEventListener('click', _closeChatMenu); }
}

async function archiveChat(uid, nick){
  if(!window.CU) return;
  const arch = window.CU.archivedChats || [];
  if(!arch.includes(uid)){
    arch.push(uid);
    window.CU.archivedChats = arch;
    await updateDoc(doc(db,'users',window.CU.id),{archivedChats:arch});
  }
  toast(`💬 Chat con ${nick} archivado 📦`,'ok');
  // Cambiar al tab archivados para que el usuario lo vea inmediatamente
  _currentChatTab = 'archived';
  ['all','unread','archived'].forEach(t=>{
    const btn = document.getElementById('chatTab-'+t);
    if(!btn) return;
    const active = t==='archived';
    btn.style.borderBottom = active ? '2px solid var(--accent)' : '2px solid transparent';
    btn.style.color = active ? 'var(--accent)' : 'var(--muted)';
    btn.style.fontWeight = active ? '700' : '600';
  });
  const _archList = document.getElementById('messengerList');
  if(_archList && _archList.style.display !== 'none') _archList.innerHTML = _buildMessengerHTML();
}

async function unarchiveChat(uid){
  if(!window.CU) return;
  window.CU.archivedChats = (window.CU.archivedChats||[]).filter(id=>id!==uid);
  await updateDoc(doc(db,'users',window.CU.id),{archivedChats:window.CU.archivedChats});
  toast('Chat desarchivado','ok');
  // Volver al tab "Todos" después de desarchivar
  _currentChatTab = 'all';
  ['all','unread','archived'].forEach(t=>{
    const btn = document.getElementById('chatTab-'+t);
    if(!btn) return;
    const active = t==='all';
    btn.style.borderBottom = active ? '2px solid var(--accent)' : '2px solid transparent';
    btn.style.color = active ? 'var(--accent)' : 'var(--muted)';
    btn.style.fontWeight = active ? '700' : '600';
  });
  const _uarchList = document.getElementById('messengerList');
  if(_uarchList && _uarchList.style.display !== 'none') _uarchList.innerHTML = _buildMessengerHTML();
}

async function markChatRead(uid){
  if(!window.CU) return;
  try{
    const chatId = [window.CU.id, uid].sort().join('_');
    const q = query(collection(db,'chats',chatId,'messages'), orderBy('time','desc'), limit(50));
    const snap = await getDocs(q);
    const myId = window.CU.id;
    const toMark = snap.docs.filter(d=>d.data().uid!==myId && !d.data().read);
    await Promise.all(toMark.map(d=>updateDoc(d.ref,{read:true})));
    if(_chatLastMsgs[uid]) _chatLastMsgs[uid].unread = false;
    updateMsgBadge();
    renderMessengerList();
    toast('Chat marcado como leído ✓','ok');
  }catch(e){ console.error(e); }
}

async function markChatUnread(uid, nick){
  if(_chatLastMsgs[uid]) _chatLastMsgs[uid].unread = true;
  renderMessengerList();
  toast(`Chat con ${nick} marcado como no leído ●`,'ok');
}

async function deleteChatConfirm(uid, nick){
  if(!confirm(`¿Eliminar el chat con ${nick}? Esto borra el historial solo de tu lado.`)) return;
  try{
    const chatId = [window.CU.id, uid].sort().join('_');
    const q = query(collection(db,'chats',chatId,'messages'), orderBy('time','desc'));
    const snap = await getDocs(q);
    // Marcar TODOS (propios y recibidos) como borrados para mí + marcar leídos
    await Promise.all(snap.docs.map(d=>{
      const df = d.data().deletedFor || {};
      df[window.CU.id] = true;
      return updateDoc(d.ref, {deletedFor: df, read: true});
    }));
    // Guardar en Firestore el ID del amigo como chat borrado
    const deleted = window.CU.deletedChats || [];
    if(!deleted.includes(uid)) deleted.push(uid);
    window.CU.deletedChats = deleted;
    await updateDoc(doc(db,'users',window.CU.id), {deletedChats: deleted});
    // Limpiar estado local
    delete _chatLastMsgs[uid];
    // Limpiar notifs de mensajes de este usuario en _notifs
    const prevLen = _notifs.length;
    _notifs = _notifs.filter(n=>!(n.fromId===uid || (n.text&&n.text.startsWith('💬')&&n.text.includes(nick))));
    if(_notifs.length !== prevLen){
      await updateDoc(doc(db,'users',window.CU.id),{notifs:_notifs}).catch(()=>{});
    }
    updateNotifBadge(); updateMsgBadge();
    renderMessengerList();
    toast('✓ Chat eliminado','ok');
  }catch(e){ console.error(e); toast('Error al eliminar','err'); }
}


Object.entries(_expose).forEach(([k,v])=>{ window[k]=v; });
// Replay any calls that happened before module loaded
if(window._q) window._q.forEach(([name,args])=>{ if(window[name]) window[name](...args); });
