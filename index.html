function swPTab(el, tabId){
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  const aboutEl = document.getElementById('ptAbout');
  const galleryEl = document.getElementById('ptGallery');
  const friendsEl = document.getElementById('ptFriends');
  const shopEl = document.getElementById('ptShop');
  const feedEl = document.getElementById('profileFeed');
  const postBox = document.getElementById('profilePostBox');
  const leftCol = document.getElementById('profileLeftCol');
  if(aboutEl) aboutEl.style.display = tabId==='ptAbout' ? 'block' : 'none';
  if(galleryEl) galleryEl.style.display = tabId==='ptGallery' ? 'block' : 'none';
  if(friendsEl) friendsEl.style.display = tabId==='ptFriends' ? 'block' : 'none';
  if(shopEl) shopEl.style.display = tabId==='ptShop' ? 'block' : 'none';
  if(feedEl) feedEl.style.display = tabId==='ptPosts' ? 'block' : 'none';
  if(postBox) postBox.style.display = tabId==='ptPosts' ? 'block' : 'none';
  if(leftCol) leftCol.style.display = (tabId==='ptAbout' || tabId==='ptFriends') ? 'none' : 'block';
  if(tabId==='ptGallery') renderGallery();
  if(tabId==='ptFriends') renderProfileFriendsList();
  if(tabId==='ptShop'){ loadShopEquipped().then(()=>renderShopGrid()); loadShopDiscount(); }
}

let _shopParticleInterval = null;

// ── BANNER ENGINE (Canvas 2D) ──
function stopBannerAnim(){
  if(_bannerAnimFrame){ cancelAnimationFrame(_bannerAnimFrame); _bannerAnimFrame=null; }
  const cv = document.getElementById('profileBannerCanvas');
  if(cv){ cv.style.display='none'; const ctx=cv.getContext('2d'); ctx.clearRect(0,0,cv.width,cv.height); }
  // Restaurar fondo del cover
  const cover = document.getElementById('profCover');
  if(cover) cover.style.background='';
}

function startBannerAnim(fnName){
  stopBannerAnim();
  const cv = document.getElementById('profileBannerCanvas');
  if(!cv) return;
  const cover = document.getElementById('profCover');
  cv.style.display='block';
  // Resize canvas to match element
  function resize(){ cv.width=cv.offsetWidth||cover?.offsetWidth||800; cv.height=cv.offsetHeight||cover?.offsetHeight||300; }
  resize();
  window[fnName](cv, resize);
}

function bannerFuego(cv, resize){
  const ctx = cv.getContext('2d');
  if(document.getElementById('profCover')) document.getElementById('profCover').style.background='linear-gradient(180deg,#0a0000,#2d0800,#4a1000)';
  // partículas de fuego
  const particles = Array.from({length:120},()=>mkFireParticle(cv));
  // brasas
  const embers = Array.from({length:40},()=>mkEmber(cv));
  function mkFireParticle(c){
    return { x:Math.random()*c.width, y:c.height+Math.random()*60,
      size:3+Math.random()*18, speed:0.8+Math.random()*2.5,
      wobble:Math.random()*Math.PI*2, wobbleSpeed:0.03+Math.random()*.05,
      alpha:0.6+Math.random()*.4,
      hue: 10+Math.random()*30 // rojo a naranja
    };
  }
  function mkEmber(c){ return { x:Math.random()*c.width, y:c.height+Math.random()*40, size:1+Math.random()*3, speed:1+Math.random()*3, vx:(Math.random()-.5)*1.5, alpha:Math.random() }; }
  function draw(){
    resize(); ctx.clearRect(0,0,cv.width,cv.height);
    // llamas
    particles.forEach(p=>{
      p.y -= p.speed; p.wobble += p.wobbleSpeed; p.x += Math.sin(p.wobble)*1.2;
      p.size *= .995; p.alpha -= .003;
      if(p.y < -p.size || p.alpha<=0){ Object.assign(p, mkFireParticle(cv)); p.y=cv.height+10; }
      const prog = 1-(p.y/cv.height);
      const grd = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
      grd.addColorStop(0, `hsla(${p.hue+prog*20},100%,70%,${p.alpha})`);
      grd.addColorStop(.5,`hsla(${p.hue},100%,50%,${p.alpha*.7})`);
      grd.addColorStop(1, `hsla(${p.hue-10},100%,30%,0)`);
      ctx.beginPath(); ctx.fillStyle=grd; ctx.ellipse(p.x,p.y,p.size*.5,p.size,0,0,Math.PI*2); ctx.fill();
    });
    // brasas flotantes
    embers.forEach(e=>{
      e.y -= e.speed; e.x += e.vx; e.alpha -= .008;
      if(e.y<-10||e.alpha<=0){ Object.assign(e,mkEmber(cv)); e.y=cv.height; }
      ctx.beginPath(); ctx.fillStyle=`rgba(255,${100+Math.random()*100},0,${e.alpha})`; ctx.arc(e.x,e.y,e.size,0,Math.PI*2); ctx.fill();
    });
    _bannerAnimFrame = requestAnimationFrame(draw);
  }
  draw();
}

function bannerFlores(cv, resize){
  const ctx = cv.getContext('2d');
  if(document.getElementById('profCover')) document.getElementById('profCover').style.background='linear-gradient(180deg,#0d0018,#1e0042,#2d0060)';
  const petals = Array.from({length:80},()=>mkPetal(cv));
  const particles = Array.from({length:40},()=>mkSparkle(cv));
  function mkPetal(c){ return { x:Math.random()*c.width, y:c.height+Math.random()*100, size:6+Math.random()*16, speed:.4+Math.random()*1.4, vx:(Math.random()-.5)*1, rot:Math.random()*Math.PI*2, rotSpeed:.02+Math.random()*.04, alpha:.7+Math.random()*.3, hue:270+Math.random()*60 }; }
  function mkSparkle(c){ return { x:Math.random()*c.width, y:Math.random()*c.height, size:1+Math.random()*2, twinkle:Math.random()*Math.PI*2, speed:.02+Math.random()*.04 }; }
  function drawPetal(x,y,size,rot,alpha,hue){
    ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.globalAlpha=alpha;
    const g = ctx.createRadialGradient(0,0,0,0,0,size);
    g.addColorStop(0,`hsla(${hue},100%,80%,.9)`);
    g.addColorStop(.6,`hsla(${hue-20},90%,60%,.6)`);
    g.addColorStop(1,`hsla(${hue-30},80%,40%,0)`);
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.ellipse(0,-size*.5,size*.4,size*.9,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(size*.4,0,size*.4,size*.9,Math.PI/3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-size*.4,0,size*.4,size*.9,-Math.PI/3,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  function draw(){
    resize(); ctx.clearRect(0,0,cv.width,cv.height);
    // estrellas de fondo
    particles.forEach(s=>{
      s.twinkle+=s.speed; const a=.3+.6*((Math.sin(s.twinkle)+1)/2);
      ctx.beginPath(); ctx.fillStyle=`rgba(200,160,255,${a})`; ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fill();
    });
    // pétalos
    petals.forEach(p=>{
      p.y-=p.speed; p.x+=p.vx+Math.sin(p.rot)*.5; p.rot+=p.rotSpeed; p.alpha-=.002;
      if(p.y<-p.size*2||p.alpha<=0){ Object.assign(p,mkPetal(cv)); p.y=cv.height+20; }
      drawPetal(p.x,p.y,p.size,p.rot,p.alpha,p.hue);
    });
    _bannerAnimFrame = requestAnimationFrame(draw);
  }
  draw();
}

function bannerOcean(cv, resize){
  const ctx=cv.getContext('2d');
  if(document.getElementById('profCover')) document.getElementById('profCover').style.background='linear-gradient(180deg,#00050f,#001530,#002050)';
  const bubbles=Array.from({length:60},()=>mkBubble(cv));
  let t=0;
  function mkBubble(c){ return {x:Math.random()*c.width, y:c.height+Math.random()*50, r:2+Math.random()*12, speed:.3+Math.random()*1, vx:(Math.random()-.5)*.8, alpha:.4+Math.random()*.5}; }
  function draw(){
    t+=.01; resize(); ctx.clearRect(0,0,cv.width,cv.height);
    // olas
    for(let w=0;w<3;w++){
      ctx.beginPath(); ctx.moveTo(0,cv.height);
      for(let x=0;x<=cv.width;x+=10){
        const y=cv.height*.7+Math.sin(x*.02+t+w*2)*15+Math.sin(x*.04-t*.7+w)*8;
        ctx.lineTo(x,y);
      }
      ctx.lineTo(cv.width,cv.height); ctx.closePath();
      ctx.fillStyle=`rgba(0,100,200,${.08+w*.04})`; ctx.fill();
    }
    // burbujas
    bubbles.forEach(b=>{
      b.y-=b.speed; b.x+=b.vx+Math.sin(t+b.r)*.3; b.alpha-=.0015;
      if(b.y<-b.r*2||b.alpha<=0){ Object.assign(b,mkBubble(cv)); b.y=cv.height; }
      ctx.beginPath(); ctx.strokeStyle=`rgba(100,200,255,${b.alpha})`; ctx.lineWidth=1.5;
      ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle=`rgba(150,220,255,${b.alpha*.2})`; ctx.fill();
    });
    _bannerAnimFrame=requestAnimationFrame(draw);
  }
  draw();
}

function bannerAurora(cv, resize){
  const ctx=cv.getContext('2d');
  if(document.getElementById('profCover')) document.getElementById('profCover').style.background='linear-gradient(180deg,#000508,#001010,#001a15)';
  const stars=Array.from({length:80},()=>({x:Math.random()*800,y:Math.random()*300,r:Math.random()*1.5,t:Math.random()*Math.PI*2}));
  let t=0;
  function draw(){
    t+=.008; resize();
    // actualiza posiciones estrella
    stars.forEach(s=>{ s.x=(s.x/800)*cv.width; s.y=(s.y/300)*cv.height; });
    ctx.clearRect(0,0,cv.width,cv.height);
    // estrellas
    stars.forEach(s=>{ s.t+=.02; const a=.3+.6*((Math.sin(s.t)+1)/2); ctx.beginPath(); ctx.fillStyle=`rgba(200,255,240,${a})`; ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); });
    // cortinas de aurora
    const cols=['rgba(0,255,150','rgba(0,200,255','rgba(100,0,255','rgba(0,255,100'];
    for(let i=0;i<4;i++){
      ctx.save(); ctx.globalAlpha=.15+Math.sin(t+i)*0.07;
      const grd=ctx.createLinearGradient(0,0,0,cv.height);
      grd.addColorStop(0,`${cols[i%cols.length]},0)`);
      grd.addColorStop(.3,`${cols[i%cols.length]},.6)`);
      grd.addColorStop(1,`${cols[(i+1)%cols.length]},0)`);
      ctx.fillStyle=grd;
      ctx.beginPath();
      const xBase=(i/4)*cv.width+Math.sin(t*.5+i)*60;
      const ww=cv.width*.35;
      ctx.moveTo(xBase,0);
      for(let y=0;y<=cv.height;y+=5){
        ctx.lineTo(xBase+Math.sin(y*.02+t+i)*40+ww*(y/cv.height),y);
      }
      ctx.lineTo(xBase+ww,cv.height); ctx.lineTo(xBase,0); ctx.closePath(); ctx.fill(); ctx.restore();
    }
    _bannerAnimFrame=requestAnimationFrame(draw);
  }
  draw();
}

function bannerGalaxy(cv, resize){
  const ctx=cv.getContext('2d');
  if(document.getElementById('profCover')) document.getElementById('profCover').style.background='linear-gradient(180deg,#000005,#050010,#0a0020)';
  const stars=Array.from({length:200},()=>({x:Math.random(),y:Math.random(),r:.5+Math.random()*2,t:Math.random()*Math.PI*2,speed:.01+Math.random()*.04,col:[`255,255,255`,`200,200,255`,`255,220,180`,`180,220,255`][Math.floor(Math.random()*4)]}));
  const nebula=Array.from({length:8},()=>({x:Math.random(),y:Math.random(),r:40+Math.random()*80,hue:200+Math.random()*160,t:Math.random()*Math.PI*2}));
  let t=0;
  function draw(){
    t+=.005; resize(); ctx.clearRect(0,0,cv.width,cv.height);
    // nebulosas
    nebula.forEach(n=>{ n.t+=.003; const g=ctx.createRadialGradient(n.x*cv.width,n.y*cv.height,0,n.x*cv.width,n.y*cv.height,n.r*(1+Math.sin(n.t)*.1)); g.addColorStop(0,`hsla(${n.hue},100%,60%,.12)`); g.addColorStop(1,`hsla(${n.hue},80%,40%,0)`); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(n.x*cv.width,n.y*cv.height,n.r*1.5,0,Math.PI*2); ctx.fill(); });
    // estrellas
    stars.forEach(s=>{ s.t+=s.speed; const a=.4+.6*((Math.sin(s.t)+1)/2); ctx.beginPath(); ctx.fillStyle=`rgba(${s.col},${a})`; ctx.arc(s.x*cv.width,s.y*cv.height,s.r*(a*.5+.5),0,Math.PI*2); ctx.fill(); });
    _bannerAnimFrame=requestAnimationFrame(draw);
  }
  draw();
}

function bannerStorm(cv, resize){
  const ctx=cv.getContext('2d');
  if(document.getElementById('profCover')) document.getElementById('profCover').style.background='linear-gradient(180deg,#050507,#0a0a10,#101018)';
  const drops=Array.from({length:120},()=>mkDrop(cv));
  let t=0, lightningT=0, lightningAlpha=0;
  function mkDrop(c){ return {x:Math.random()*c.width, y:Math.random()*c.height, speed:4+Math.random()*8, len:8+Math.random()*20, alpha:.2+Math.random()*.5}; }
  function drawLightning(x,y,x2,y2,depth){
    if(depth<=0) return; const mx=(x+x2)/2+(Math.random()-.5)*60; const my=(y+y2)/2+(Math.random()-.5)*20;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(mx,my); ctx.lineTo(x2,y2);
    ctx.strokeStyle=`rgba(200,220,255,${lightningAlpha})`; ctx.lineWidth=depth*.5; ctx.stroke();
    drawLightning(x,y,mx,my,depth-1); drawLightning(mx,my,x2,y2,depth-1);
  }
  function draw(){
    t+=1; lightningT--; resize(); ctx.clearRect(0,0,cv.width,cv.height);
    // lluvia
    ctx.strokeStyle='rgba(150,180,255,.4)'; ctx.lineWidth=1;
    drops.forEach(d=>{
      d.y+=d.speed; if(d.y>cv.height){ Object.assign(d,mkDrop(cv)); d.y=-d.len; }
      ctx.beginPath(); ctx.globalAlpha=d.alpha; ctx.moveTo(d.x,d.y); ctx.lineTo(d.x-2,d.y+d.len); ctx.stroke();
    });
    ctx.globalAlpha=1;
    // rayos aleatorios
    if(lightningT<=0){ lightningAlpha=.6+Math.random()*.4; lightningT=80+Math.random()*200; drawLightning(Math.random()*cv.width,0,Math.random()*cv.width,cv.height*.6,4); }
    _bannerAnimFrame=requestAnimationFrame(draw);
  }
  draw();
}

async function toggleEquipItem(itemId){
  const item = SHOP_ITEMS.find(i=>i.id===itemId);
  if(!item) return;
  const alreadyEquipped = _equippedItems[item.cat] === itemId;

  if(alreadyEquipped){
    delete _equippedItems[item.cat];
    toast(`${item.emoji} "${item.name}" desequipado`, 'inf');
  } else {
    _equippedItems[item.cat] = itemId;
    toast(`${item.emoji} "${item.name}" ¡equipado!`, 'ok');
  }

  // Save to Firestore — usar updateDoc con deleteField() para borrar correctamente
  try {
    const firestoreUpdate = {};
    if(alreadyEquipped){
      // deleteField() borra el campo correctamente en Firestore (setDoc merge NO borra)
      firestoreUpdate[`shopEquipped.${item.cat}`] = deleteField();
    } else {
      firestoreUpdate[`shopEquipped.${item.cat}`] = itemId;
    }
    await updateDoc(doc(db,'users',window.CU.id), firestoreUpdate);
    window.CU.shopEquipped = { ..._equippedItems };
    // Sincronizar cache _usersShop con el estado actual
    if(window._usersShop) window._usersShop[window.CU.id] = { ..._equippedItems };
  } catch(e){ console.warn('shop save error',e); }

  renderShopGrid();
  applyShopEffects();
}



function applyShopEffects(){

  const avWrap = document.querySelector('.profile-av-wrap');
  if(avWrap){
    avWrap.classList.remove('ring-gold','ring-fire','ring-ice','ring-fish','ring-legend',

    const marco = _equippedItems.marco;
    if(marco){ const it=SHOP_ITEMS.find(i=>i.id===marco); if(it?.effect) avWrap.classList.add(it.effect); }
  }

  // ── TÍTULO bajo el nombre ──
  let titleEl = document.getElementById('shopTitleDisplay');
  const tituloId = _equippedItems.titulo;
  if(tituloId){
    const tItem = SHOP_ITEMS.find(i=>i.id===tituloId);
    if(tItem){
      if(!titleEl){
        titleEl = document.createElement('div');
        titleEl.id = 'shopTitleDisplay';
        const bioEl = document.getElementById('profBioEl');
        if(bioEl) bioEl.insertAdjacentElement('beforebegin', titleEl);
      }
      const isLegend = tituloId==='titulo_legend';
      titleEl.style.cssText=`font-size:.72rem;font-weight:800;letter-spacing:.08em;margin:3px 0 5px;text-align:center;${isLegend?'background:linear-gradient(135deg,gold,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:goldShimmer 2s ease-in-out infinite alternate;':'color:var(--muted);'}`;
      titleEl.textContent = `${tItem.emoji} ${tItem.name.toUpperCase()}`;
    }
  } else {
    if(titleEl) titleEl.remove();
  }

  // ── BADGE junto al nombre ──
  let badgeShopEl = document.getElementById('shopBadgeDisplay');
  const badgeId = _equippedItems.badge;
  if(badgeId){
    const bItem = SHOP_ITEMS.find(i=>i.id===badgeId);
    if(bItem){
      if(!badgeShopEl){
        badgeShopEl = document.createElement('span');
        badgeShopEl.id = 'shopBadgeDisplay';
        badgeShopEl.style.cssText='font-size:1.2rem;cursor:default;';
        const nameContainer = document.getElementById('profName')?.parentElement;
        if(nameContainer) nameContainer.appendChild(badgeShopEl);
      }
      badgeShopEl.textContent = bItem.preview;
      badgeShopEl.title = bItem.name;
    }
  } else {
    if(badgeShopEl) badgeShopEl.remove();
  }

  // ── EFECTOS de partículas ──
  _stopShopParticles();
  const efectoId = _equippedItems.efecto;
  if(efectoId) _startShopParticles(efectoId);

  // ── BANNER ANIMADO ──
  const bannerId = _equippedItems.banner;
  stopBannerAnim();

}

    efecto_aurora:    ['🌈','💜','💙','🟣','✨'],

async function loadShopEquipped(){

      // Usar shopEquipped de Firestore — si el campo no existe o es undefined, usar {}
      // Nunca usar valor local anterior para evitar que ítems desequipados reaparezcan
      _equippedItems = (data.shopEquipped !== undefined) ? data.shopEquipped : {};
      window.CU.shopEquipped = { ..._equippedItems };
      // Sincronizar cache global
      if(window._usersShop) window._usersShop[window.CU.id] = { ..._equippedItems };

      _equippedItems = {};
      window.CU.shopEquipped = {};
      if(window._usersShop) window._usersShop[window.CU.id] = {};
    }
  } catch(e){
    console.warn('loadShopEquipped error', e);
    _equippedItems = {};
  }
  applyShopEffects();
}

  _notifs.unshift(notif);

  renderNotifs(); updateNotifBadge(); playNotifSound();

function playNotifSound(){
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(660,ctx.currentTime);
    o.frequency.setValueAtTime(880,ctx.currentTime+0.08);
    g.gain.setValueAtTime(0.12,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);
    o.start(); o.stop(ctx.currentTime+0.25);
  } catch(e){}
}

function _notifIcon(n){
  // Retorna {emoji, bg, icon} para el badge sobre el avatar
  if(n.type==='friendRequest') return {bg:'#1877f2', icon:'👥'};
  const t = n.text||'';
  if(t.includes('cumpleaños')||t.includes('🎂')) return {bg:'#e91e63', icon:'🎂'};
  if(t.includes('reaccionó')||t.includes('❤️')||t.includes('😍')) return {bg:'#f02849', icon:'❤️'};
  if(t.includes('comentó')||t.includes('💬')) return {bg:'#1877f2', icon:'💬'};
  if(t.includes('compartió')||t.includes('🔁')) return {bg:'#1877f2', icon:'🔁'};
  if(t.includes('etiquetó')||t.includes('🏷')) return {bg:'#1877f2', icon:'🏷️'};
  if(t.includes('amigo')||t.includes('solicitud')||t.includes('aceptó')) return {bg:'#1877f2', icon:'👥'};
  if(t.includes('spot')||t.includes('📍')) return {bg:'#43a047', icon:'📍'};
  if(t.includes('trofeo')||t.includes('🏆')) return {bg:'#f9a825', icon:'🏆'};
  if(t.includes('verificad')||t.includes('✅')) return {bg:'#ffd700', icon:'✅'};
  if(t.includes('historia')||t.includes('📖')) return {bg:'#9c27b0', icon:'📖'};
  if(t.includes('felicitó')||t.includes('🎉')) return {bg:'#e91e63', icon:'🎉'};
  return {bg:'#1877f2', icon:'🔔'};
}

function renderNotifs(){
  const el = document.getElementById('notifList');
  if(!el) return;
  // Excluir notificaciones de mensajes 💬 — esas van al ícono de chat, no a la campana
  const noMsg = _notifs.filter(n=>!(n.text&&n.text.startsWith('💬')));
  const list = _notifTab==='unread' ? noMsg.filter(n=>!n.read) : noMsg;
  if(!list.length){
    el.innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--muted);">
      <div style="font-size:2.5rem;margin-bottom:10px;">${_notifTab==='unread'?'✓':'🔔'}</div>
      <div style="font-size:.85rem;">${_notifTab==='unread'?'Todo al día, sin notificaciones sin leer':'Sin notificaciones aún'}</div>
    </div>`;
    el.onclick = null;
    return;
  }

  // Agrupar por hoy / anteriores
  const now = Date.now();
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayTs = todayStart.getTime();
  const todayItems = list.filter(n=>(n.time||0)>=todayTs);
  const prevItems  = list.filter(n=>(n.time||0)<todayTs);

  function renderItem(n, i){
    const isRead = !!n.read;
    const {bg, icon} = _notifIcon(n);

    // Avatar del que generó la notif
    const fromAv = n.fromAv || n.visitorAv || '';
    const fromNick = n.fromNick || n.visitorNick || 'RF4';
    const avInner = fromAv
      ? `<img src="${fromAv}" style="width:100%;height:100%;object-fit:cover;">`
      : `<span style="font-size:1.1rem;font-weight:800;color:var(--accent);">${(fromNick[0]||'R').toUpperCase()}</span>`;

    if(n.type==='friendRequest'){
      const safeNick = (n.fromNick||'').replace(/['"<>&]/g,'');
      return `<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 16px;transition:background .15s;${isRead?'':'background:rgba(0,198,255,.05);'};cursor:pointer;"
        onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='${isRead?'':'rgba(0,198,255,.05)'}'">
        <div style="position:relative;flex-shrink:0;">
          <div style="width:52px;height:52px;border-radius:50%;background:var(--bg3);overflow:hidden;display:flex;align-items:center;justify-content:center;">${avInner}</div>
          <div style="position:absolute;bottom:-2px;right:-2px;width:20px;height:20px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;font-size:.7rem;border:2px solid var(--bg2);">${icon}</div>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:.83rem;line-height:1.4;margin-bottom:8px;"><strong>${esc(n.fromNick||'')}</strong> <span style="color:var(--muted);">quiere ser tu amigo/a</span></div>
          <div style="font-size:.7rem;color:var(--accent);margin-bottom:10px;">${fmtT(n.time)}</div>
          <div style="display:flex;gap:8px;">
            <button data-action="accept-friend" data-idx="${i}" data-uid="${n.fromId}" data-nick="${safeNick}"
              style="flex:1;padding:8px;background:var(--accent);border:none;color:#000;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:'Exo 2',sans-serif;transition:opacity .15s;"
              onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">Confirmar</button>
            <button data-action="reject-friend" data-idx="${i}"
              style="flex:1;padding:8px;background:var(--bg3);border:none;color:var(--text);border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:'Exo 2',sans-serif;transition:background .15s;"
              onmouseover="this.style.background='var(--bg4)'" onmouseout="this.style.background='var(--bg3)'">Eliminar</button>
          </div>
        </div>
        ${!isRead?`<div style="width:10px;height:10px;background:var(--accent);border-radius:50%;flex-shrink:0;margin-top:4px;"></div>`:''}
      </div>`;
    }

    // Notif normal
    const postId = n.postId||'';
    const bdayUid = n.bdayUid||'';
    const clickable = !!(postId || bdayUid);
    return `<div data-action="notif-click" data-postid="${postId}" data-bdayuid="${bdayUid}" data-bdaynick="${n.bdayNick||''}"
      style="display:flex;align-items:flex-start;gap:12px;padding:10px 16px;transition:background .15s;${isRead?'':'background:rgba(0,198,255,.05);'}cursor:${clickable?'pointer':'default'};"
      onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='${isRead?'':'rgba(0,198,255,.05)'}'">
      <div style="position:relative;flex-shrink:0;">
        <div style="width:52px;height:52px;border-radius:50%;background:var(--bg3);overflow:hidden;display:flex;align-items:center;justify-content:center;">${avInner}</div>
        <div style="position:absolute;bottom:-2px;right:-2px;width:20px;height:20px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;font-size:.7rem;border:2px solid var(--bg2);">${icon}</div>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:.83rem;line-height:1.45;">${n.text||''}</div>
        ${n.storyPreview?`<div style="font-size:.72rem;color:var(--accent);margin-top:3px;padding:3px 8px;border-radius:6px;border-left:2px solid var(--accent);background:rgba(0,198,255,.06);">📖 "${esc(n.storyPreview)}"</div>`:''}
        <div style="font-size:.72rem;color:${isRead?'var(--muted)':'var(--accent)'};margin-top:4px;font-weight:${isRead?'400':'700'};">${fmtT(n.time)}</div>
      </div>
      ${!isRead?`<div style="width:10px;height:10px;background:var(--accent);border-radius:50%;flex-shrink:0;margin-top:4px;"></div>`:''}
    </div>`;
  }

  let html = '';
  if(todayItems.length){
    html += `<div style="padding:8px 16px 4px;font-size:.78rem;font-weight:800;color:var(--text);">Hoy</div>`;
    html += todayItems.map((n,i)=>renderItem(n,i)).join('');
  }
  if(prevItems.length){
    html += `<div style="padding:12px 16px 4px;font-size:.78rem;font-weight:800;color:var(--text);">Anteriores</div>`;
    html += prevItems.map((n,i)=>renderItem(n, todayItems.length+i)).join('');
  }
  el.innerHTML = html;

  el.onclick = async (e)=>{
    const row = e.target.closest('[data-action]');
    if(!row) return;
    const action = row.dataset.action;
    if(action==='notif-click'){
      if(row.dataset.postid){ closeNotifDropdown(); scrollToPost(row.dataset.postid); }
      else if(row.dataset.bdayuid){ closeNotifDropdown(); openUserProfile(row.dataset.bdayuid, row.dataset.bdaynick); }
    } else if(action==='view-profile'){
      closeNotifDropdown(); openUserProfile(row.dataset.uid, row.dataset.nick);
    } else if(action==='accept-friend'){
      row.disabled=true; row.textContent='Aceptando...';
      await acceptFriendRequest(row.dataset.uid, row.dataset.nick, parseInt(row.dataset.idx));
    } else if(action==='reject-friend'){
      await rejectFriendRequest(parseInt(row.dataset.idx));
    }
  };
}

function updateNotifBadge(){
  const unread = _notifs.filter(n=>!n.read && !(n.text&&n.text.startsWith('💬'))).length;
  const el = document.getElementById('notifDot');
  if(!el) return;
  if(unread > 0){
    el.style.display='flex';
    el.textContent = unread > 10 ? '+10' : String(unread);
  } else {
    el.style.display='none';
  }
}
function updateMsgBadge(){
  const el = document.getElementById('msgBadge');
  if(!el) return;
  const archived = window.CU?.archivedChats || [];
  const deleted  = window.CU?.deletedChats  || [];

  // Fuente 1: _chatLastMsgs (listeners en tiempo real por chat)
  const unreadFromChats = Object.entries(_chatLastMsgs).filter(([uid, lm])=>{
    if(archived.includes(uid)) return false;
    if(deleted.includes(uid))  return false;
    return !!lm.unread;
  }).length;

  // Fuente 2: _notifs con 💬 no leídas (siempre disponible inmediatamente)
  // Contar cuántos remitentes distintos tienen mensajes no leídos
  const unreadSenders = new Set(
    _notifs
      .filter(n=>!n.read && n.text && n.text.startsWith('💬'))
      .map(n=>{ const m=n.text.match(/^💬\s*([^:]+):/); return m?m[1].trim():null; })
      .filter(Boolean)
  ).size;

  // Usar el mayor de los dos para no subestimar
  const unread = Math.max(unreadFromChats, unreadSenders);

  if(unread > 0){
    el.style.display='flex';
    el.textContent = unread > 9 ? '9+' : String(unread);
  } else {
    el.style.display='none';
  }
}

function listenNotifs(){
  if(!window.CU) return;
  onSnapshot(doc(db,'users',window.CU.id), snap=>{
    if(!snap.exists()) return;
    const d = snap.data();
    // Sincronizar window.CU con datos frescos (archivedChats, deletedChats, friendsList)
    if(window.CU){
      window.CU.archivedChats = d.archivedChats || [];
      window.CU.deletedChats  = d.deletedChats  || [];
      if(d.friendsList) window.CU.friendsList = d.friendsList;
    }
    const newNotifs = d.notifs || [];
    // Contar solo no-mensajes para detectar notifs reales nuevas
    const prevNonMsgUnread = _notifs.filter(n=>!n.read && !(n.text&&n.text.startsWith('💬'))).length;
    const prevMsgUnread    = _notifs.filter(n=>!n.read && n.text&&n.text.startsWith('💬')).length;
    _notifs = newNotifs;
    const newNonMsgUnread  = _notifs.filter(n=>!n.read && !(n.text&&n.text.startsWith('💬'))).length;
    const newMsgUnread     = _notifs.filter(n=>!n.read && n.text&&n.text.startsWith('💬')).length;

    // Actualizar badge de mensajes INMEDIATAMENTE cuando llega un 💬 nuevo
    if(newMsgUnread > prevMsgUnread){
      updateMsgBadge(); // badge del ícono de chat
      const latest = _notifs[0];
      if(latest?.text?.startsWith('💬')){
        playMsgSound();
        showNotifToast(latest.text||'Nuevo mensaje');
      }
    }
    // Notificaciones normales (no mensajes)
    if(newNonMsgUnread > prevNonMsgUnread){
      const latest = _notifs.find(n=>!n.read && !(n.text&&n.text.startsWith('💬')));
      if(latest){
        playNotifSound();
        showNotifToast(latest.text||'Nueva notificación');
      }
    }
    renderNotifs(); updateNotifBadge(); updateMsgBadge();
    // Re-render lista del messenger si está visible (sin destruir listener)
    if(_messengerOpen){
      const _ln_list = document.getElementById('messengerList');
      if(_ln_list && _ln_list.style.display !== 'none'){
        _ln_list.innerHTML = _buildMessengerHTML();
      }
    }
  });

  // Listener en tiempo real para badge de mensajes
  listenUnreadMsgsBadge();
}

// Escucha mensajes no leídos en tiempo real de todos los amigos
let _unsubMsgBadgeListeners = [];
function listenUnreadMsgsBadge(){
  _unsubMsgBadgeListeners.forEach(u=>u());
  _unsubMsgBadgeListeners = [];
  const friends = window.CU?.friendsList || [];
  const myId = window.CU?.id;
  if(!myId || !friends.length) return;
  friends.forEach(f=>{
    const chatId = [myId, f.id].sort().join('_');
    // Escuchar los últimos 20 mensajes para contar no leídos correctamente
    const q = query(
      collection(db,'chats',chatId,'messages'),
      orderBy('time','desc'),
      limit(20)
    );
    const unsub = onSnapshot(q, snap=>{
      // Contar no leídos
      const unreadCount = snap.docs.filter(d=>{
        const m = d.data();
        return m.uid !== myId && !m.read && !(m.deletedFor||{})[myId];
      }).length;
      // Buscar el último mensaje visible (no borrado para mí)
      const visibleDoc = snap.docs.find(d=>!(d.data().deletedFor||{})[myId]);
      const lm = _chatLastMsgs[f.id] || {};
      if(visibleDoc){
        const md = visibleDoc.data();
        _chatLastMsgs[f.id] = {
          ...lm,
          text: md.gif ? '🖼️ GIF' : (md.text||''),
          time: md.time?.toMillis?.()||0,
          mine: md.uid === myId,
          unread: unreadCount > 0,
          unreadCount
        };
      } else {
        _chatLastMsgs[f.id] = { ...lm, unread: false, unreadCount: 0 };
      }
      updateMsgBadge();
      // Re-render lista si está visible
      if(_messengerOpen){
        const _ub_list = document.getElementById('messengerList');
        if(_ub_list && _ub_list.style.display !== 'none'){
          _ub_list.innerHTML = _buildMessengerHTML();
        }
      }
    });
    _unsubMsgBadgeListeners.push(unsub);
  });
}

function igNav(dir){
  _galIdx = (_galIdx + dir + _galImages.length) % _galImages.length;
  igNavTo(_galIdx);
}
function igNavTo(i){
  _galIdx = i;
  const img = document.getElementById('_igImg');
  if(img){ img.style.opacity='0'; setTimeout(()=>{ img.src=_galImages[i]; img.style.opacity='1'; },110); }
  document.querySelectorAll('._igDot').forEach((d,j)=>{ d.style.background = j===i?'#fff':'rgba(255,255,255,.35)'; });
}
async function igLoadPostData(pid){
  if(_galUnsub){ _galUnsub(); _galUnsub=null; }
  const pRef = doc(db,'posts',pid);
  _galUnsub = onSnapshot(pRef, snap=>{
    if(!snap.exists()) return;
    const p = {id:snap.id,...snap.data()};
    igRenderComments(p.comments||[]);
    igRenderReactions(p.reactions||{}, p.reactionCounts||{});
  });
}
function igRenderReactions(reactions, counts){
  const myRxn = window.CU ? (reactions[window.CU.id]||'') : '';
  const total = Object.values(reactions).filter(Boolean).length;
  [
    {e:'👍'},{e:'❤️'},{e:'😂'},{e:'😮'},{e:'😢'},{e:'😡'},{e:'🎣'}
  ].forEach(r=>{
    const btn = document.querySelector(`._igRxnBtn[data-e="${r.e}"]`);
    const cntEl = document.getElementById('_igRxnCnt_'+r.e.codePointAt(0));
    const active = myRxn===r.e;
    if(btn){
      btn.style.background = active?'rgba(46,196,182,.18)':'none';
      btn.style.border = active?'1px solid var(--accent)':'1px solid transparent';
    }
    if(cntEl) cntEl.textContent = (counts[r.e]||0)>0?(counts[r.e]):'';
  });
  const tot = document.getElementById('_igRxnTotal');
  if(tot) tot.textContent = total>0?`${total} reacci${total===1?'ón':'ones'}`:'';
}
function igRenderComments(comments){
  const el = document.getElementById('_igComments');
  if(!el) return;
  if(!comments.length){
    el.innerHTML='<div style="text-align:center;padding:28px;color:var(--muted);font-size:.78rem;">Sin comentarios. ¡Sé el primero!</div>';
    return;
  }
  el.innerHTML = comments.map(c=>{
    const av = c.av?`<img src="${c.av}" style="width:100%;height:100%;object-fit:cover;">`:(c.nick||'?')[0].toUpperCase();
    return `<div style="display:flex;gap:8px;align-items:flex-start;">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--accent);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:var(--accent);flex-shrink:0;">${av}</div>
      <div style="flex:1;min-width:0;background:var(--bg3);border-radius:10px;padding:6px 10px;">
        <span style="font-weight:700;font-size:.78rem;color:var(--accent);">${esc(c.nick||'')}</span>
        <span style="font-size:.8rem;color:var(--text);margin-left:5px;">${esc(c.text||'')}</span>
        <div style="font-size:.65rem;color:var(--muted);margin-top:2px;">${c.time?fmtT(c.time):''}</div>
      </div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

async function igSubmitComment(){
  if(!_galPostId) return;
  if(!window.CU){ toast('Iniciá sesión para comentar','err'); return; }
  const inp = document.getElementById('_igCmtInp');
  const txt = inp ? inp.value.trim() : '';
  if(!txt) return;
  let p = (_posts||[]).find(p=>p.id===_galPostId);
  if(!p){
    try{
      const snap = await getDoc(doc(db,'posts',_galPostId));
      if(snap.exists()) p={id:snap.id,...snap.data()};
    }catch(e){}
  }
  if(p){
    const nc = [...(p.comments||[]), {userId:window.CU.id,nick:window.CU.nick,av:window.CU.av||'',text:txt,time:Date.now()}];
    await updateDoc(doc(db,'posts',_galPostId), {comments:nc});
    if(p.userId&&p.userId!==window.CU.id) sendNotifToUserWithPost(p.userId,`💬 ${window.CU.nick} comentó tu foto: "${txt.slice(0,40)}"`,_galPostId);
  }
  if(inp) inp.value='';
}

function reportPost(pid, userNick){
  if(!window.CU){ toast('Inicia sesión para reportar','err'); return; }
  document.getElementById('reportPostId').value = pid;
  document.getElementById('reportUser').value = userNick;
  document.getElementById('reportReason').value = '';
  document.getElementById('reportDesc').value = '';
  document.getElementById('reportErr').textContent = '';
  om('mReport');
}

async function submitReport(){
  const pid = document.getElementById('reportPostId').value;
  const reason = document.getElementById('reportReason').value;
  const desc = document.getElementById('reportDesc').value.trim();
  const reportedUser = document.getElementById('reportUser').value;
  if(!reason){ document.getElementById('reportErr').textContent='Seleccioná un motivo'; return; }
  await addDoc(collection(db, 'reports'), {
    postId: pid,
    reportedUser,
    reportedBy: window.CU.nick,
    reportedById: window.CU.id,
    reason,
    desc,
    time: serverTimestamp(),
    status: 'pendiente'
  });
  cm('mReport');
  toast('Reporte enviado al administrador ✅','ok');
}

// ===== SHOP DISCOUNT COUNTDOWN =====
let _shopCountdownTimer = null;
function startShopCountdown(isoEnd){
  const banner = document.getElementById('shopDiscountBanner');
  const cdEl = document.getElementById('shopCountdown');
  const labelEl = document.getElementById('shopDiscountEndLabel');
  if(!banner||!cdEl) return;
  if(_shopCountdownTimer) clearInterval(_shopCountdownTimer);
  if(!isoEnd){ banner.style.display='none'; return; }
  const end = new Date(isoEnd);
  if(isNaN(end.getTime())){ banner.style.display='none'; return; }
  // Format end date label
  if(labelEl){
    const opts={day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'};
    labelEl.textContent = 'Vence: ' + end.toLocaleString('es-AR', opts);
  }
  function tick(){
    const now = new Date();
    const diff = end - now;
    if(diff <= 0){
      cdEl.textContent = '¡Terminó!';
      cdEl.style.color = 'var(--muted)';
      clearInterval(_shopCountdownTimer);
      return;
    }
    const d = Math.floor(diff/86400000);
    const h = Math.floor((diff%86400000)/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);
    const pad = n=>String(n).padStart(2,'0');
    cdEl.textContent = `${d}d ${pad(h)}h ${pad(m)}m ${pad(s)}s`;
  }
  banner.style.display='block';
  tick();
  _shopCountdownTimer = setInterval(tick, 1000);
}
window.startShopCountdown = startShopCountdown;

let _postMediaFiles = []; // Array of {file, type}

function previewPostMedia(input, type){
  const files = Array.from(input.files);
  if(type === 'image'){
    const remaining = 5 - _postMediaFiles.filter(f=>f.type==='image').length;
    if(files.length > remaining){ toast(`Máximo 5 fotos. Solo se agregarán ${remaining}`,'err'); }
    files.slice(0, remaining).forEach(f => _postMediaFiles.push({file:f, type:'image'}));
  } else {
    _postMediaFiles = _postMediaFiles.filter(f=>f.type!=='video');
    _postMediaFiles.push({file:files[0], type:'video'});
  }
  renderPostMediaPreview();
}

// ===== YOUTUBE + TIKTOK HELPERS =====
function extractYtId(url){
  if(!url) return null;
  const patterns = [
    /(?:youtube\.com\/watch\?(?:.*&)?v=)([a-zA-Z0-9_-]{11})/,
    /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,
    /(?:youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/live\/([a-zA-Z0-9_-]{11})/
  ];
  for(const re of patterns){
    const m = url.match(re);
    if(m) return m[1];
  }
  return null;
}

function extractTikTokId(url){
  if(!url) return null;
  // Formats: tiktok.com/@user/video/123456789 or vm.tiktok.com/ZMxxx
  const m = url.match(/tiktok\.com\/@[^/]+\/video\/(\d+)/);
  if(m) return m[1];
  return null;
}

function isTikTok(url){
  return url && (url.includes('tiktok.com') || url.includes('vm.tiktok.com'));
}

  }
}

  const prev = document.getElementById('ytPreview');
  if(!prev) return;
  const ytId = extractYtId(url);
  const ttId = extractTikTokId(url);
  if(ytId){
    prev.style.display='block';
    prev.innerHTML = `<div style="width:100%;aspect-ratio:16/9;border-radius:var(--rs);overflow:hidden;background:#000;">
      <iframe src="https://www.youtube.com/embed/${ytId}?rel=0" frameborder="0" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        style="width:100%;height:100%;display:block;border:none;"></iframe>
    </div><div style="font-size:.72rem;color:var(--green);margin-top:4px;">▶️ YouTube detectado correctamente</div>`;
  } else if(ttId){
    prev.style.display='block';
    prev.innerHTML = `<div style="max-width:340px;margin:0 auto;aspect-ratio:9/16;border-radius:var(--rs);overflow:hidden;background:#000;">
      <iframe src="https://www.tiktok.com/embed/v2/${ttId}" frameborder="0" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        style="width:100%;height:100%;display:block;border:none;"></iframe>
    </div><div style="font-size:.72rem;color:var(--green);margin-top:4px;">🎵 TikTok detectado correctamente</div>`;
  } else if(isTikTok(url) && url.length > 10){
    prev.style.display='block';
    prev.innerHTML='<div style="font-size:.72rem;color:var(--warn);padding:4px;">⚠️ Usá el link completo del video de TikTok (con /video/ID)</div>';

    prev.innerHTML='<div style="font-size:.72rem;color:var(--red);padding:4px;">⚠️ URL no válida. Pegá un link de YouTube o TikTok</div>';
  } else {
    prev.style.display='none';
    prev.innerHTML='';
  }
}

// ── Partículas doradas para perfil verificado ──
let _verifParticleRAF = null;
function _startVerifParticles(canvas){
  if(_verifParticleRAF) return; // ya corriendo
  const cover = document.getElementById('profCover');
  const W = cover.offsetWidth || 800;
  const H = cover.offsetHeight || 300;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const particles = Array.from({length:38}, ()=>_makeParticle(W,H));
  function step(){
    ctx.clearRect(0,0,W,H);
    particles.forEach((p,i)=>{
      p.y -= p.vy; p.x += p.vx; p.life -= 1;
      if(p.life <= 0){ particles[i] = _makeParticle(W,H); return; }
      const alpha = Math.min(1, p.life/40) * p.maxAlpha;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
    _verifParticleRAF = requestAnimationFrame(step);
  }
  _verifParticleRAF = requestAnimationFrame(step);
}
function _makeParticle(W,H){
  const colors = ['#ffd700','#ffec6e','#ffa500','#fffacd','#f0e68c'];
  return {
    x: Math.random()*W, y: H + Math.random()*20,
    vx: (Math.random()-.5)*.8, vy: .6+Math.random()*1.2,
    r: .8+Math.random()*2.2, life: 60+Math.random()*80,
    maxAlpha: .4+Math.random()*.5,
    color: colors[Math.floor(Math.random()*colors.length)]
  };
}
function _stopVerifParticles(){
  if(_verifParticleRAF){ cancelAnimationFrame(_verifParticleRAF); _verifParticleRAF=null; }
  const canvas = document.getElementById('verifParticles');
  if(canvas){ const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height); }
}

async function adminApproveVerif(reqId, nick, userId){
  try {
    await updateDoc(doc(db,'users',userId),{ verified:true, verifPending:false });
    await setDoc(doc(db,'verifRequests',reqId),{ status:'approved' },{merge:true});
    // Notifica al usuario
    try {
      const uSnap = await getDoc(doc(db,'users',userId));
      if(uSnap.exists()){
        const notifs = uSnap.data().notifs||[];
        notifs.unshift({ type:'verifApproved', time:Date.now(), text:'¡Tu cuenta fue verificada! ✅' });
        await updateDoc(doc(db,'users',userId),{ notifs: notifs.slice(0,50) });
      }
    } catch(e){}
    toast(`✅ ${nick} verificado correctamente`,'ok');
    loadVerifRequests();
  } catch(e){ toast('Error al verificar','err'); }
}

async function adminRejectVerif(reqId, nick, userId){
  try {
    await updateDoc(doc(db,'users',userId),{ verifPending:false });
    await setDoc(doc(db,'verifRequests',reqId),{ status:'rejected' },{merge:true});
    // Notifica al usuario
    try {
      const uSnap = await getDoc(doc(db,'users',userId));

        notifs.unshift({ type:'verifRejected', time:Date.now(), text:'Tu solicitud de verificación fue rechazada.' });

  } catch(e){ toast('Error al rechazar','err'); }
}

async function adminRevokeVerif(reqId, nick, userId){

async function renderSuggestedUsers(){
  const el = document.getElementById('suggestedUsersList');
  if(!el) return;
  try {
    const snap = await getDocs(collection(db,'users'));
    const allUsers = snap.docs.map(d=>({id:d.id,...d.data()}));
    const myId = window.CU?.id || window.CU?.uid || '';
    const myNick = (window.CU?.nick || '').toLowerCase();
    const myFriends = window.CU?.friends || [];
    // Filter out self and existing friends
    const candidates = allUsers.filter(u => {
      if(u.id === myId || u.uid === myId) return false;
      if(myNick && (u.nick||'').toLowerCase() === myNick) return false;
      if(myFriends.includes(u.id)) return false;
      return true;
    });
    // Shuffle and pick up to 5
    const shuffled = candidates.sort(()=>Math.random()-0.5).slice(0,5);
    el.innerHTML = shuffled.length
      ? shuffled.map(u=>`
        <div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);">

// ===== SHARE POST =====
async function sharePost(pid){
  if(!window.CU){ toast('Inicia sesión para compartir','err'); return; }
  const p = _posts.find(p=>p.id===pid);
  if(!p){ toast('Post no encontrado','err'); return; }
  try {
    await navigator.clipboard.writeText(window.location.href+'#post_'+pid);
  } catch(e){}
  // Create shared copy in user's feed
  await addDoc(collection(db,'posts'),{
    userId: window.CU.id, userNick: window.CU.nick, userAv: window.CU.av||'',
    text: '', fish: '', weight: 0, map: '', tech: '', images: [],
    time: serverTimestamp(), likes:0, comments:[], reactions:{}, reactionCounts:{},
    sharedFrom: p.userNick, sharedPostId: pid,
    sharedSnapshot: {
      text: p.text||'',
      images: p.images||[],
      video: p.video||'',
      userNick: p.userNick||'',
      userAv: p.userAv||'',
      fish: p.fish||'',
      weight: p.weight||0
    }
  });
  // Increment share count on original post
  try {
    await updateDoc(doc(db,'posts',pid), { shares: (p.shares||0)+1 });
  } catch(e){}
  // Notify original post owner
  if(p.userId && p.userId !== window.CU.id){
    sendNotifToUserWithPost(p.userId, `🔁 ${window.CU.nick} compartió tu publicación`, p.id);
  }
  toast('¡Publicación compartida en tu perfil! 📋','ok');
}

async function sendShopAnnouncementToAll(){
  if(!window.CU) return;
  const btn = document.getElementById('btnShopAnnounce');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Enviando...'; }
  try {
    const usersSnap = await getDocs(collection(db,'users'));
    const myId = window.CU.id;
    const myNick = window.CU.nick || 'RF4 Latam';
    const msg = `🎉 ¡Hola! Te avisamos que la TIENDA de RF4 Latam está 100% GRATIS por 30 días 🛒✨\n\nPodés tunear tu perfil y publicaciones con marcos, badges, títulos, efectos y colores. ¡Entrá a la tienda desde el botón de arriba y equipate todo lo que quieras sin costo!\n\n🔥 ¡Aprovechalo antes de que se acabe el período gratuito!`;
    let sent = 0;
    for(const d of usersSnap.docs){
      const uid = d.id;
      if(uid === myId) continue;
      try {
        const chatId = [myId, uid].sort().join('_');
        await addDoc(collection(db,'chats',chatId,'messages'), {
          uid: myId,
          nick: myNick,
          text: msg,
          time: serverTimestamp(),
          system: true
        });
        sent++;
      } catch(e){ console.warn('Error enviando a', uid, e); }
    }
    if(btn){ btn.disabled=false; btn.textContent='✅ Enviado a '+sent+' usuarios'; }
    toast(`✅ Mensaje enviado a ${sent} usuarios`, 'ok');
  } catch(e){
    if(btn){ btn.disabled=false; btn.textContent='🔔 Anunciar Tienda Gratis'; }
    toast('Error al enviar mensajes: '+e.message, 'err');
    console.error(e);
  }
}

// ===== USER PROFILE MODAL =====
async function openUserProfile(uid, nick){
  // Si es el propio usuario, va al perfil propio
  if(uid && uid === window.CU?.id){ gp('profile'); history.pushState({page:'profile'}, '', '/chatrf4/perfil'); return; }
  // Si no hay uid, busca por nick
  if(!uid && nick){
    try {
      const snap = await getDocs(collection(db,'users'));
      const found = snap.docs.find(d=>(d.data().nick||'').toLowerCase()===(nick||'').toLowerCase());
      if(found){ uid = found.id; }
    } catch(e){}
  }
  if(!uid){ toast('Usuario no encontrado','err'); return; }
  // Push URL /u/nick
  const safeNick = (nick||'usuario').toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  history.pushState({page:'userprofile', uid, nick}, '', '/chatrf4/u/' + safeNick);
  // Navega a la página de perfil
  gp('userprofile', false);
  _loadUserProfilePage(uid, nick||'');
}

async function _loadUserProfilePage(uid, nick){

      coverInner.innerHTML = '';
      cover.style.background = 'linear-gradient(135deg,#0a1628,#1a0a2e,#0d1f3c)';
      cover.classList.add('verif-cover-active');
      if(upCanvas){ upCanvas.style.display='block'; _startVerifParticlesEl(upCanvas, cover); }
      if(upSeal) upSeal.style.display = 'block';
    } else {
      // Sin foto ni verificado: fondo por defecto
      coverInner.innerHTML = '';
      cover.style.background = 'linear-gradient(135deg,#0a1628,#1a2a3a)';
      cover.classList.remove('verif-cover-active');
      if(upCanvas) upCanvas.style.display = 'none';
      if(upSeal)   upSeal.style.display   = 'none';
    }

    // ── AVATAR ──
    const avEl = document.getElementById('upAv');

    const _avClickEl = document.getElementById('upAv');
    const _covClickEl = document.getElementById('upCover');
    if(_avClickEl) _avClickEl.onclick = (e) => { e.stopPropagation(); openPhotoModalUser('avatar'); };
    if(_covClickEl) _covClickEl.onclick = () => openPhotoModalUser('cover');
    const avWrap = document.getElementById('upAvWrap');
    if(isVerified){
      avEl.style.cssText += ';border:3px solid gold;box-shadow:0 0 20px rgba(255,215,0,.5);animation:avatarPulse 3s ease-in-out infinite;';
      avWrap.classList.add('verif-av-ring');
    } else {
      avEl.style.border = '4px solid var(--bg2)';
      avEl.style.boxShadow = '';
      avWrap.classList.remove('verif-av-ring');
    }

    // ── NOMBRE ──
    const nEl = document.getElementById('upName');
    nEl.textContent = uNick;
    if(isVerified) nEl.classList.add('verif-name-gold');
    else nEl.classList.remove('verif-name-gold');
    document.getElementById('upVerifBadge').style.display = isVerified ? 'inline-flex' : 'none';
    document.getElementById('upVerifBanner').style.display = isVerified ? 'flex' : 'none';

    // ── NIVEL ──

    // ── ÚLTIMA CONEXIÓN ──

function _startVerifParticlesEl(canvas, container){
  const W = container.offsetWidth||800, H = container.offsetHeight||220;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  const particles=Array.from({length:30},()=>_makeParticle(W,H));
  function step(){
    ctx.clearRect(0,0,W,H);
    particles.forEach((p,i)=>{
      p.y-=p.vy; p.x+=p.vx; p.life-=1;
      if(p.life<=0){particles[i]=_makeParticle(W,H);return;}
      const alpha=Math.min(1,p.life/40)*p.maxAlpha;
      ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.restore();
    });
    canvas._raf=requestAnimationFrame(step);
  }
  if(canvas._raf) cancelAnimationFrame(canvas._raf);
  canvas._raf=requestAnimationFrame(step);
}

async function sendFriendRequestFromProfile(uid, nick){
  const btn = document.getElementById('btnAddFriend_'+uid);

async function sendFriendRequest(uid, nick){
  if(!window.CU){ toast('Inicia sesión primero','err'); return; }
  // Store full request data so recipient can accept/reject and visit profile
  try {
    const snap = await getDoc(doc(db,'users',uid));
    if(!snap.exists()) return;
    const notifs = snap.data().notifs || [];
    // Avoid duplicate pending requests
    const alreadySent = notifs.some(n=>n.type==='friendRequest' && n.fromId===window.CU.id);
    if(alreadySent){ toast('Ya enviaste una solicitud a este usuario','inf'); return; }
    notifs.unshift({
      text: `👥 ${window.CU.nick} quiere ser tu amigo`,
      time: Date.now(), read: false,
      type: 'friendRequest',
      fromId: window.CU.id,
      fromNick: window.CU.nick,
      fromAv: window.CU.av || ''
    });
    await updateDoc(doc(db,'users',uid), {notifs: notifs.slice(0,30)});
    toast(`Solicitud enviada a ${nick} 👥`,'ok');
    cm('mUserProfile');
  } catch(e){ toast('Error al enviar solicitud','err'); }
}

async function acceptFriendRequest(fromId, fromNick, notifIndex){
  addXP(5,'nuevo amigo');
  if(!window.CU){ toast('Iniciá sesión primero','err'); return; }
  try {
    // 1. Add each other as friends
    const [mySnap, theirSnap] = await Promise.all([
      getDoc(doc(db,'users',window.CU.id)),
      getDoc(doc(db,'users',fromId))
    ]);
    if(!mySnap.exists() || !theirSnap.exists()){ toast('Usuario no encontrado','err'); return; }
    const myFriends   = mySnap.data().friends   || [];
    const theirFriends = theirSnap.data().friends || [];
    const promises = [];
    if(!myFriends.includes(fromId))
      promises.push(updateDoc(doc(db,'users',window.CU.id),{friends:[...myFriends,fromId]}));
    if(!theirFriends.includes(window.CU.id))
      promises.push(updateDoc(doc(db,'users',fromId),{friends:[...theirFriends,window.CU.id]}));
    await Promise.all(promises);
    // 2. Update local CU friends list so UI reflects immediately
    window.CU.friends = window.CU.friends || [];
    if(!window.CU.friends.includes(fromId)) window.CU.friends.push(fromId);
    // 3. Notify requester
    sendNotifToUser(fromId, `✅ ${window.CU.nick} aceptó tu solicitud de amistad`);
    // 3. Remove notif from local array by fromId (safer than index which can shift)
    const idx = _notifs.findIndex(n=>n.type==='friendRequest' && n.fromId===fromId);
    if(idx !== -1) _notifs.splice(idx, 1);
    else if(notifIndex >= 0 && notifIndex < _notifs.length) _notifs.splice(notifIndex, 1);
    await updateDoc(doc(db,'users',window.CU.id),{notifs:_notifs.slice(0,30)});
    renderNotifs();
    updateNotifBadge();
    // Refresh local friends list & sidebar
    await loadRealFriends();
    renderProfile();
    renderFriendSpotsInHome();
    toast(`¡Ahora sos amigo de ${fromNick}! 🎣`,'ok');
  } catch(e){ console.error('acceptFriendRequest error:',e); toast('Error al aceptar: '+e.message,'err'); }
}

async function rejectFriendRequest(notifIndex){
  if(!window.CU) return;
  try {
    if(notifIndex >= 0 && notifIndex < _notifs.length) _notifs.splice(notifIndex, 1);
    await updateDoc(doc(db,'users',window.CU.id),{notifs:_notifs.slice(0,30)});
    renderNotifs();
    toast('Solicitud rechazada','inf');
  } catch(e){ toast('Error','err'); }
}

async function dismissFriendRequest(notifIndex){
  if(notifIndex >= 0 && notifIndex < _notifs.length) _notifs.splice(notifIndex,1);
  await updateDoc(doc(db,'users',window.CU.id),{notifs:_notifs.slice(0,30)});
  renderNotifs();
}

function togglePostMenu(pid, e, ownerId){
  if(e) e.stopPropagation();
  document.querySelectorAll('[id^="pmenu_"]').forEach(m => {
    if(m.id !== 'pmenu_' + pid) m.style.display = 'none';
  });
  const menu = document.getElementById('pmenu_' + pid);
  if(!menu) return;
  // Owner check — use passed ownerId or fallback to data-owner
  const menuOwner = (ownerId || menu.dataset.owner || '').trim();
  const myId = (window.CU?.id || '').trim();
  const isAdmin = window.CU?.nick === 'ruizgustavo12';
  const isOwner = myId && (menuOwner === myId || isAdmin);
  console.log('[PostMenu] ownerId:', menuOwner, 'myId:', myId, 'isOwner:', isOwner);
  menu.querySelectorAll('[data-owner-only]').forEach(b => b.style.display = isOwner ? 'flex' : 'none');
  menu.querySelectorAll('[data-other-only]').forEach(b => b.style.display = isOwner ? 'none' : 'flex');
  // If owner and no visible buttons yet, force show edit/delete
  if(isOwner){
    menu.querySelectorAll('[data-owner-only]').forEach(b => { b.style.display='flex'; });
  }
  const isOpen = menu.style.display === 'block';
  menu.style.display = isOpen ? 'none' : 'block';
  if(!isOpen){
    setTimeout(() => {
      document.addEventListener('click', function closeMenu(ev){
        if(!menu.contains(ev.target)){
          menu.style.display = 'none';
          document.removeEventListener('click', closeMenu);
        }
      });
    }, 10);
  }
}

function listenPresence(){
  onSnapshot(collection(db,'presence'), snap=>{
    const now = Date.now();
    const all = snap.docs.map(d=>({id:d.id,...d.data(),ts:d.data().last?.toMillis?.()||0}));
    const online = all.filter(u=>now - u.ts < 120000);
    const offline = all.filter(u=>now - u.ts >= 120000 && u.ts > 0)
      .sort((a,b)=>b.ts-a.ts).slice(0,8); // últimos 8 desconectados recientes
    renderContacts(online);
    // Update sidebar online count badges
    document.querySelectorAll('#onlineCount,#sidebarOnlineCount').forEach(el=>{ if(el) el.textContent=online.length; });
    renderSidebarOnline(online, offline);
  });
}

function fmtLastSeen(ts){
  if(!ts) return 'Desconocido';
  const diff = Date.now() - ts;
  const min = Math.floor(diff/60000);
  const h = Math.floor(diff/3600000);
  const d = Math.floor(diff/86400000);
  if(min < 2) return 'Hace un momento';
  if(min < 60) return 'Hace '+min+' min';
  if(h < 24) return 'Hace '+h+'h';
  return 'Hace '+d+' día'+(d>1?'s':'');
}

function renderSidebarOnline(online, offline){

  if(!el) return;
  const myId = window.CU?.id;

    return `
      <div style="position:relative;margin-bottom:5px;border-radius:7px;overflow:hidden;cursor:pointer;
           background:${bannerBg};border:1px solid ${isOnline?'rgba(255,90,0,.35)':'rgba(100,80,255,.25)'};
           box-shadow:0 2px 10px ${glowColor};transition:box-shadow .2s,transform .15s;height:38px;display:flex;align-items:center;"

           onmouseout="this.style.transform='scale(1)';this.style.boxShadow='0 2px 10px ${glowColor}'"
           onclick="openUserProfile('${u.id}','${nick}')">

        <!-- Particle canvas background -->
        <canvas id="${cid}" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:.7;"></canvas>

        <!-- Rim light left -->
        <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,${rimColor},transparent,${rimColor});opacity:.8;border-radius:7px 0 0 7px;"></div>

        <!-- Avatar -->
        <div style="position:relative;flex-shrink:0;margin:0 7px;z-index:2;">
          <div style="width:26px;height:26px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;
               font-size:.72rem;font-weight:700;color:#fff;background:${isOnline?'#b83200':'#3a2e7a'};
               border:1.5px solid ${rimColor};box-shadow:0 0 6px ${glowColor};">
            ${u.av?`<img src="${u.av}" style="width:100%;height:100%;object-fit:cover;${isOnline?'':'filter:grayscale(.3);'}">`:`${initials}`}
          </div>
          ${isOnline?`<div style="position:absolute;bottom:-1px;right:-1px;width:8px;height:8px;border-radius:50%;background:#4ade80;border:1.5px solid #1a0800;"></div>`:''}
        </div>

        <!-- Text -->
        <div style="flex:1;min-width:0;z-index:2;">
          <div style="font-size:.76rem;font-weight:700;color:#fff;font-family:'Exo 2',sans-serif;
               white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
               text-shadow:0 0 8px ${isOnline?'rgba(255,120,0,.7)':'rgba(140,120,255,.6)'};">${nick}</div>
          ${statusText}
        </div>

        <!-- Chat button -->
        ${isOnline?`<button onclick="event.stopPropagation();openChatWith('${u.id}','${nick}')"
          style="background:rgba(255,100,0,.18);border:1px solid rgba(255,100,0,.3);border-radius:5px;
                 color:#ffaa55;font-size:.75rem;cursor:pointer;padding:2px 6px;margin-right:6px;z-index:2;
                 font-family:'Exo 2',sans-serif;transition:background .15s;"
          onmouseover="this.style.background='rgba(255,100,0,.35)'" onmouseout="this.style.background='rgba(255,100,0,.18)'"
          title="Mensaje">💬</button>`:''}
      </div>`;
  }

  let html = '';
  if(onlineFiltered.length){
    html += onlineFiltered.map(u=>userBanner(u,true)).join('');
  }
  if(offline.length){
    if(onlineFiltered.length) html += `<div style="font-size:.63rem;color:var(--muted);padding:6px 4px 3px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;">Última conexión</div>`;
    html += offline.map(u=>userBanner(u,false)).join('');
  }
  if(!onlineFiltered.length && !offline.length){
    html = `<div style="text-align:center;padding:16px 8px;color:var(--muted);font-size:.75rem;">🎣 Nadie conectado</div>`;
  }
  el.innerHTML = html;

  // Fire/sparkle particle animation on each banner canvas
  el.querySelectorAll('canvas[id^="emb_"]').forEach(canvas=>{
    const isFireCanvas = canvas.closest('div[style*="ff6a00"]') !== null
      || (canvas.closest('div') && canvas.closest('div').style.background && canvas.closest('div').style.background.includes('2d0f00'));
    const isOnlineCanvas = canvas.parentElement && canvas.parentElement.style.background && canvas.parentElement.style.background.includes('2d0f00');
    const W = canvas.offsetWidth || 240;
    const H = canvas.offsetHeight || 38;
    canvas.width = W;
    canvas.height = H;
    const ctx2 = canvas.getContext('2d');
    if(!ctx2) return;
    const particles = [];
    const COUNT = isOnlineCanvas ? 18 : 12;
    for(let i=0;i<COUNT;i++){
      particles.push({
        x: Math.random()*W,
        y: H + Math.random()*10,
        vx:(Math.random()-.5)*.6,
        vy: -(0.3 + Math.random()*0.7),
        life:Math.random(),
        maxLife:1,
        size:1+Math.random()*2.5
      });
    }
    function drawFrame(){
      if(!canvas.isConnected){ return; }
      ctx2.clearRect(0,0,W,H);
      particles.forEach(p=>{
        p.life += 0.018;
        if(p.life >= p.maxLife){
          p.x = Math.random()*W;
          p.y = H + 2;
          p.vx = (Math.random()-.5)*.6;
          p.vy = -(0.3 + Math.random()*.7);
          p.life = 0;
          p.size = 1+Math.random()*2.5;
        }
        p.x += p.vx;
        p.y += p.vy;
        const prog = p.life/p.maxLife;
        const alpha = prog < 0.2 ? prog/0.2 : 1 - (prog-0.2)/0.8;
        if(isOnlineCanvas){
          const r=255,g=Math.floor(80+prog*80),b=0;
          ctx2.beginPath();
          ctx2.arc(p.x,p.y,p.size*(1-prog*.4),0,Math.PI*2);
          ctx2.fillStyle=`rgba(${r},${g},${b},${alpha*.8})`;
          ctx2.fill();
        } else {
          ctx2.beginPath();
          ctx2.arc(p.x,p.y,p.size*(1-prog*.4),0,Math.PI*2);
          ctx2.fillStyle=`rgba(140,120,255,${alpha*.6})`;
          ctx2.fill();
        }
      });
      requestAnimationFrame(drawFrame);
    }
    drawFrame();
  });
}

function playMsgSound(){
  try { 
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880,ctx.currentTime);
    osc.frequency.setValueAtTime(1100,ctx.currentTime+0.1);
    gain.gain.setValueAtTime(0.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.3);
  } catch(e){}
}

// ===== DRAG logic for floating chat =====
(function initChatDrag(){
  let dragging=false, startX, startY, startRight, startBottom;
  function getEl(){ return document.getElementById('mMessenger'); }
  function onDown(e){
    const el = getEl(); if(!el) return;
    dragging=true;
    const touch = e.touches ? e.touches[0] : e;
    startX = touch.clientX;
    startY = touch.clientY;
    const rect = el.getBoundingClientRect();
    startRight = window.innerWidth - rect.right;
    startBottom = window.innerHeight - rect.bottom;
    el.style.transition='none';
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, {passive:false});
    document.addEventListener('touchend', onUp);
  }
  function onMove(e){
    if(!dragging) return;
    e.preventDefault();
    const el = getEl(); if(!el) return;
    const touch = e.touches ? e.touches[0] : e;
    const dx = touch.clientX - startX;
    const dy = touch.clientY - startY;
    let newRight = startRight - dx;
    let newBottom = startBottom - dy;
    // Clamp to viewport
    newRight = Math.max(0, Math.min(window.innerWidth - 60, newRight));
    newBottom = Math.max(0, Math.min(window.innerHeight - 60, newBottom));
    el.style.right = newRight + 'px';
    el.style.bottom = newBottom + 'px';
    el.style.left = 'auto';
    el.style.top = 'auto';
  }
  function onUp(){
    dragging=false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
  }
  document.addEventListener('DOMContentLoaded', ()=>{
    const handle = document.getElementById('chatDragHandle');
    if(handle){
      handle.addEventListener('mousedown', onDown);
      handle.addEventListener('touchstart', onDown, {passive:false});
    }
  });
})();

(function initBubbleDrag(){
  let dragging=false, startX, startY, startRight, startBottom, moved=false;
  const getEl = ()=>document.getElementById('chatBubbleMin');
  function onDown(e){
    if(e.target.closest('[onclick*="closeMessenger"]')) return; // don't drag on X
    dragging=true; moved=false;
    const touch = e.touches ? e.touches[0] : e;
    startX=touch.clientX; startY=touch.clientY;
    const el=getEl(); if(!el) return;
    const rect=el.getBoundingClientRect();
    startRight=window.innerWidth-rect.right;
    startBottom=window.innerHeight-rect.bottom;
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
    document.addEventListener('touchmove',onMove,{passive:false});
    document.addEventListener('touchend',onUp);
  }
  function onMove(e){
    if(!dragging) return;
    e.preventDefault();
    const touch=e.touches?e.touches[0]:e;
    const dx=touch.clientX-startX, dy=touch.clientY-startY;
    if(Math.abs(dx)>4||Math.abs(dy)>4) moved=true;
    const el=getEl(); if(!el) return;
    let nr=Math.max(0,Math.min(window.innerWidth-60,startRight-dx));

    el.style.right=nr+'px'; el.style.bottom=nb+'px';
    el.style.left='auto'; el.style.top='auto';
  }
  function onUp(){
    dragging=false;
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('touchend',onUp);
  }
  document.addEventListener('DOMContentLoaded',()=>{
    const el=getEl();
    if(el){
      el.addEventListener('mousedown',onDown);
      el.addEventListener('touchstart',onDown,{passive:false});
    }
  });
})();

function _buildMessengerHTML(){
  const friends    = window.CU?.friendsList  || [];
  const archived   = window.CU?.archivedChats || [];
  const deletedChats = window.CU?.deletedChats || [];
  const onlineIds  = _messengerOnlineIds;

  // Badge "No leídos"
  const unreadCount = friends.filter(f=>!archived.includes(f.id) && _chatLastMsgs[f.id]?.unread).length;
  const badge = document.getElementById('unreadChatBadge');
  if(badge){
    badge.style.display = unreadCount>0 ? 'inline-block' : 'none';
    badge.textContent = unreadCount;
  }

  let showFriends;
  if(_currentChatTab === 'archived'){
    // Mostrar TODOS los archivados aunque no tengan mensajes cargados en _chatLastMsgs
    showFriends = friends.filter(f=>archived.includes(f.id) && !deletedChats.includes(f.id));
  } else if(_currentChatTab === 'unread'){
    showFriends = friends.filter(f=>!archived.includes(f.id) && !deletedChats.includes(f.id) && _chatLastMsgs[f.id]?.unread);
  } else {
    // Tab "Todos": excluir archivados y borrados sin mensajes nuevos
    showFriends = friends.filter(f=>{
      if(archived.includes(f.id)) return false;
      if(deletedChats.includes(f.id)) return !!_chatLastMsgs[f.id];
      return true;
    });
  }

  showFriends = [...showFriends].sort((a,b)=>{
    const ta = _chatLastMsgs[a.id]?.time||0;
    const tb = _chatLastMsgs[b.id]?.time||0;
    return tb - ta;
  });

  let html = '';
  html += `<div style="padding:8px 10px 6px;"><div style="background:var(--bg4);border-radius:20px;display:flex;align-items:center;gap:6px;padding:7px 12px;"><span style="color:var(--muted);font-size:.85rem;">🔍</span><input id="chatSearchInput" placeholder="Buscar chat" style="background:none;border:none;outline:none;color:var(--text);font-size:.82rem;flex:1;font-family:'Exo 2',sans-serif;" oninput="filterChatSearch(this.value)"></div></div>`;

  if(showFriends.length === 0){
    const msgs = {archived:'📦 Sin chats archivados', unread:'✓ Sin mensajes sin leer', all:'Sin contactos aún'};
    html += `<div style="text-align:center;padding:32px 16px;color:var(--muted);font-size:.82rem;">${msgs[_currentChatTab]||msgs.all}</div>`;
  } else {
    html += showFriends.map(f=>{
      const isOnline  = onlineIds.has(f.id);
      const safeNick  = (f.nick||'').replace(/['"<>&]/g,'');
      const lm        = _chatLastMsgs[f.id];
      const lastTxt   = lm ? (lm.mine ? 'Tú: '+lm.text : lm.text) : (isOnline ? '● En línea' : '');
      const lastTime  = lm?.time ? fmtT(lm.time) : '';
      const hasUnread = !!lm?.unread;
      const uCount    = lm?.unreadCount || 0;
      const isArch    = archived.includes(f.id);
      const avInner   = f.av
        ? `<img src="${f.av}" style="width:100%;height:100%;object-fit:cover;">`
        : `<span style="font-size:1.1rem;font-weight:800;color:var(--accent);">${(f.nick||'?')[0].toUpperCase()}</span>`;
      return `<div data-chatuid="${f.id}" data-chatnick="${safeNick}" data-searchname="${(f.nick||'').toLowerCase()}" style="display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:10px;margin:1px 4px;transition:background .15s;position:relative;${hasUnread?'background:rgba(0,198,255,.07);':''}" onmouseover="this.style.background='var(--bg3)';this.querySelector('.cgear').style.opacity='1'" onmouseout="this.style.background='${hasUnread?'rgba(0,198,255,.07)':'transparent'}';this.querySelector('.cgear').style.opacity='0'">
          <div style="position:relative;flex-shrink:0;cursor:pointer;" onclick="openChatWith('${f.id}','${safeNick}');event.stopPropagation();">
            <div style="width:46px;height:46px;border-radius:50%;background:var(--bg3);overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:700;">${avInner}</div>
            ${isOnline?'<div style="position:absolute;bottom:0;right:0;width:12px;height:12px;background:#31a24c;border-radius:50%;border:2px solid var(--bg2);"></div>':''}
          </div>

    }).join('');
  }
  return html;

function renderMessengerList(){
  const list = document.getElementById('messengerList');
  if(!list) return;

  // Render inmediato con datos que ya tenemos
  list.innerHTML = _buildMessengerHTML();
  if(!window._chatUserAvCache) window._chatUserAvCache = {};
  (window.CU?.friendsList||[]).forEach(f=>{ if(f.av) window._chatUserAvCache[f.id]=f.av; });

  // Listener de presencia SEPARADO del chat (no se cancela al abrir chat)
  if(_messengerListUnsub){ _messengerListUnsub(); _messengerListUnsub=null; }
  _messengerListUnsub = onSnapshot(collection(db,'presence'), async snap=>{
    const now = Date.now();
    _messengerOnlineIds = new Set(
      snap.docs
        .map(d=>({id:d.id, ts:d.data().last?.toMillis?.()||0}))
        .filter(u=>u.id!==window.CU?.id && now-u.ts<120000)
        .map(u=>u.id)
    );
    // Actualizar último mensaje de cada amigo
    const friends = window.CU?.friendsList || [];
    const myId = window.CU?.id;
    if(!myId) return;
    await Promise.all(friends.map(async f=>{
      try {
        const chatId = [myId, f.id].sort().join('_');
        const q = query(collection(db,'chats',chatId,'messages'), orderBy('time','desc'), limit(30));
        const s = await getDocs(q);
        const visible = s.docs.find(d=>!(d.data().deletedFor||{})[myId]);
        if(visible){
          const d = visible.data();
          const unreadCount = s.docs.filter(d2=>{ const m=d2.data(); return m.uid!==myId && !m.read && !(m.deletedFor||{})[myId]; }).length;
          _chatLastMsgs[f.id] = {
            text: d.text||d.gif?'GIF':'',
            time: d.time?.toMillis?.()||0,
            mine: d.uid===myId,
            unread: unreadCount > 0,
            unreadCount
          };
        } else {
          // Sin mensajes visibles pero puede estar archivado — mantener entrada vacía para que aparezca en "archivados"
          if(!_chatLastMsgs[f.id]) _chatLastMsgs[f.id] = { text:'', time:0, mine:false, unread:false, unreadCount:0 };
        }
      } catch(e){}
    }));
    // Re-render con datos frescos
    const list2 = document.getElementById('messengerList');
    if(list2 && list2.style.display !== 'none'){
      list2.innerHTML = _buildMessengerHTML();
      (window.CU?.friendsList||[]).forEach(f=>{ if(f.av && window._chatUserAvCache) window._chatUserAvCache[f.id]=f.av; });
    }
    updateMsgBadge();
  });
}
