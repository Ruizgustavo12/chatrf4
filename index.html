<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MiRed Oscura</title>
  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background:#000;
      color:#fff;
    }
    header {
      background:#111;
      padding:12px 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid #333;
    }
    header h1 { color:#0ff; font-size:1.4rem; }
    nav { display:flex; gap:16px; }
    nav a { color:#fff; text-decoration:none; }
    .container { display:flex; }
    aside {
      width:220px;
      background:#0a0a0a;
      padding:20px;
      border-right:1px solid #333;
    }
    main { flex:1; padding:20px; }
    .post, .story, .reel {
      background:#111;
      border:1px solid #333;
      border-radius:8px;
      padding:16px;
      margin-bottom:20px;
    }
    .post h2, .story h2, .reel h2 { margin:0 0 8px; font-size:1rem; color:#0ff; }
    .post p, .story p, .reel p { margin:0; font-size:.9rem; }
    .stories {
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }
    .story { flex:1; text-align:center; }
    .story img { width:100%; border-radius:8px; }
    .reel video { width:100%; border-radius:8px; }
    .profile {
      background:#111;
      border:1px solid #333;
      border-radius:8px;
      padding:16px;
      margin-top:20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>MiRed Oscura</h1>
    <nav>
      <a href="#">Inicio</a>
      <a href="#">Perfil</a>
      <a href="#">Amigos</a>
      <a href="#">Mensajes</a>
    </nav>
  </header>
  <div class="container">
    <aside>
      <p><strong>Menú</strong></p>
      <p>Noticias</p>
      <p>Grupos</p>
      <p>Eventos</p>
    </aside>
    <main>
      <!-- Historias -->
      <div class="stories">
        <div class="story">
          <h2>Historia 1</h2>
          <img src="historia1.jpg" alt="historia">
        </div>
        <div class="story">
          <h2>Historia 2</h2>
          <img src="historia2.jpg" alt="historia">
        </div>
      </div>

      <!-- Publicaciones -->
      <div class="post">
        <h2>Usuario 1</h2>
        <p>Publicación de prueba en el muro.</p>
        <img src="foto1.jpg" alt="foto" style="width:100%;border-radius:8px;margin-top:10px;">
      </div>
      <div class="post">
        <h2>Usuario 2</h2>
        <p>Otra publicación de prueba.</p>
      </div>

      <!-- Reels -->
      <div class="reel">
        <h2>Usuario 3</h2>
        <video controls>
          <source src="reel.mp4" type="video/mp4">
        </video>
      </div>

      <!-- Perfil -->
      <div class="profile">
        <h2>Mi Perfil</h2>
        <p>Nombre: Gustavo</p>
        <p>Amigos: 120</p>
        <p>Publicaciones: 45</p>
      </div>
    </main>
  </div>
</body>
</html>
