<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WikiPediaRF4.UY</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Redirige /privacidad → /?r=%2Fprivacidad
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    var redirectUrl = window.location.origin + '/?r=' + encodeURIComponent(path + search) + hash;
    window.location.replace(redirectUrl);
  </script>
</head>
<body></body>
</html>
